    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fb;color:#1f2937}.login-page{max-width:520px;margin:38px auto;padding:0 16px}.layout{display:flex;min-height:100vh}.sidebar{width:238px;background:#111827;color:#fff;padding:18px 14px;position:fixed;left:0;top:0;bottom:0;overflow:auto}.brand{font-size:20px;font-weight:700;margin:4px 8px 18px}.side-info{font-size:12px;color:#cbd5e1;background:#1f2937;border-radius:12px;padding:10px;margin:0 4px 14px;line-height:1.7}.menu button{display:block;width:100%;text-align:left;border:0;background:transparent;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin:4px 0;font-size:14px;cursor:pointer}.menu button:hover,.menu button.active{background:#2563eb;color:#fff}.main{margin-left:238px;flex:1;padding:24px;max-width:calc(100vw - 238px)}.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(15,23,42,.05);margin-bottom:16px}h1{margin:0 0 8px;font-size:28px}h2{margin:0 0 14px;font-size:21px}h3{margin:0 0 8px;font-size:17px}.muted{color:#6b7280;font-size:14px}.hidden{display:none!important}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 16px}.full{grid-column:1/-1}label{display:block;font-size:14px;margin:12px 0 6px;color:#374151}input,select,textarea{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;outline:none;background:#fff}textarea{min-height:86px;resize:vertical}button{border:none;background:#2563eb;color:#fff;padding:10px 14px;border-radius:10px;font-size:15px;cursor:pointer;margin:6px 4px 6px 0}button.secondary{background:#111827}button.ghost{background:#eef2ff;color:#1f2937}button.danger{background:#dc2626}.tag{display:inline-block;padding:4px 9px;border-radius:999px;background:#ecfdf5;color:#047857;font-size:13px;margin-left:8px}.error{color:#b91c1c;margin-top:12px;font-size:14px}.success{color:#047857;margin-top:12px;font-size:14px}.warn{color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:14px;margin:10px 0}.info{color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px;font-size:14px;margin:10px 0}.table-wrap{overflow-x:auto;border:1px solid #e5e7eb;border-radius:14px;margin-top:10px}table{width:100%;border-collapse:collapse;font-size:14px;background:#fff}th,td{border-bottom:1px solid #e5e7eb;padding:10px 8px;text-align:left;vertical-align:top}th{background:#f9fafb;color:#374151;white-space:nowrap}tr.overdue td{background:#fee2e2!important}tr.due-soon td{background:#ffedd5!important}tr.due-warning td{background:#fef9c3!important}tr.closed td{background:#f3f4f6!important;color:#6b7280}.searchbar{display:grid;grid-template-columns:2fr 1fr auto auto;gap:10px;align-items:end;margin:12px 0}.module{border:1px solid #e5e7eb;border-radius:14px;background:#fff;padding:18px}.drag-row{cursor:grab}.drag-row.dragging{opacity:.45}.modal-mask{position:fixed;left:0;right:0;top:0;bottom:0;background:rgba(15,23,42,.45);z-index:99;display:flex;align-items:center;justify-content:center;padding:18px}.modal{background:#fff;border-radius:16px;max-width:960px;width:100%;max-height:88vh;overflow:auto;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.25)}.screen{background:radial-gradient(circle at top,#1d4ed8 0,#0f172a 42%,#020617 100%);color:#dbeafe;border-radius:22px;padding:24px;overflow:hidden;box-shadow:0 16px 50px rgba(15,23,42,.28)}.screen-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.screen-title h2{font-size:28px;color:#fff;margin:0}.screen-title .time{color:#93c5fd}.screen-grid{display:grid;grid-template-columns:1.1fr 1.4fr 1.1fr;gap:16px}.big-num{font-size:32px;font-weight:800;color:#fff;letter-spacing:.5px;text-shadow:0 0 20px rgba(96,165,250,.45)}.screen-card{background:rgba(15,23,42,.72);border:1px solid rgba(147,197,253,.25);border-radius:18px;padding:16px;box-shadow:inset 0 0 28px rgba(37,99,235,.16)}.screen-card h3{color:#bfdbfe;font-size:15px;margin-bottom:12px}.ticker{height:250px;overflow:hidden;position:relative}.ticker-inner{animation:scrollUp 16s linear infinite}.ticker-item{padding:9px 0;border-bottom:1px solid rgba(147,197,253,.15);font-size:14px;color:#e0f2fe}@keyframes scrollUp{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}.rank-row{display:grid;grid-template-columns:32px 1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid rgba(147,197,253,.14);font-size:14px}.rank-row b{color:#fff}.metric-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.metric-box{background:rgba(37,99,235,.18);border:1px solid rgba(96,165,250,.22);border-radius:14px;padding:12px}.metric-box .label{font-size:12px;color:#93c5fd}.metric-box .num{font-size:22px;color:#fff;font-weight:800;margin-top:4px}.todo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.todo{background:rgba(220,38,38,.15);border:1px solid rgba(248,113,113,.25);border-radius:14px;padding:12px;color:#fecaca}

<body>
<div id="loginArea" class="login-page"><div class="card"><h1>客户录单系统</h1><div class="muted">V12：财务结算分类 / 隐藏写手联系方式</div></div><div id="loginBox" class="card"><h2>登录系统</h2><label>邮箱</label><input id="email" type="email" placeholder="请输入账号邮箱" /><label>密码</label><input id="password" type="password" placeholder="请输入密码" /><button onclick="login()">登录</button><button class="ghost" onclick="renderRegister()">员工注册</button><button class="ghost" onclick="renderForgot()">忘记密码</button><button class="ghost" onclick="renderWriterPublicQuery()">写手查询</button><div id="loginMsg"></div></div><div id="registerBox" class="card hidden"><h2>员工注册</h2><div class="info">注册后默认为待审核，需要管理员启用并分配部门。</div><label>姓名/内部称呼</label><input id="reg_name" placeholder="如：客服小王、发表部A" /><label>邮箱</label><input id="reg_email" type="email" /><label>密码</label><input id="reg_password" type="password" /><button onclick="registerAccount()">提交注册</button><button class="ghost" onclick="showLogin()">返回登录</button><div id="registerMsg"></div></div><div id="forgotBox" class="card hidden"><h2>忘记密码</h2><label>注册邮箱</label><input id="forgot_email" type="email" /><button onclick="sendResetPassword()">发送重置邮件</button><button class="ghost" onclick="showLogin()">返回登录</button><div id="forgotMsg"></div></div><div id="writerQueryBox" class="card hidden"><h2>写手查询</h2><div class="info">写手不用注册，输入写手编号/手机号/微信号，即可查询自己的订单、稿费和结算状态。</div><label>写手编号 / 手机号 / 微信号</label><input id="writer_identity" placeholder="如 W010、手机号或微信号" /><button onclick="queryWriterPublic()">查询</button><button class="ghost" onclick="showLogin()">返回登录</button><div id="writerQueryMsg"></div><div id="writerQueryResult"></div></div></div>
<div id="appArea" class="layout hidden"><aside class="sidebar"><div class="brand">录单系统</div><div class="side-info" id="sideUser"></div><div class="menu" id="menuBox"></div><button class="secondary" style="width:100%;margin-top:16px" onclick="logout()">退出登录</button></aside><main class="main"><div id="content"></div></main></div><div id="modalRoot"></div>
<script>
const SUPABASE_URL='https://kifnfihqavambwatclle.supabase.co';
const SUPABASE_KEY='sb_publishable_BZaNc-i9sRnvkwTVjOF_dw_jbUoMFYs';
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentUser=null,currentProfile=null,categories=[],projects=[],customerSources=[],paymentMethods=[],profiles=[],writingUsers=[],publishingUsers=[],journals=[],writers=[],fieldsCache={},projectFieldLabels={};
const roleMap={admin:'管理员',service:'客服部',writing:'写作部',publishing:'发表部',finance:'财务部',pending:'待审核'};
const closedStatus=['已完成','已取消','退款/异常','已交付'];
function $(id){return document.getElementById(id)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function money(v){return Number(v||0).toFixed(2)}function fmtDate(v){if(!v)return'-';try{return new Date(v).toLocaleString('zh-CN',{hour12:false})}catch(e){return v}}function toISO(v){return v?new Date(v).toISOString():null}function todayISO(){return new Date().toISOString().slice(0,10)}function msg(id,html){const el=$(id);if(el)el.innerHTML=html}function showContent(html){$('content').innerHTML=html;closeModal()}function getDyn(r,k){const v=r?.dynamic_values?.[k];if(v&&typeof v==='object'&&!Array.isArray(v))return v.value??'';return v??''}function formatDynValue(v){if(v===null||v===undefined||v==='')return'';if(Array.isArray(v))return v.join('、');if(typeof v==='object')return v.value??JSON.stringify(v);return String(v)}function pickDynByLabel(fields,dv,keywords){for(const f of fields||[]){const label=f.field_label||'';const hit=keywords.some(k=>label.includes(k));const val=formatDynValue(dv?.[f.field_key]);if(hit&&val)return val}return''}function renderDynSummary(r){const dv=r?.dynamic_values||{};const labels=dv.__labels||{};const entries=Object.entries(dv).filter(([k,v])=>k!=='__labels'&&formatDynValue(v));if(!entries.length){const t=mainTitle(r),w=mainWord(r);if(t&&t!=='-')return `<strong>${esc(t)}</strong>${w?`<br><span class="muted">${esc(w)}</span>`:''}`;return'-'}return entries.map(([k,v])=>{const label=labels[k]||projectFieldLabels[k]||fieldLabel(k)||k;const val=esc(formatDynValue(v));const hideLabel=String(label).startsWith('f_')||String(label)===String(k)&&String(k).startsWith('f_');return hideLabel?`<div>${val}</div>`:`<div><span class="muted">${esc(label)}：</span>${val}</div>`}).join('')}function mainTitle(r){return r.title||getDyn(r,'project_title')||getDyn(r,'micro_topic')||getDyn(r,'course_topic')||getDyn(r,'article_title')||getDyn(r,'project_name')||'-'}function mainWord(r){return r.word_count||getDyn(r,'word_count_req')||getDyn(r,'page_or_word_req')||''}function rowClass(r){const st=r.order_status||'';if(closedStatus.includes(st))return'closed';const due=r.due_at?new Date(r.due_at).getTime():null;if(!due)return'';const h=(due-Date.now())/36e5;if(h<0)return'overdue';if(h<=24)return'due-soon';if(h<=48)return'due-warning';return''}function isPublishProject(p){return p?.code?.startsWith('FB')||p?.name?.includes('发表')}function publishTypeByProject(p){return p?.name?.includes('写作')?'写作+发表':'只发表'}
function renderRegister(){$('loginBox').classList.add('hidden');$('forgotBox').classList.add('hidden');$('writerQueryBox').classList.add('hidden');$('registerBox').classList.remove('hidden')}function renderForgot(){$('loginBox').classList.add('hidden');$('registerBox').classList.add('hidden');$('writerQueryBox').classList.add('hidden');$('forgotBox').classList.remove('hidden')}function showLogin(){$('registerBox').classList.add('hidden');$('forgotBox').classList.add('hidden');$('writerQueryBox').classList.add('hidden');$('loginBox').classList.remove('hidden')}
async function registerAccount(){msg('registerMsg','');const name=$('reg_name').value.trim(),email=$('reg_email').value.trim(),password=$('reg_password').value;if(!name||!email||!password){msg('registerMsg','<div class="error">请填写完整。</div>');return}const {error}=await client.auth.signUp({email,password,options:{data:{display_name:name}}});if(error){msg('registerMsg','<div class="error">注册失败：'+error.message+'</div>');return}msg('registerMsg','<div class="success">注册成功，请联系管理员启用账号。</div>')}
async function sendResetPassword(){msg('forgotMsg','');const email=$('forgot_email').value.trim();if(!email){msg('forgotMsg','<div class="error">请输入邮箱。</div>');return}const {error}=await client.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});if(error){msg('forgotMsg','<div class="error">'+error.message+'</div>');return}msg('forgotMsg','<div class="success">重置邮件已发送。</div>')}
function renderWriterPublicQuery(){$('loginBox').classList.add('hidden');$('registerBox').classList.add('hidden');$('forgotBox').classList.add('hidden');$('writerQueryBox').classList.remove('hidden')}
async function queryWriterPublic(){msg('writerQueryMsg','');const identity=$('writer_identity').value.trim();if(!identity){msg('writerQueryMsg','<div class="error">请输入写手编号、手机号或微信号。</div>');return}const {data,error}=await client.rpc('writer_public_query',{p_identity:identity});if(error){msg('writerQueryMsg','<div class="error">查询失败：'+esc(error.message)+'</div>');return}const rows=data||[];$('writerQueryResult').innerHTML=rows.length?`<div class="table-wrap"><table><thead><tr><th>订单编号</th><th>稿费</th><th>结算状态</th><th>已结算金额</th><th>余额</th></tr></thead><tbody>${rows.map(r=>{const fee=Number(r.writer_fee||0),settled=Number(r.settled_amount||0),balance=Math.max(fee-settled,0);return `<tr><td>${esc(r.order_no||'')}</td><td>${money(fee)}</td><td>${esc(r.settlement_status||'未结算')}</td><td>${money(settled)}</td><td>${money(balance)}</td></tr>`}).join('')}</tbody></table></div>`:'<div class="warn">没有查到订单，请检查写手编号、手机号或微信号是否正确。</div>';}

async function login(){msg('loginMsg','');const email=$('email').value.trim(),password=$('password').value;if(!email||!password){msg('loginMsg','<div class="error">请输入邮箱和密码。</div>');return}const {error}=await client.auth.signInWithPassword({email,password});if(error){msg('loginMsg','<div class="error">登录失败：'+error.message+'</div>');return}await loadApp()}async function logout(){await client.auth.signOut();currentUser=null;currentProfile=null;$('appArea').classList.add('hidden');$('loginArea').classList.remove('hidden');showLogin()}
async function loadApp(){const {data:s}=await client.auth.getSession();if(!s.session){$('loginArea').classList.remove('hidden');$('appArea').classList.add('hidden');return}currentUser=s.session.user;const {data:p,error}=await client.from('profiles').select('email,display_name,role,is_active').eq('id',currentUser.id).single();if(error||!p){msg('loginMsg','<div class="error">没有找到角色信息。</div>');return}if(!p.is_active){await client.auth.signOut();msg('loginMsg','<div class="error">账号未启用，请联系管理员。</div>');return}currentProfile=p;$('loginArea').classList.add('hidden');$('appArea').classList.remove('hidden');$('sideUser').innerHTML=`<strong>${esc(p.display_name)}</strong><br>${esc(p.email||currentUser.email)}<br><span class="tag">${roleMap[p.role]||p.role}</span>`;renderMenu();routeAfterLogin()}

function isToday(d){return new Date(d).toISOString().slice(0,10)===todayISO()}function isThisMonth(d){const n=new Date(),x=new Date(d);return x.getFullYear()===n.getFullYear()&&x.getMonth()===n.getMonth()}function isThisWeek(d){const now=new Date(),x=new Date(d),start=new Date(now);start.setDate(now.getDate()-now.getDay()+1);start.setHours(0,0,0,0);return x>=start&&x<=now}function stats(rows,filter){const r=rows.filter(filter);return{count:r.length,total:r.reduce((a,x)=>a+Number(x.total_amount||0),0),income:r.reduce((a,x)=>a+Number(x.actual_income||0),0)}}async function fetchDashboardRows(){if(currentProfile.role==='admin'){const {data,error}=await client.from('v_admin_orders_full').select('*').order('created_at',{ascending:false});if(error)throw error;return data||[]}const {data,error}=await client.from('v_service_orders').select('*').order('created_at',{ascending:false});if(error)throw error;return data||[]}

function settlementBucket(r){const fee=Number(r.writer_fee||0),settled=Number(r.settled_amount||0),status=r.settlement_status||'';if(fee<=0)return 'none';if(status==='已结算'||settled>=fee)return 'settled';if(status==='部分结算'||(settled>0&&settled<fee))return 'partial';return 'unsettled'}

function financeTable(rows){if(!rows.length)return'<div class="warn">暂无财务订单。</div>';return`<div class="table-wrap"><table><thead><tr><th>编号</th><th>部门</th><th>业务/项目</th><th>金额</th><th>写手信息</th><th>写手结算</th><th>发表打款</th><th>期刊内部信息</th><th>利润</th><th>操作</th></tr></thead><tbody>${rows.map(r=>{const fee=Number(r.writer_fee||0),settled=Number(r.settled_amount||0),balance=Math.max(fee-settled,0);return `<tr class="${rowClass(r)}"><td><strong>${r.order_no}</strong></td><td>客服：${r.service_name||'-'}<br>写作：${r.assigned_writing_name||'-'}<br>发表：${r.assigned_publishing_name||'-'}</td><td>${r.business_category}<br>${r.service_project}</td><td>总：${money(r.total_amount)}<br>定：${money(r.deposit_amount)}<br>尾：${money(r.balance_amount)}<br>退：${money(r.refund_amount)}</td><td>${r.writer_name||'-'}<br>编号：${r.writer_code||'-'}<br>收款：${r.writer_payment_method||'-'} ${r.writer_payment_account||'-'}</td><td>稿费：${fee?money(fee):'-'}<br>状态：${r.settlement_status||'未结算'}<br>已结：${money(settled)}<br>余额：${money(balance)}</td><td>${r.publish_status||'-'}<br>${r.finance_payment_status||'-'} ${r.finance_payment_amount?money(r.finance_payment_amount):''}</td><td>${r.journal_name||'-'}<br>版面费：${r.page_fee?money(r.page_fee):'-'}<br>${esc(r.editor_contact||'')}</td><td>${money(r.gross_profit)}</td><td><button onclick="openFinanceEdit('${r.order_id}','${r.assignment_id||''}','${r.publishing_assignment_id||''}','${money(settled)}')">处理</button></td></tr>`}).join('')}</tbody></table></div>`}

async function renderReportView(){
    setMenu('reports');
    const end=todayISO();
    const start=new Date(Date.now()-6*864e5).toISOString().slice(0,10);
    showContent(`<div class="card"><h2>统计报表</h2><div class="form-grid"><div><label>开始日期</label><input id="report_start" type="date" value="${start}"></div><div><label>结束日期</label><input id="report_end" type="date" value="${end}"></div></div><button onclick="setReportRange('today')">今天</button><button onclick="setReportRange('7days')">最近7天</button><button onclick="setReportRange('month')">本月</button><button onclick="setReportRange('lastmonth')">上个月</button><button onclick="setReportRange('year')">今年</button><button class="secondary" onclick="queryReport()">查询</button><div id="reportBox"></div></div>`);
    queryReport();
  }
  function setReportRange(t){
    const d=new Date();
    let s=new Date(),e=new Date();
    if(t==='today'){s=new Date();}
    if(t==='7days'){s=new Date(Date.now()-6*864e5);}
    if(t==='month'){s=new Date(d.getFullYear(),d.getMonth(),1);}
    if(t==='lastmonth'){s=new Date(d.getFullYear(),d.getMonth()-1,1);e=new Date(d.getFullYear(),d.getMonth(),0);}
    if(t==='year'){s=new Date(d.getFullYear(),0,1);}
    $('report_start').value=s.toISOString().slice(0,10);
    $('report_end').value=e.toISOString().slice(0,10);
    queryReport();
  }
  async function queryReport(){
    const s=$('report_start').value+'T00:00:00';
    const e=$('report_end').value+'T23:59:59';
    const {data,error}=await client.from('v_admin_orders_full').select('*').gte('created_at',s).lte('created_at',e);
    if(error){$('reportBox').innerHTML='<div class="error">'+error.message+'</div>';return;}
    const rows=data||[];
    const total=sum(rows,'total_amount'),dep=sum(rows,'deposit_amount'),bal=sum(rows,'balance_amount'),refund=sum(rows,'refund_amount'),income=sum(rows,'actual_income'),fee=sum(rows,'writer_fee'),page=sum(rows,'page_fee');
    $('reportBox').innerHTML=`<div class="card" style="box-shadow:none;background:#f9fafb"><h3>汇总</h3><div class="grid">${metric('订单数',rows.length)}${metric('成交金额',money(total))}${metric('定金',money(dep))}${metric('尾款',money(bal))}${metric('退款',money(refund))}${metric('实际收入',money(income))}${metric('稿费',money(fee))}${metric('版面费',money(page))}${metric('毛利润',money(income-fee-page))}</div></div>${groupTable('客服统计',group(rows,r=>r.service_name||'未指定'))}${groupTable('业务统计',group(rows,r=>(r.business_category||'-')+' / '+(r.service_project||'-')))}${groupTable('期刊统计',group(rows,r=>r.journal_name||'无期刊'))}`;
  }
  function sum(rows,k){return rows.reduce((a,r)=>a+Number(r[k]||0),0);}
  function metric(k,v){return `<div class="module"><h3>${v}</h3><div class="muted">${k}</div></div>`;}
  function group(rows,kf){
    const m={};
    rows.forEach(r=>{const k=kf(r);m[k]??={name:k,count:0,total:0,dep:0,fee:0,page:0};m[k].count++;m[k].total+=Number(r.total_amount||0);m[k].dep+=Number(r.deposit_amount||0);m[k].fee+=Number(r.writer_fee||0);m[k].page+=Number(r.page_fee||0);});
    return Object.values(m);
  }

  function renderLogTimeline(logs){
    if(!logs.length)return '<div class="warn">暂无修改记录。</div>';
    return logs.map(l=>{
      const changes=summarizeLogChanges(l.detail);
      const action=l.action==='INSERT'?'新增':l.action==='UPDATE'?'修改':l.action==='DELETE'?'删除':l.action;
      const shown=changes.slice(0,10);
      const changeHtml=shown.length?shown.map(c=>`<div class="log-field"><div class="log-field-name">${esc(c.label)}：</div><span class="log-old">${esc(c.oldVal||'空')}</span><span class="muted"> → </span><span class="log-new">${esc(c.newVal||'空')}</span></div>`).join(''):'<div class="muted">系统记录更新</div>';
      return `<div class="log-card"><div class="log-time">${fmtDate(l.created_at)}</div><div class="log-user">${esc(l.user_name||'系统')}</div><div class="log-action">${action}｜有${changes.length||1}处更改</div>${changeHtml}</div>`;
    }).join('');
  }

  function summarizeLogChanges(detail){
    const oldObj=detail?.old||{};
    const newObj=detail?.new||{};
    const ignore=new Set(['id','created_at','updated_at','deleted_at','deleted_by']);
    const keys=[...new Set([...Object.keys(oldObj||{}),...Object.keys(newObj||{})])].filter(k=>!ignore.has(k));
    const out=[];
    keys.forEach(k=>{
      const ov=oldObj?oldObj[k]:undefined,nv=newObj?newObj[k]:undefined;
      if(k==='dynamic_values'){
        const ok=ov||{},nk=nv||{};
        const labels=Object.assign({},ok.__labels||{},nk.__labels||{});
        [...new Set([...Object.keys(ok),...Object.keys(nk)])].forEach(dk=>{
          if(dk==='__labels')return;
          if(JSON.stringify(ok[dk]??'')!==JSON.stringify(nk[dk]??''))out.push({label:cleanLogLabel(labels[dk]||projectFieldLabels[dk]||fieldLabel(dk),dk),oldVal:fmtLogVal(ok[dk]),newVal:fmtLogVal(nk[dk])});
        });
      }else if(JSON.stringify(ov??'')!==JSON.stringify(nv??'')){
        out.push({label:cleanLogLabel(projectFieldLabels[k]||fieldLabel(k),k),oldVal:fmtLogVal(ov),newVal:fmtLogVal(nv)});
      }
    });
    return out;
  }

  function cleanLogLabel(label,key){
    const x=String(label||'');
    if(x.startsWith('f_')||x===String(key)&&String(key).startsWith('f_')) return '自定义字段';
    return x||'字段';
  }

  function fieldLabel(k){

  function fmtLogVal(v){
    if(v===null||v===undefined||v==='')return '空';
    if(typeof v==='object')return JSON.stringify(v);
    if(String(v).match(/^\d{4}-\d{2}-\d{2}T/))return fmtDate(v);
    return String(v);
  }
