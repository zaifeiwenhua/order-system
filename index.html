-left:8px}.error{color:#b91c1c;margin-top:12px;font-size:14px}.success{color:#047857;margin-top:12px;font-size:14px}.warn{color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:14px;margin:10px 0}.info{color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px;font-size:14px;margin:10px 0}.table-wrap{overflow-x:auto;border:1px solid #e5e7eb;border-radius:14px;margin-top:10px}table{width:100%;border-collapse:collapse;font-size:14px;background:#fff}th,td{border-bottom:1px solid #e5e7eb;padding:10px 8px;text-align:left;vertical-align:top}th{background:#f9fafb;color:#374151;white-space:nowrap}tr.overdue td{background:#fee2e2!important}tr.due-soon td{background:#ffedd5!important}tr.due-warning td{background:#fef9c3!important}tr.closed td{background:#f3f4f6!important;color:#6b7280}.searchbar{display:grid;grid-template-columns:2fr 1fr auto auto;gap:10px;align-items:end;margin:12px 0}.module{border:1px solid #e5e7eb;border-radius:14px;background:#fff;padding:18px}.drag-row{cursor:grab}.drag-row.dragging{opacity:.45}.modal-mask{position:fixed;left:0;right:0;top:0;bottom:0;background:rgba(15,23,42,.45);z-index:99;display:flex;align-items:center;justify-content:center;padding:18px}.modal{background:#fff;border-radius:16px;max-width:960px;width:100%;max-height:88vh;overflow:auto;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
button:disabled{opacity:.58;cursor:not-allowed}
.order-form-shell{display:flex;flex-direction:column;max-height:86vh;margin:-20px;background:#fff;border-radius:16px;overflow:hidden}
.order-form-header{position:sticky;top:0;z-index:8;background:#fff;border-bottom:1px solid #e5e7eb;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.order-form-header h2{margin:0;font-size:20px;color:#111827}
.order-form-close{background:#f3f4f6!important;color:#111827!important;width:36px;height:36px;padding:0!important;border-radius:10px!important;font-size:22px;line-height:1}
.order-form-body{padding:18px 20px 96px;overflow:auto;min-height:0}
.order-form-footer{position:sticky;bottom:0;z-index:9;background:#fff;border-top:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 -8px 20px rgba(15,23,42,.06)}
.order-form-footer .footer-msg{margin-left:12px;font-size:14px;min-height:22px;display:flex;align-items:center;flex:1}
.order-form-footer button{min-width:116px;font-weight:600}
.order-form-tip{font-size:13px;color:#64748b;margin-top:6px}
@media(max-width:900px){.order-form-shell{max-height:92vh}.order-form-body{padding-bottom:120px}.order-form-footer{flex-wrap:wrap}.order-form-footer .footer-msg{width:100%;margin-left:0}}
.screen{background:radial-gradient(circle at top,#1d4ed8 0,#0f172a 42%,#020617 100%);color:#dbeafe;border-radius:22px;padding:24px;overflow:hidden;box-shadow:0 16px 50px rgba(15,23,42,.28)}.screen-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.screen-title h2{font-size:28px;color:#fff;margin:0}.screen-title .time{color:#93c5fd}.screen-grid{display:grid;grid-template-columns:1.1fr 1.4fr 1.1fr;gap:16px}.big-num{font-size:32px;font-weight:800;color:#fff;letter-spacing:.5px;text-shadow:0 0 20px rgba(96,165,250,.45)}.screen-card{background:rgba(15,23,42,.72);border:1px solid rgba(147,197,253,.25);border-radius:18px;padding:16px;box-shadow:inset 0 0 28px rgba(37,99,235,.16)}.screen-card h3{color:#bfdbfe;font-size:15px;margin-bottom:12px}.ticker{height:250px;overflow:hidden;position:relative}.ticker-inner{animation:scrollUp 16s linear infinite}.ticker-item{padding:9px 0;border-bottom:1px solid rgba(147,197,253,.15);font-size:14px;color:#e0f2fe}@keyframes scrollUp{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}.rank-row{display:grid;grid-template-columns:32px 1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid rgba(147,197,253,.14);font-size:14px}.rank-row b{color:#fff}.metric-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.metric-box{background:rgba(37,99,235,.18);border:1px solid rgba(96,165,250,.22);border-radius:14px;padding:12px}.metric-box .label{font-size:12px;color:#93c5fd}.metric-box .num{font-size:22px;color:#fff;font-weight:800;margin-top:4px}.todo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.todo{background:rgba(220,38,38,.15);border:1px solid rgba(248,113,113,.25);border-radius:14px;padding:12px;color:#fecaca}
.order-modal{
  max-width:1380px!important;
  width:min(1380px,96vw)!important;
  height:88vh;
  padding:0!important;
  display:grid;
  grid-template-columns:minmax(0,1fr) 380px;
  overflow:hidden!important;
}
.order-modal-left{
  padding:20px 22px;
  overflow:auto;
  min-width:0;
}
.order-modal-right{
  border-left:1px solid #e5e7eb;
  background:#f8fafc;
  padding:16px 14px;
  overflow:auto;
  min-width:0;
}
.order-toolbar{
  position:sticky;
  top:0;
  z-index:3;
  background:#fff;
  padding:0 0 12px;
  margin-bottom:8px;
  border-bottom:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.order-toolbar .title{
  font-size:20px;
  font-weight:700;
  margin-right:auto;
  color:#111827;
}
.section-title{
  margin:18px 0 10px;
  padding-bottom:8px;
  border-bottom:1px solid #cbd5e1;
  font-weight:700;
  color:#334155;
}
.log-tabs{
  position:sticky;
  top:0;
  z-index:2;

  padding-bottom:10px;
  margin-bottom:10px;

}

  border-bottom:2px solid #14b8a6;
}
.log-card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 4px 14px rgba(15,23,42,.04);
}
.log-card .log-time{

  background:#dcfce7;

    border-left:0;
  }
  .order-modal-right{
    border-top:1px solid #e5e7eb;
  }
}
@media(max-width:1050px){.screen-grid,.grid,.form-grid,.searchbar,.todo-grid,.metric-mini{grid-template-columns:1fr}.main{padding:16px}}@media(max-width:900px){.layout{display:block}.sidebar{position:relative;width:100%;height:auto}.main{margin-left:0;max-width:100%;padding:14px}}
  
/* V32 手机端适配 */
.mobile-topbar{display:none}
.mobile-overlay{display:none}

  body{background:#f3f6fb}
  .login-page{margin:14px auto;padding:0 12px}
  .login-page .card{border-radius:16px;padding:18px}
  .mobile-topbar{
    display:flex;
    position:sticky;
    top:0;
    z-index:60;
    height:52px;
    background:#111827;

  }

  .main{

  }

  }

  h2{font-size:18px}
  .grid,.form-grid,.searchbar,.todo-grid,.metric-mini{grid-template-columns:1fr!important;gap:10px}
  label{margin:10px 0 5px}

.draft-notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:10px 12px;font-size:14px;margin-top:8px}

  
/* V34 订单详情弹窗与日志优化 */
.detail-toolbar{justify-content:space-between;align-items:flex-start;gap:12px}
.detail-toolbar .order-toolbar-left{display:flex;flex-direction:column;gap:8px;min-width:0;flex:1}
.detail-toolbar .order-sub-actions{display:flex;gap:8px;flex-wrap:wrap}
.detail-toolbar .order-sub-actions button{margin:0}
.detail-toolbar .order-toolbar-close{flex:0 0 auto;margin:0!important}
.order-detail-footer{margin-top:18px;margin-left:-22px;margin-right:-22px;margin-bottom:-20px;justify-content:flex-start}
.order-detail-footer .footer-msg{margin-left:12px;flex:1}
.log-summary-line{font-size:13px;color:#475569;margin-bottom:8px;line-height:1.5}
.log-target-tag{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:2px 8px;font-size:12px;margin:0 4px 4px 0}
@media(max-width:768px){
  .detail-toolbar{padding-top:2px!important}
  .detail-toolbar .order-toolbar-left{width:calc(100% - 46px)}
  .detail-toolbar .order-sub-actions button{flex:1;min-width:96px}

  .order-detail-footer{position:fixed!important;left:0;right:0;bottom:0;z-index:110;margin:0;padding:10px 12px calc(10px + env(safe-area-inset-bottom))!important;background:#fff;border-top:1px solid #e5e7eb;box-shadow:0 -8px 24px rgba(15,23,42,.12)}
  .order-detail-footer button{flex:1;min-width:0!important}
  .order-detail-footer .footer-msg{width:100%;margin-left:0;font-size:13px}
}

/* V43 写作部简化状态 */
.warn-tag{background:#fff7ed!important;color:#c2410c!important}
.ok-tag{background:#dcfce7!important;color:#166534!important}

.log-split-layout{display:grid;grid-template-columns:minmax(420px,1fr) 360px;gap:18px;max-height:82vh;min-width:min(1100px,92vw)}
.log-split-main,.log-split-side{overflow:auto;max-height:80vh;padding-right:6px}

  .log-split-layout{display:block;min-width:0;max-height:86vh}
  .log-split-main,.log-split-side{max-height:none;overflow:visible}
  .log-split-side{border-left:0;border-top:1px solid #e5e7eb;margin-top:16px;padding-left:0}
}


/* V61 全面视觉升级 + 右侧日志宽屏修复 */
:root{
  --brand:#2563eb;
  --brand2:#06b6d4;
  --ink:#0f172a;
  --muted:#64748b;
  --line:#dbeafe;
  --soft:#f8fbff;
  --card:#ffffff;
}
body{
  background:
    radial-gradient(circle at 8% -10%,rgba(37,99,235,.20),transparent 36%),

/* V65 日志三分之一 + 禁止横向溢出
   目标：右侧数据日志约占 1/3，左侧操作区约占 2/3；不出现横向滚动条，不截断文字 */
*{box-sizing:border-box}
.modal-mask{overflow:hidden!important}

/* 订单详情弹窗：左 2/3，右 1/3 */
.order-modal{
  width:min(1440px,96vw)!important;
  max-width:min(1440px,96vw)!important;
  grid-template-columns:minmax(0,2fr) minmax(360px,1fr)!important;
  overflow:hidden!important;
}
.order-modal-left,
.order-modal-right{
  min-width:0!important;
  overflow-x:hidden!important;
}
.order-modal-left{
  padding-right:0!important;
}
.order-modal-right{
  max-width:none!important;
}

/* 带处理操作的弹窗：左 2/3，右 1/3 */
.modal:has(.log-split-layout){
  width:min(1320px,96vw)!important;
  max-width:min(1320px,96vw)!important;
  overflow:hidden!important;
}
.log-split-layout{
  grid-template-columns:minmax(0,2fr) minmax(350px,1fr)!important;
  width:100%!important;
  min-width:0!important;
  overflow:hidden!important;
}
.log-split-main,
.log-split-side{
  min-width:0!important;
  overflow-x:hidden!important;
}

/* 日志内容自动换行，避免撑出横向滚动条 */
.data-log-card,
.data-log-line,
.data-log-body,
.data-log-values,
.data-log-label,
.data-log-old,
.data-log-new,
.data-log-tagrow,
.data-log-username,
.data-log-count{
  min-width:0!important;
  max-width:100%!important;
}
.data-log-values{
  display:flex!important;
  flex-wrap:wrap!important;
}
.data-log-old,
.data-log-new{
  white-space:normal!important;
  overflow-wrap:anywhere!important;
  word-break:break-word!important;
}

/* 表单和日志容器不允许横向撑开 */
.form-grid,
.table-wrap,
.card,
.order-toolbar,
.log-modal-head{
  min-width:0!important;
  max-width:100%!important;
}
.order-toolbar{
  overflow:hidden!important;
}
.order-toolbar-left{
  min-width:0!important;
}
.order-toolbar .title{
  min-width:0!important;
  overflow:hidden!important;
  text-overflow:ellipsis!important;
  white-space:nowrap!important;
}

/* 表格区域如果内容过多，只在表格内部滚动，不拖出整个弹窗 */
.table-wrap{
  overflow:auto!important;
  max-width:100%!important;
}

/* 窄屏时上下排列 */
@media(max-width:960px){
  .order-modal{
    display:block!important;
    overflow:auto!important;
  }
  .log-split-layout{
    display:block!important;

  }
  .order-modal-right,
  .log-split-side{
    border-left:0!important;
    border-top:1px solid #e5eaf2!important;
  }
}

  if(['已交给客服','已交稿','写作完成','终稿完成'].includes(ws))return'待客服交付';
  if(ws==='已完成' && st!=='已完成')return'待客服交付';

  if(st==='已收全款'||st==='待收尾款'){
    if(ws==='写作中'||r?.writer_id)return'写作中';
    if(r?.publish_status&&r.publish_status!=='-')return r.publish_status;
    return'待安排';

async function queryWriterInternal(){
  const input=$('internal_writer_identity');
  const nameInput=$('internal_writer_name');
  const box=$('internalWriterResult');
  if(!input||!nameInput||!box)return;
  const code=input.value.trim();
  const name=nameInput.value.trim();
  if(!code||!name){box.innerHTML='<div class="error" style="margin:12px">请输入写手编号和姓名。</div>';return}
  box.innerHTML='<div class="muted" style="margin:12px">正在查询...</div>';
  const {data,error}=await client.rpc('writer_public_query_secure_v90',{p_writer_code:code,p_writer_name:name});
  if(error){box.innerHTML='<div class="error" style="margin:12px">查询失败：'+esc(error.message)+'</div>';return}
  const rows=data||[];
  if(!rows.length){box.innerHTML='<div class="warn" style="margin:12px">没有查到订单，请检查写手编号和姓名是否匹配。</div>';return}

  const totalFee=rows.reduce((a,r)=>a+Number(r.writer_fee||0),0);
  const settled=rows.reduce((a,r)=>a+Number(r.settled_amount||0),0);
  const balance=rows.reduce((a,r)=>a+Math.max(Number(r.writer_fee||0)-Number(r.settled_amount||0),0),0);

  box.innerHTML=`<div class="writer-query-summary">
      <div class="module"><h3>${rows.length}</h3><div class="muted">订单数</div></div>
      <div class="module"><h3>${money(totalFee)}</h3><div class="muted">稿费合计</div></div>
      <div class="module"><h3>${money(settled)}</h3><div class="muted">已结合计</div></div>
      <div class="module"><h3>${money(balance)}</h3><div class="muted">余额合计</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>订单编号</th><th>稿费</th><th>结算状态</th><th>已结算金额</th><th>余额</th></tr>
        </thead>
        <tbody>
          ${rows.map(r=>{
            const fee=Number(r.writer_fee||0), s=Number(r.settled_amount||0), b=Math.max(fee-s,0);
            return `<tr>
              <td>${orderNoCell(r.order_no||'')}</td>
              <td>${money(fee)}</td>
              <td>${esc(r.settlement_status||'未结算')}</td>
              <td>${money(s)}</td>
              <td>${money(b)}</td>
            </tr>`
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderDashboard(rows){const today=stats(rows,r=>isToday(r.created_at)),week=stats(rows,r=>isThisWeek(r.created_at)),month=stats(rows,r=>isThisMonth(r.created_at));const rank=groupRows(rows.filter(r=>isThisMonth(r.created_at)),r=>r.service_name||'未指定客服');const biz=groupRows(rows.filter(r=>isThisMonth(r.created_at)),r=>(r.business_category||'-')+' / '+(r.service_project||'-'));const recent=rows.slice(0,12);const overdue=rows.filter(r=>rowClass(r)==='overdue').length,dueSoon=rows.filter(r=>['due-soon','due-warning'].includes(rowClass(r))).length,unfinished=rows.filter(r=>!closedStatus.includes(r.order_status||'')).length;const ticker=(recent.length?recent:rows).concat(recent.length?recent:rows).map(r=>`<div class="ticker-item"><strong>${r.order_no}</strong>｜${esc(r.service_name||'')}｜${esc(r.service_project||'')}｜¥${money(r.total_amount)}｜${esc(mainTitle(r))}</div>`).join('');return`<div class="metric-mini">${bigMetric('今日订单',today.count)}${bigMetric('今日成交额','¥'+money(today.total))}${bigMetric('本周订单',week.count)}${bigMetric('本月成交额','¥'+money(month.total))}</div><div class="screen-grid"><div class="screen-card"><h3>本月客服排行榜</h3>${rank.slice(0,8).map((x,i)=>rankRow(i+1,x.name,x.count+'单 / ¥'+money(x.total))).join('')||'<div class="muted">暂无数据</div>'}</div><div class="screen-card"><h3>实时订单滚动</h3><div class="ticker"><div class="ticker-inner">${ticker||'<div class="ticker-item">暂无订单</div>'}</div></div></div><div class="screen-card"><h3>本月业务排行榜</h3>${biz.slice(0,8).map((x,i)=>rankRow(i+1,x.name,x.count+'单 / ¥'+money(x.total))).join('')||'<div class="muted">暂无数据</div>'}</div></div><div class="todo-grid"><div class="todo">快到期订单<br><span class="big-num" data-num="${dueSoon}">0</span></div><div class="todo">逾期未完成<br><span class="big-num" data-num="${overdue}">0</span></div><div class="todo">未完成订单<br><span class="big-num" data-num="${unfinished}">0</span></div></div>`}function bigMetric(label,val){return`<div class="metric-box"><div class="label">${label}</div><div class="num big-num" data-num="${String(val).replace(/[^\d.]/g,'')}" data-prefix="${String(val).startsWith('¥')?'¥':''}">0</div></div>`}function rankRow(i,n,v){return`<div class="rank-row"><b>${i}</b><span>${esc(n)}</span><b>${esc(v)}</b></div>`}function groupRows(rows,kf){const m={};rows.forEach(r=>{const k=kf(r);m[k]??={name:k,count:0,total:0};m[k].count++;m[k].total+=Number(r.total_amount||0)});return Object.values(m).sort((a,b)=>b.total-a.total)}function animateNums(){document.querySelectorAll('.big-num').forEach(el=>{const target=Number(el.dataset.num||0),prefix=el.dataset.prefix||'';let n=0,step=Math.max(target/30,1);const t=setInterval(()=>{n+=step;if(n>=target){n=target;clearInterval(t)}el.innerText=prefix+(prefix?money(n):Math.floor(n))},22)})}

const ORDER_DRAFT_KEY='order_form_draft_v33';
let orderDraftMode=false,orderDraftDirty=false,orderDraftRestoring=false,orderDraftTimer=null;

function readOrderDraft(){

function collectOrderFormDraft(){

    project_id:$('project_id')?.value||'',

    assigned_publishing_user_id:$('assigned_publishing_user_id')?.value||'',
    journal_id:$('journal_id')?.value||'',
    due_at:$('due_at')?.value||'',
    total_amount:$('total_amount')?.value||'',
    deposit_amount:$('deposit_amount')?.value||'',

function orderDraftHasContent(d){
  if(!d)return false;
  const v=d.values||{};
  const textKeys=['customer_source','payment_method_id','wechat_account','taobao_account','category_id','project_id','assigned_writing_user_id','assigned_publishing_user_id','journal_id','due_at','service_notes'];
  if(textKeys.some(k=>String(v[k]||'').trim()))return true;
  if(Number(v.total_amount||0)>0||Number(v.deposit_amount||0)>0||Number(v.refund_amount||0)>0)return true;
  return Object.values(d.dynamic_values||{}).some(x=>String(x||'').trim());
}
function autoSaveOrderDraft(){
  if(!orderDraftMode||orderDraftRestoring)return;
  const d=collectOrderFormDraft();
  if(orderDraftHasContent(d)){
    try{localStorage.setItem(ORDER_DRAFT_KEY,JSON.stringify(d));orderDraftDirty=true}catch(e){}
  }
}
function scheduleOrderDraftSave(){
  if(!orderDraftMode||orderDraftRestoring)return;
  clearTimeout(orderDraftTimer);
  orderDraftTimer=setTimeout(autoSaveOrderDraft,250);
}
function setupOrderDraftListeners(){

async function restoreOrderFormDraft(d){

  setOrderField('payment_method_id',v.payment_method_id);
  setOrderField('wechat_account',v.wechat_account);

  setOrderField('category_id',v.category_id);

  if(v.project_id){await onProjectChange(v.project_id,d.dynamic_values||{},v.journal_id||'')}

  setOrderField('assigned_publishing_user_id',v.assigned_publishing_user_id);
  setOrderField('journal_id',v.journal_id);
  setOrderField('due_at',v.due_at);
  setOrderField('total_amount',v.total_amount);

function manualSaveOrderDraft(){

  try{localStorage.setItem(ORDER_DRAFT_KEY,JSON.stringify(d));orderDraftDirty=true;msg('orderFormMsg','<div class="success">草稿已保存到本机，下次点击新增订单可继续填写。</div>')}
  catch(e){msg('orderFormMsg','<div class="error">草稿保存失败：'+esc(e?.message||e)+'</div>')}

function closeOrderFormModal(){
  if(orderDraftMode){
    autoSaveOrderDraft();
    const d=readOrderDraft();
    if(orderDraftHasContent(d)){
      const ok=confirm('当前订单还没有提交，内容已自动保存为本机草稿。确定关闭吗？');
      if(!ok)return;
    }
  }
  closeModal();
}
function initOrderDraftProtection(orderId){
  orderDraftMode=!orderId;
  orderDraftDirty=false;
  setupOrderDraftListeners();
  if(!orderDraftMode)return;
  const d=readOrderDraft();
  if(d&&d.user_id===currentUser?.id&&orderDraftHasContent(d)){
    setTimeout(async()=>{
      const ok=confirm('检测到一条未提交的订单草稿（保存于 '+formatDraftTime(d.saved_at)+'），是否继续填写？');
      if(ok){await restoreOrderFormDraft(d);msg('orderFormMsg','<div class="draft-notice">已恢复本机草稿。提交成功后草稿会自动清除。</div>')}
      else{clearOrderDraft();msg('orderFormMsg','<div class="warn">已放弃本机草稿。</div>')}
      setupOrderDraftListeners();
    },80);
  }
}

function updateBalancePreview(){const t=Number($('total_amount')?.value||0),r=Number($('deposit_amount')?.value||0);const bal=Math.max(t-r,0);if($('balance_preview'))$('balance_preview').value=bal.toFixed(2);if($('order_status_preview'))$('order_status_preview').value=computedAutoOrderStatus()}async function onCategoryChange(selected=''){const cid=$('category_id').value,list=projects.filter(p=>p.category_id===cid);$('project_id').innerHTML='<option value="">请选择</option>'+list.map(p=>`<option value="${p.id}" ${selected===p.id?'selected':''}>${esc(p.name)}</option>`).join('');$('dynamicFieldsBox').innerHTML='';$('publishExtraBox').innerHTML=''}async function onProjectChange(selected='',vals={},selectedJournal=''){const pid=selected||$('project_id').value,box=$('dynamicFieldsBox'),p=projects.find(x=>x.id===pid);if(!pid){box.innerHTML='';return}if(isPublishProject(p,$('category_id')?.value)){const ops=journals.map(j=>`<option value="${j.id}" ${selectedJournal===j.id?'selected':''}>${esc(j.journal_name)}｜${esc(j.journal_level||'')}｜客户价¥${money(j.customer_price)}</option>`).join('');$('publishExtraBox').innerHTML=`<div class="card" style="box-shadow:none;background:#f9fafb"><h3>发表信息</h3><label>选择期刊</label><select id="journal_id"><option value="">请选择期刊</option>${ops}</select><div class="muted">期刊来自“期刊管理”，客服可先在期刊管理里搜索。</div></div>`}else{$('publishExtraBox').innerHTML=''}const fields=await getFields(pid);box.innerHTML=fields.length?`<div class="card" style="box-shadow:none;background:#f9fafb"><h3>项目专属字段</h3><div class="form-grid">${fields.map(f=>dynField(f,vals[f.field_key])).join('')}</div></div>`:'<div class="warn">该项目暂无专属字段。</div>'}function dynField(f,val=''){const label=esc(f.field_label)+(f.is_required?' *':''),id='dyn_'+f.field_key;if(f.field_type==='textarea')return`<div class="full"><label>${label}</label><textarea id="${id}">${esc(val||'')}</textarea></div>`;if(f.field_type==='select'){const opts=Array.isArray(f.options)?f.options:[];return`<div><label>${label}</label><select id="${id}"><option value="">请选择</option>${opts.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`}const type=f.field_type==='number'?'number':f.field_type==='date'?'date':f.field_type==='datetime'?'datetime-local':'text';return`<div><label>${label}</label><input id="${id}" type="${type}" value="${esc(val||'')}" /></div>`}

    }

    else{payload.created_by=currentUser.id;const r=await client.from('orders').insert(payload).select('id,order_no').single();orderData=r.data;err=r.error}

        journal_id:$('journal_id')?.value||null,
        publish_type:publishTypeByProject(project,categoryId)
      };

      if(orderId){

        }

  }catch(e){

  }finally{
    setOrderSubmitState(false);
  }
}

function writingProgressTip(r){
  if(!r.writer_id)return'<span class="tag warn-tag">未登记写手</span>';
  const s=r.writing_status||'';
  if(['已交给客服','已交稿','写作完成','终稿完成','已完成'].includes(s))return'<span class="tag ok-tag">已交给客服</span>';
  return'<span class="tag">写作中</span>';
}

function writingActionBtns(r){
  const done=['已交给客服','已交稿','写作完成','终稿完成','已完成'].includes(r.writing_status||'');
  return `<button onclick="openWritingEdit('${r.order_id}')">${r.writer_id?'修改登记':'登记写手'}</button>
    ${r.writer_id&&!done?`<button class="secondary" onclick="markWritingDelivered('${r.order_id}')">已交给客服</button>`:''}
    <button class="ghost" onclick="openWritingNote('${r.order_id}')">备注/异常</button>`;
}


function writingDueCell(r){
  const base=fmtDateOnly(r.due_at);
  const info=writingDueInfo(r);
  if(!info || writingReminderDone(r))return base;
  const cls=info.level==='danger'?'due-badge-danger':'due-badge-warning';
  return `${base}<br><span class="due-badge ${cls}">${esc(info.text)}</span>`;
}

function filterEditWriterOptions(){
  const input=$('edit_writer_search');
  const select=$('edit_writer_id');
  if(!input||!select||!window.__editWriterOptions)return;
  const kw=input.value.trim().toLowerCase();
  const current=select.value;
  const filtered=window.__editWriterOptions.filter(w=>{
    const code=String(w.writer_code||'').toLowerCase();
    const name=String(w.writer_name||'').toLowerCase();
    return !kw || code.includes(kw) || name.includes(kw);
  });
  select.innerHTML='<option value="">请选择写手</option>'+filtered.map(w=>`<option value="${w.id}">${esc(w.writer_code)}（${esc(w.writer_name)}）</option>`).join('');
  if(current && filtered.some(w=>w.id===current))select.value=current;
}

async function saveWritingEdit(orderId){
  const writerId=$('edit_writer_id').value||null;
  const writerFee=Number($('edit_writer_fee').value||0);
  if(!writerId){msg('modalMsg','<div class="error">请选择写手。</div>');return}
  if(writerFee<=0){msg('modalMsg','<div class="error">请填写稿费。</div>');return}
  const payload={
    order_id:orderId,
    writing_manager_id:currentUser.id,
    writer_id:writerId,
    writer_fee:writerFee,
    writing_status:'写作中',
    writing_notes:$('edit_writing_notes').value.trim()
  };
  const {error}=await client.from('writing_assignments').upsert(payload,{onConflict:'order_id'});
  if(error){msg('modalMsg','<div class="error">'+error.message+'</div>');return}
  await client.from('orders').update({order_status:'写作中'}).eq('id',orderId).neq('order_status','已退款').neq('order_status','部分退款').neq('order_status','已取消').neq('order_status','退款/异常').neq('order_status','已完成');
  closeModal();
  renderWritingOrders();
}

function isOrderFullPaidForPublish(r){
  if(!r)return false;
  const st=String(r.order_status||'');
  if(['已退款','部分退款','已取消','退款/异常'].includes(st))return false;
  const total=Number(r.total_amount||0),received=Number(r.deposit_amount||0);
  return st==='已收全款' || (total>0 && received>=total);
}
function isPublishPaymentPending(r){
  if(!r || !r.publishing_assignment_id)return false;
  const pay=String(r.finance_payment_status||'');
  const ps=String(r.publish_status||'');
  if(pay==='已打款')return false;
  const approved=ps.includes('审核通过') || ps.includes('待打款') || ps.includes('待财务打款');
  // V45：发表部审核通过后，先让客服收尾款；只有订单已收全款，财务才收到待打款提醒。
  return approved && isOrderFullPaidForPublish(r);
}

async function getPublishPaymentPendingRows(){
  const {data,error}=await client.from('v_finance_orders').select('*').order('created_at',{ascending:false});
  if(error)throw error;
  const rows=await mergePublishingPayeeRows(data||[]);
  return rows.filter(isPublishPaymentPending);
}

async function renderPublishingPayment(){
  setMenu('publish_payment');
  const kw=$('search_kw')?.value||'';
  const {data,error}=await client.from('v_finance_orders').select('*').order('created_at',{ascending:false});
  if(error){showContent(`<div class="card"><div class="error">${error.message}</div></div>`);return}
  let rows=(data||[]).filter(r=>r.publishing_assignment_id);
  rows=await mergePublishingPayeeRows(rows);
  rows=searchRows(rows,kw,[r=>r.order_no,r=>r.service_name,r=>r.assigned_publishing_name,r=>r.journal_name,r=>r.publish_status,r=>r.finance_payment_status,r=>r.payee_name,r=>r.payee_account,r=>r.payee_account_type]);
  rows.sort((a,b)=>(isPublishPaymentPending(b)?1:0)-(isPublishPaymentPending(a)?1:0));
  const pending=rows.filter(isPublishPaymentPending).length;
  showContent(`<div class="card"><h2>发表打款</h2><div class="${pending?'warn':'success'}">${pending?`有 ${pending} 条发表订单待打款`:'当前没有待打款发表订单'}</div>${searchBox('renderPublishingPayment','订单编号/客服/发表部/期刊/状态/打款账号')}<div class="muted">共 ${rows.length} 条</div>${publishingPaymentTable(rows)}</div>`);

function openPublishPayEdit(paId,amount,status='未打款',paidAmount=0,notes='',orderId='',orderNo=''){
  const st=esc(status||'未打款');
  const amt=Number(paidAmount||amount||0);
  const mainHtml = `<label>打款状态</label>
    <select id="pubpay_status">
      <option value="未打款" ${st==='未打款'?'selected':''}>未打款</option>
      <option value="已打款" ${st==='已打款'?'selected':''}>已打款</option>
    </select>
    <label>打款金额</label>
    <input id="pubpay_amount" type="number" step="0.01" value="${amt}">
    <label>备注</label>
    <textarea id="pubpay_notes">${esc(notes||'')}</textarea>
    <button id="pubpaySaveBtn" onclick="savePublishPay('${paId}')">保存</button>
    <button class="ghost" onclick="closeModal()">取消</button>
    <div id="modalMsg"></div>`;
  openActionModalWithLogs('发表打款处理', mainHtml, orderId, orderNo);

async function savePublishPay(paId){
  const btn=$('pubpaySaveBtn');
  if(btn){btn.disabled=true;btn.innerText='保存中...'}
  const st=$('pubpay_status').value;
  const {error}=await client.rpc('confirm_publishing_payment',{
    p_assignment_id:paId,
    p_status:st,
    p_amount:Number($('pubpay_amount').value||0),
    p_notes:$('pubpay_notes').value.trim()
  });
  if(error){
    if(btn){btn.disabled=false;btn.innerText='保存'}
    msg('modalMsg','<div class="error">'+esc(error.message)+'</div>');
    return;
  }
  msg('modalMsg','<div class="success">保存成功，正在刷新...</div>');
  setTimeout(()=>{closeModal();renderPublishingPayment()},450);
}

    <div><label>期刊名称</label><input id="${prefix}name" value="${esc(j.journal_name||'')}"></div>

      <div style="padding:8px 0">
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" name="${prefix}included" value="知网" ${checked('知网')} style="width:auto"> 知网</label>
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" name="${prefix}included" value="维普" ${checked('维普')} style="width:auto"> 维普</label>
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" name="${prefix}included" value="万方" ${checked('万方')} style="width:auto"> 万方</label>
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" name="${prefix}included" value="三网全上" ${checked('三网全上')} style="width:auto"> 三网全上</label>
      </div>
    </div>
    <div><label>收稿方向</label><input id="${prefix}dir" value="${esc(j.accepted_directions||'')}"></div>
    <div><label>主办单位</label><input id="${prefix}organizer" value="${esc(j.organizer||'')}"></div>
    <div><label>出版周期</label><select id="${prefix}cycle"><option value="">请选择</option>${cycleOps}</select></div>
    <div><label>ISSN号</label><input id="${prefix}issn" value="${esc(j.issn_no||'')}"></div>
    <div><label>CN号</label><input id="${prefix}cn" value="${esc(j.cn_no||'')}"></div>
    <div><label>字符</label><input id="${prefix}char" value="${esc(j.char_count||'')}"></div>
    <div><label>版面费</label><input id="${prefix}page_fee" type="number" step="0.01" value="${j.page_fee??0}"></div>
    <div><label>编辑费</label><input id="${prefix}editor_fee" type="number" step="0.01" value="${j.editor_fee??0}"></div>
    <div><label>编辑联系方式类型</label><select id="${prefix}contact_type" onchange="toggleJournalContactFields('${prefix}')">${contactOps}</select></div>
    <div id="${prefix}contact_box"><label id="${prefix}contact_label">微信</label><input id="${prefix}contact_value" value="${esc(j.editor_contact_value||'')}"></div>
    <div class="full"><label>备注</label><input id="${prefix}notes" value="${esc(j.internal_notes||'')}"></div>
  </div>`;
}

function getJournalFormPayload(prefix){
  const included=[...document.querySelectorAll(`input[name="${prefix}included"]:checked`)].map(x=>x.value);
  const contactType=$(prefix+'contact_type')?.value||'微信';
  const contactValue=$(prefix+'contact_value')?.value.trim()||'';
  return {
    journal_name:$(prefix+'name').value.trim(),
    journal_level:'',
    included_databases:included,
    accepted_directions:$(prefix+'dir').value.trim(),
    organizer:$(prefix+'organizer').value.trim(),
    publish_cycle:$(prefix+'cycle').value||null,
    issn_no:$(prefix+'issn').value.trim(),
    cn_no:$(prefix+'cn').value.trim(),
    char_count:$(prefix+'char').value.trim(),
    customer_price:0,
    page_fee:Number($(prefix+'page_fee').value||0),
    editor_fee:Number($(prefix+'editor_fee').value||0),
    editor_contact_type:contactType,
    editor_contact_value:contactValue,
    editor_contact:contactValue ? `${contactType}：${contactValue}` : '',
    internal_notes:$(prefix+'notes').value.trim()
  };
}

function toggleJournalContactFields(prefix){
  const type=$(prefix+'contact_type')?.value||'微信';
  const label=$(prefix+'contact_label');
  const input=$(prefix+'contact_value');
  if(label)label.innerText=type==='QQ'?'QQ号':type==='手机'?'手机号':'微信号';
  if(input)input.placeholder=type==='QQ'?'请输入QQ号':type==='手机'?'请输入邮箱':'请输入微信号';
}

function formatIncludedDatabases(v){
  if(Array.isArray(v))return v.join('、');
  if(!v)return '';
  try{
    const parsed=JSON.parse(v);

async function renderReportView(){
    setMenu('reports');
    const end=todayISO();
    const start=new Date(Date.now()-6*864e5).toISOString().slice(0,10);
    showContent(`<div class="card"><h2>统计报表</h2><div class="form-grid"><div><label>开始日期</label><input id="report_start" type="date" value="${start}"></div><div><label>结束日期</label><input id="report_end" type="date" value="${end}"></div></div><button onclick="setReportRange('today')">今天</button><button onclick="setReportRange('7days')">最近7天</button><button onclick="setReportRange('month')">本月</button><button onclick="setReportRange('lastmonth')">上个月</button><button onclick="setReportRange('year')">今年</button><button class="secondary" onclick="queryReport()">查询</button><div id="reportBox"></div></div>`);
    queryReport();
  }
  function setReportRange(t){
    const d=new Date();
    let s=new Date(),e=new Date();
    if(t==='today'){s=new Date();}
    if(t==='7days'){s=new Date(Date.now()-6*864e5);}
    if(t==='month'){s=new Date(d.getFullYear(),d.getMonth(),1);}
    if(t==='lastmonth'){s=new Date(d.getFullYear(),d.getMonth()-1,1);e=new Date(d.getFullYear(),d.getMonth(),0);}
    if(t==='year'){s=new Date(d.getFullYear(),0,1);}
    $('report_start').value=s.toISOString().slice(0,10);
    $('report_end').value=e.toISOString().slice(0,10);
    queryReport();
  }
  async function queryReport(){
    const s=$('report_start').value+'T00:00:00';
    const e=$('report_end').value+'T23:59:59';
    const {data,error}=await client.from('v_admin_orders_full').select('*').gte('created_at',s).lte('created_at',e);
    if(error){$('reportBox').innerHTML='<div class="error">'+error.message+'</div>';return;}
    const rows=data||[];

    const total=sum(rows,'total_amount');
    const dep=sum(rows,'deposit_amount');
    const bal=sum(rows,'balance_amount');
    const refund=sum(rows,'refund_amount');
    const income=sumIncome(rows);
    const fee=sum(rows,'writer_fee');
    const page=sum(rows,'page_fee');
    const gross=grossProfit(rows);

    $('reportBox').innerHTML=`
      <div class="card report-summary-card" style="box-shadow:none;background:#f9fafb">
        <h3>汇总</h3>
        <div class="grid">
          ${metric('订单数',rows.length)}
          ${metric('成交金额',money(total))}
          ${metric('实收金额',money(dep))}
          ${metric('尾款',money(bal))}
          ${metric('退款',money(refund))}
          ${metric('实际收入',money(income))}
          ${metric('稿费',money(fee))}
          ${metric('版面费',money(page))}
          ${metric('毛利润',money(gross))}
          ${metric('毛利润率',pct(gross,income))}
          ${metric('稿费占比',pct(fee,income))}
          ${metric('版面费占比',pct(page,income))}
        </div>
        <div class="muted" style="margin-top:10px;line-height:1.7">
          说明：毛利润 = 实际收入 - 稿费 - 版面费；毛利润率 = 毛利润 ÷ 实际收入；稿费占比 = 稿费 ÷ 实际收入。
          净利润率需要等财务把客服提成、平台扣点、推广费、其他人工/杂费等完整成本录入后才能准确统计。
        </div>
      </div>
      ${groupTable('客服统计',group(rows,r=>r.service_name||'未指定'))}
      ${groupTable('业务统计',group(rows,r=>(r.business_category||'-')+' / '+(r.service_project||'-')))}
      ${groupTable('期刊统计',group(rows,r=>r.journal_name||'无期刊'))}`;
  }

  function sum(rows,k){return rows.reduce((a,r)=>a+Number(r[k]||0),0);}
  function rowIncome(r){return Number((r.actual_income??r.deposit_amount)||0);}
  function sumIncome(rows){return rows.reduce((a,r)=>a+rowIncome(r),0);}
  function rowGrossProfit(r){return rowIncome(r)-Number(r.writer_fee||0)-Number(r.page_fee||0);}
  function grossProfit(rows){return rows.reduce((a,r)=>a+rowGrossProfit(r),0);}
  function pct(part,base){return Number(base||0)>0?(Number(part||0)/Number(base||0)*100).toFixed(1)+'%':'-';}
  function metric(k,v){return `<div class="module"><h3>${v}</h3><div class="muted">${k}</div></div>`;}

  function group(rows,kf){
    const m={};
    rows.forEach(r=>{
      const k=kf(r);
      m[k]??={name:k,count:0,total:0,dep:0,income:0,fee:0,page:0,gross:0};
      m[k].count++;
      m[k].total+=Number(r.total_amount||0);
      m[k].dep+=Number(r.deposit_amount||0);
      m[k].income+=rowIncome(r);
      m[k].fee+=Number(r.writer_fee||0);
      m[k].page+=Number(r.page_fee||0);
      m[k].gross+=rowGrossProfit(r);
    });
    return Object.values(m).sort((a,b)=>b.income-a.income);
  }

async function markCustomerDelivered(orderId){
  if(!confirm('确认已经把稿子/成果交付给客户了吗？'))return;
  const {data,error}=await client.from('orders').select('total_amount,deposit_amount,refund_amount,created_by').eq('id',orderId).single();
  if(error){alert(error.message);return}
  if(currentProfile.role==='service'&&data?.created_by!==currentUser.id){alert('这是其他客服的订单，只能查看，不能确认交付。');return}
  const total=Number(data?.total_amount||0), received=Number(data?.deposit_amount||0), refund=Number(data?.refund_amount||0);
  let next='已交付客户';
  if(refund>0&&received<=0)next='已退款';
  else if(refund>0)next='部分退款';
  else if(total>0&&received>=total)next='已完成';
  const {error:upErr}=await client.from('orders').update({order_status:next}).eq('id',orderId);
  if(upErr){alert(upErr.message);return}
  if(activeMenu==='allorders')return currentProfile.role==='service'?renderServiceAllOrders():renderAllOrders();
  if(activeMenu==='myorders')return renderMyOrders();
  return routeAfterLogin();
}

  function groupLogsBySubmit(logs){
    const arr=[...(logs||[])].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const groups=[];
    arr.forEach(l=>{
      const t=new Date(l.created_at).getTime();
      const last=groups[groups.length-1];
      const userKey=(l.user_id||l.user_email||l.user_name||'system');
      if(last && last.userKey===userKey && Math.abs(t-last.lastTime)<=4000){
        last.logs.push(l);last.lastTime=t;last.created_at=l.created_at;
      }else{
        groups.push({userKey,created_at:l.created_at,lastTime:t,logs:[l]});
      }
    });
    return groups.reverse();
  }

  
function renderLogTimeline(logs){
    if(!logs.length)return '<div class="warn">暂无修改记录。</div>';
    const groups=groupLogsBySubmit(logs);

    function actionLabel(arr){
      const a=(arr||[]).map(x=>String(x||'').toUpperCase());
      if(a.includes('DELETE')) return '删除';
      if(a.includes('INSERT')) return '创建';
      return '修改';
    }

    function actionCountText(action,count){
      if(action==='创建') return '(当前数据)';
      return `有${count}处更改`;
    }

    function iconForChange(change){
      const k=String(change?.key||'');
      const l=String(change?.label||'');
      if(k.includes('date')||k.includes('due')||l.includes('时间')||l.includes('日期')) return '🗓️';
      if(k.includes('status')||l.includes('状态')) return '☑️';
      if(k.includes('fee')||k.includes('amount')||l.includes('金额')||l.includes('稿费')||l.includes('版面费')||l.includes('编辑费')) return '💴';
      if(k.includes('department')||l.includes('部')) return '🏷️';
      if(k.includes('writer')||l.includes('写手')||l.includes('作者')) return '📝';
      if(k.includes('journal')||l.includes('期刊')) return '📚';
      if(k.includes('contact')||l.includes('微信')||l.includes('QQ')||l.includes('手机')) return '📞';
      return '▣';
    }

    return `<div class="data-log-timeline">` + groups.map(g=>{
      const first=g.logs[0]||{};
      const user=(first.user_name||first.user_email||'系统');
      const avatar=(String(user).trim().charAt(0)||'系').toUpperCase();
      const actionsRaw=[...new Set(g.logs.map(l=>l.action).filter(Boolean))];
      const action=actionLabel(actionsRaw);
      const targets=[...new Set(g.logs.map(l=>targetTableLabel(l.target_table)).filter(Boolean))];

      let changes=[];
      g.logs.forEach(l=>{changes=changes.concat(summarizeLogChanges(l.detail));});
      const seen=new Set();
      changes=changes.filter(c=>{
        const key=[c.key,c.label,c.oldVal,c.newVal].join('|');
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      const isCreate = action==='创建';

      // V96：创建日志只显示“谁创建了订单 + 当前数据”，不展开创建时填写的全部字段。
      // 后续修改日志仍然展开显示“改了什么、从什么改到什么”。
      const shown=isCreate?[]:changes.slice(0,24);
      const targetHtml=(!isCreate&&targets.length)?`<div class="data-log-tagrow">${targets.map(t=>`<span class="data-log-tag">${esc(t)}</span>`).join('')}</div>`:'';
      const changesHtml = isCreate ? '' : (shown.length ? shown.map(c=>{
        const oldHtml = (c.oldVal!==undefined && c.oldVal!==null && String(c.oldVal)!=='')
          ? `<span class="data-log-old">${esc(String(c.oldVal))}</span>` : '';
        const newHtml = (c.newVal!==undefined && c.newVal!==null && String(c.newVal)!=='')
          ? `<span class="data-log-new">${esc(String(c.newVal))}</span>` : '';
        return `<div class="data-log-line">
          <div class="data-log-icon">${iconForChange(c)}</div>
          <div class="data-log-body">
            <div class="data-log-label">${esc(cleanLogLabel(c.label,c.key))}：</div>
            <div class="data-log-values">${oldHtml}${newHtml||'<span class="data-log-empty">空</span>'}</div>
          </div>
        </div>`;
      }).join('') : `<div class="data-log-line"><div class="data-log-icon">ℹ️</div><div class="data-log-body"><div class="data-log-empty">暂无字段变更</div></div></div>`);

      const more = (!isCreate&&changes.length>shown.length) ? `<div class="muted" style="margin-top:8px">另有 ${changes.length-shown.length} 项变更未展开显示。</div>` : '';

      return `<div class="data-log-card ${isCreate?'data-log-create-card':''}">
        <div class="data-log-top">
          <div class="data-log-userbox">
            <div class="data-log-avatar">${esc(avatar)}</div>
            <div>
              <div class="data-log-username">${esc(user)}</div>
              <div class="data-log-count">${actionCountText(action, changes.length||g.logs.length)}</div>
            </div>
          </div>
          <div class="data-log-meta">
            <div class="data-log-time">${fmtDate(g.created_at)}</div>
            <div class="data-log-action">${action}</div>
          </div>
        </div>
        ${targetHtml}
        ${changesHtml}
        ${more}
      </div>`;
    }).join('') + `</div>`;
  }

function targetTableLabel(t){
    return ({orders:'订单信息',writing_assignments:'写作信息',publishing_assignments:'发表信息',settlement_batches:'结算批次',settlement_batch_items:'结算明细',journals:'期刊信息',writers:'写手信息'}[t]||t||'系统记录');
  }

  
function logValuesSame(key,ov,nv){
    if(JSON.stringify(ov??'')===JSON.stringify(nv??''))return true;
    const k=String(key||'');
    const isDateKey=k.includes('date')||k.includes('time')||k.includes('due')||k.includes('_at');
    if(isDateKey){
      const a=new Date(ov),b=new Date(nv);
      if(!isNaN(a.getTime())&&!isNaN(b.getTime())){
        const diff=Math.abs(a.getTime()-b.getTime());
        if(diff<60000)return true;
        const off=Math.abs(new Date().getTimezoneOffset())*60000;
        if(off&&Math.abs(diff-off)<60000)return true;
        if(Math.abs(diff-8*60*60000)<60000)return true;
      }
    }
    return false;
  }

  
function isUuidLikeLogValue(v){
    const s=String(v??'').trim();
    return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
  }

  function isPureInternalLogKey(k){
    k=String(k||'');
    const hidden=new Set([
      'id','order_id','order_no','created_by','updated_by','deleted_by',
      'category_id','project_id','payment_method_id',
      'assigned_writing_user_id','assigned_publishing_user_id',
      'journal_id','writer_id','publishing_user_id','writing_user_id',
      'full_paid_confirmed_by','reviewed_by',
      'deposit_status','balance_status','contact_platform',
      'created_at','updated_at','deleted_at'
    ]);
    if(hidden.has(k))return true;
    if(k.endsWith('_id'))return true;
    return false;
  }

  function isUsefulLogChange(c){
    if(!c)return false;
    const key=String(c.key||'');
    const label=String(c.label||'');
    if(isPureInternalLogKey(key))return false;
    if((c.oldVal==='空'||c.oldVal===''||c.oldVal==null)&&(c.newVal==='空'||c.newVal===''||c.newVal==null))return false;

    // 没有中文字段名的技术字段不展示，避免 order_no / UUID 这类内容污染日志
    if(label==='自定义字段'||label==='字段'){
      return false;
    }

    // UUID 一般是业务大类、具体项目、人员、期刊等内部 ID，不直接展示给客服/管理员看
    if(isUuidLikeLogValue(c.oldVal)||isUuidLikeLogValue(c.newVal))return false;

    return true;
  }

  function normalizeLogChanges(out){
    out=(out||[]).filter(isUsefulLogChange);

    const grouped={};
    out.forEach(c=>{
      const key=(c.oldVal||'空')+'→'+(c.newVal||'空');
      (grouped[key]=grouped[key]||[]).push(c);
    });
    const res=[];
    Object.values(grouped).forEach(list=>{
      if(list.length===1){res.push(list[0]);return}
      const nonGeneric=list.filter(x=>x.label!=='自定义字段'&&x.label!=='字段');
      if(nonGeneric.length){
        const priority=nonGeneric.find(x=>x.key==='word_count'||x.label==='字数'||x.label==='字数要求')||nonGeneric[0];
        res.push(priority);
      }
    });
    const seen=new Set();
    return res.filter(c=>{
      const k=c.label+'|'+c.oldVal+'|'+c.newVal;
      if(seen.has(k))return false;
      seen.add(k);
      return true;
    });
  }

  function summarizeLogChanges(detail){
    const oldObj=detail?.old||{};
    const newObj=detail?.new||{};
    const ignore=new Set(['id','created_at','updated_at','deleted_at','deleted_by','updated_by']);
    const keys=[...new Set([...Object.keys(oldObj||{}),...Object.keys(newObj||{})])].filter(k=>!ignore.has(k));
    const out=[];
    keys.forEach(k=>{
      const ov=oldObj?oldObj[k]:undefined,nv=newObj?newObj[k]:undefined;
      if(k==='dynamic_values'){
        const ok=ov||{},nk=nv||{};
        const labels=Object.assign({},ok.__labels||{},nk.__labels||{});
        [...new Set([...Object.keys(ok),...Object.keys(nk)])].forEach(dk=>{
          if(dk==='__labels')return;
          if(!logValuesSame(dk,ok[dk],nk[dk]))out.push({key:dk,label:cleanLogLabel(labels[dk]||projectFieldLabels[dk]||fieldLabel(dk),dk),oldVal:fmtLogVal(ok[dk]),newVal:fmtLogVal(nk[dk])});
        });
      }else if(!logValuesSame(k,ov,nv)){
        out.push({key:k,label:cleanLogLabel(projectFieldLabels[k]||fieldLabel(k),k),oldVal:fmtLogVal(ov),newVal:fmtLogVal(nv)});
      }
    });
    return normalizeLogChanges(out);
  }

  function cleanLogLabel(label,key){
    const x=String(label||'');
    if(x.startsWith('f_')||(x===String(key)&&(String(key).startsWith('f_')||String(key).includes('_')))) return '自定义字段';
    return x||'字段';
  }

  function fieldLabel(k){
    const map={order_status:'订单状态',due_at:'交稿时间',total_amount:'订单总金额',order_no:'订单编号',deposit_amount:'实收金额',balance_amount:'尾款金额',refund_amount:'退款金额',word_count:'字数',title:'题目/主题',wechat_account:'微信号',taobao_account:'淘宝账号',customer_source:'客户来源',service_notes:'客服备注',payment_method_id:'付款方式',assigned_writing_user_id:'派给写作部',assigned_publishing_user_id:'派给发表部',writer_fee:'稿费',writer_name:'写手',writer_code:'写手编号',writing_manager_name:'写作部操作人',writing_status:'写作状态',writer_id:'写手',writing_notes:'写作备注',settlement_status:'结算状态',settled_amount:'已结算金额',publish_status:'发表状态',finance_payment_status:'财务打款状态',finance_payment_amount:'打款金额',journal_id:'期刊',publishing_notes:'发表备注',finance_notes:'财务备注',article_title:'文章题目',project_title:'课题题目',word_count_req:'字数要求',major_direction:'专业方向',publish_requirement:'发表要求',approval_status:'是否立项',project_level:'课题级别',subject_stage:'学段学科',course_topic:'微课主题',micro_topic:'微课主题',project_name:'项目名称',page_or_word_req:'页数/字数要求',format_requirement:'格式要求',customer_requirement:'客户要求'};
    return map[k]||k;
  }

  function fmtLogVal(v){
    if(v===null||v===undefined||v==='')return '空';
    if(typeof v==='object')return JSON.stringify(v);
    if(String(v).match(/^\d{4}-\d{2}-\d{2}T/))return fmtDate(v);
    return String(v);
  }

  async function openOrderLogs(orderId){
    await loadOrderLogsPanel(orderId);
  }


function writingReminderDone(r){
  const s=r?.writing_status||'';
  return ['已交给客服','已交稿','写作完成','终稿完成','已完成'].includes(s);
}

function writingDueInfo(r){
  if(!r?.due_at)return null;
  const due=new Date(r.due_at);
  if(isNaN(due.getTime()))return null;
  const diff=due.getTime()-Date.now();
  const hours=diff/36e5;
  if(hours<0){
    const overdueHours=Math.abs(hours);
    const text=overdueHours>=24?`已逾期 ${Math.ceil(overdueHours/24)} 天`:`已逾期 ${Math.ceil(overdueHours)} 小时`;
    return {level:'danger',sort:-999999+diff,text};
  }
  if(hours<=24){
    const text=hours<=1?'1小时内到期':`剩余 ${Math.ceil(hours)} 小时`;
    return {level:'warning',sort:diff,text};
  }
  return null;
}

function writingReminderKey(rows){
  const ids=(rows||[]).map(r=>`${r.order_id||r.id}:${r.due_at}:${r.writing_status||''}`).sort().join('|');
  const uid=currentUser?.id||'unknown';
  return `srx_writing_due_reminder_${uid}_${todayISO()}_${ids}`;
}

async function checkWritingDueReminder(reason='manual'){
  if(currentProfile?.role!=='writing')return;
  if(hasOpenModalOrEditing())return;
  try{
    const {data,error}=await client.from('v_writing_orders').select('*').order('due_at',{ascending:true});
    if(error)return;
    const rows=(data||[])
      .filter(r=>!writingReminderDone(r))
      .map(r=>({ ...r, __dueInfo: writingDueInfo(r) }))
      .filter(r=>r.__dueInfo)
      .sort((a,b)=>a.__dueInfo.sort-b.__dueInfo.sort)
      .slice(0,8);

    if(!rows.length)return;
    const key=writingReminderKey(rows);
    if(localStorage.getItem(key)==='1')return;
    showWritingDueReminder(rows,key);
  }catch(e){
    console.warn('写作提醒加载失败',e);
  }
}

function dismissWritingReminder(key){
  try{localStorage.setItem(key,'1')}catch(e){}
  closeModal();
}

function showWritingDueReminder(rows,key){
  const overdue=rows.filter(r=>r.__dueInfo.level==='danger').length;
  const soon=rows.filter(r=>r.__dueInfo.level==='warning').length;
  openModal(`<div class="writing-reminder-modal">
    <div class="writing-reminder-head">
      <div>
        <h2>写作交稿提醒</h2>
        <p>有 ${rows.length} 个订单需要关注：${overdue?`<span class="danger-text">${overdue} 个已逾期</span>`:''}${overdue&&soon?'，':''}${soon?`<span class="warn-text">${soon} 个24小时内到期</span>`:''}</p><p class="reminder-sub">系统会定时检查，即使电脑不关、账号一直在线，也会提醒。</p>
      </div>
      <button class="order-form-close" onclick="dismissWritingReminder('${key}')" title="关闭">×</button>
    </div>
    <div class="writing-reminder-list">
      ${rows.map(r=>`<div class="writing-reminder-item ${r.__dueInfo.level}">
        <div class="reminder-main">
          <div class="reminder-order">${esc(r.order_no||'-')} <span>${esc(r.business_category||'')}</span></div>
          <div class="reminder-title">${renderDynSummary(r)}</div>
          <div class="reminder-meta">交稿时间：${fmtDate(r.due_at)}｜客服：${esc(r.service_name||'-')}</div>
        </div>
        <div class="reminder-status">${esc(r.__dueInfo.text)}</div>
      </div>`).join('')}
    </div>
    <div class="writing-reminder-actions">
      <button onclick="dismissWritingReminder('${key}');renderWritingOrders()">查看写作订单</button>
      <button class="ghost" onclick="dismissWritingReminder('${key}')">我知道了</button>
    </div>
  </div>`);
}

function openModal(html){toggleMobileMenu(false);$('modalRoot').innerHTML=`<div class="modal-mask"><div class="modal">${html}</div></div>`;setTimeout(decorateTables,0)}function closeModal(){$('modalRoot').innerHTML=''}
let autoRefreshTimer=null;
let autoRefreshRunning=false;
const AUTO_REFRESH_MENUS=[
  'allorders','myorders','writing','publishing',
  'finance_home','finance_all','payment_confirm','publish_payment',
  'service_perf','settlement_review','settlement_summary','settlement_batches'
];

function hasOpenModalOrEditing(){
  const root=$('modalRoot');
  if(root && root.innerHTML.trim())return true;
  if(document.querySelector('.modal,.order-modal,.drawer,.action-modal'))return true;
  if(orderSaving)return true;
  return false;
}

async function refreshCurrentView(reason='auto'){
  if(!currentUser||!currentProfile)return;
  if(document.hidden)return;
  if(autoRefreshRunning)return;
  if(hasOpenModalOrEditing())return;
  if(!AUTO_REFRESH_MENUS.includes(activeMenu))return;

  autoRefreshRunning=true;
  try{
    await runMenuByKey(activeMenu);
  }catch(e){
    console.warn('自动刷新失败',e);
  }finally{
    autoRefreshRunning=false;
  }
  if(currentProfile?.role==='writing')checkWritingDueReminderSafe('after-refresh');
}

function startAutoRefresh(){
  if(autoRefreshTimer)clearInterval(autoRefreshTimer);
  autoRefreshTimer=setInterval(()=>refreshCurrentView('timer'),15000);
}
let writingReminderTimer=null;
let writingReminderChecking=false;

function startWritingReminderWatcher(){
  if(writingReminderTimer)clearInterval(writingReminderTimer);
  if(currentProfile?.role!=='writing')return;

  // 写作部电脑长期不关、不重新登录，所以不能只靠登录提醒。
  // 这里每30分钟检查一次，切回页面也检查一次；有弹窗/正在编辑时不打扰。
  writingReminderTimer=setInterval(()=>checkWritingDueReminder('timer'),30*60*1000);
}

async function checkWritingDueReminderSafe(reason='manual'){
  if(currentProfile?.role!=='writing')return;
  if(writingReminderChecking)return;
  writingReminderChecking=true;
  try{
    await checkWritingDueReminder(reason);
  }finally{
    writingReminderChecking=false;
  }
}


window.addEventListener('focus',()=>{refreshCurrentView('focus');checkWritingDueReminderSafe('focus')});
document.addEventListener('visibilitychange',()=>{if(!document.hidden){refreshCurrentView('visible');checkWritingDueReminderSafe('visible')}});

window.addEventListener('resize',()=>{if(window.innerWidth>768)toggleMobileMenu(false)});window.addEventListener('beforeunload',(e)=>{if(orderDraftMode&&orderDraftHasContent(collectOrderFormDraft())){autoSaveOrderDraft();e.preventDefault();e.returnValue=''}});window.addEventListener('load',loadApp);
</script></body></html>
