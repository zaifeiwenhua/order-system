function decorateTables(){document.querySelectorAll('table').forEach(table=>{const hs=[...table.querySelectorAll('thead th')].map(th=>th.textContent.trim());if(!hs.length)return;table.classList.add('mobile-card-table');table.querySelectorAll('tbody tr').forEach(tr=>{[...tr.children].forEach((td,i)=>{if(!td.dataset.label)td.dataset.label=hs[i]||''})})})}
function showContent(html){$('content').innerHTML=html;closeModal();setTimeout(decorateTables,0)}function getDyn(r,k){const v=r?.dynamic_values?.[k];if(v&&typeof v==='object'&&!Array.isArray(v))return v.value??'';return v??''}function formatDynValue(v){if(v===null||v===undefined||v==='')return'';if(Array.isArray(v))return v.join('、');if(typeof v==='object')return v.value??JSON.stringify(v);return String(v)}function pickDynByLabel(fields,dv,keywords){for(const f of fields||[]){const label=f.field_label||'';const hit=keywords.some(k=>label.includes(k));const val=formatDynValue(dv?.[f.field_key]);if(hit&&val)return val}return''}function renderDynSummary(r){const dv=r?.dynamic_values||{};const labels=dv.__labels||{};const entries=Object.entries(dv).filter(([k,v])=>k!=='__labels'&&formatDynValue(v));if(!entries.length){const t=mainTitle(r),w=mainWord(r);if(t&&t!=='-')return `<strong>${esc(t)}</strong>${w?`<br><span class="muted">${esc(w)}</span>`:''}`;return'-'}return entries.map(([k,v])=>{const label=labels[k]||projectFieldLabels[k]||fieldLabel(k)||k;const val=esc(formatDynValue(v));const hideLabel=String(label).startsWith('f_')||(String(label)===String(k)&&(String(k).startsWith('f_')||String(k).includes('_')));return hideLabel?`<div>${val}</div>`:`<div><span class="muted">${esc(label)}：</span>${val}</div>`}).join('')}function mainTitle(r){return r.title||getDyn(r,'project_title')||getDyn(r,'micro_topic')||getDyn(r,'course_topic')||getDyn(r,'article_title')||getDyn(r,'project_name')||'-'}function mainWord(r){return r.word_count||getDyn(r,'word_count_req')||getDyn(r,'page_or_word_req')||''}function rowClass(r){const st=r.order_status||'';if(closedStatus.includes(st))return'closed';const due=r.due_at?new Date(r.due_at).getTime():null;if(!due)return'';const h=(due-Date.now())/36e5;if(h<0)return'overdue';if(h<=24)return'due-soon';if(h<=48)return'due-warning';return''}function getCategoryNameById(id){return (categories.find(c=>c.id===id)?.name)||''}function publishFlowText(p,categoryId){return `${getCategoryNameById(categoryId)} ${p?.name||''} ${p?.code||''}`}function isPublishProject(p,categoryId){const t=publishFlowText(p,categoryId);return t.includes('发表')||t.includes('代发')||t.includes('写+发')||t.includes('写发')}function publishTypeByProject(p,categoryId){const t=publishFlowText(p,categoryId);if(t.includes('写+发')||t.includes('写发')||t.includes('写作+发表'))return'写作+发表';if(t.includes('代发')||t.includes('只发表')||t.includes('发表'))return'只发表';return'只发表'}function computedAutoOrderStatus(){const total=Number($('total_amount')?.value||0),received=Number($('deposit_amount')?.value||0),refund=Number($('refund_amount')?.value||0);const current=$('current_order_status')?.value||'';if(refund>0&&received<=0)return'已退款';if(refund>0&&received<total)return'部分退款';if(refund>0&&received>=total)return'部分退款';if(total>0&&received>=total)return'已收全款';if(['写作中','发表中'].includes(current))return current;const p=projects.find(x=>x.id===$('project_id')?.value);if(isPublishProject(p,$('category_id')?.value)&&publishTypeByProject(p,$('category_id')?.value)==='只发表')return'待发表部安排';return'待写作部安排'}function applyRefundChange(){const el=$('refund_amount'),lastEl=$('last_refund_amount'),recEl=$('deposit_amount');if(!el||!lastEl||!recEl)return;const next=Number(el.value||0),last=Number(lastEl.value||0);const delta=next-last;if(delta!==0){const rec=Number(recEl.value||0);recEl.value=money(Math.max(rec-delta,0));lastEl.value=String(next)}updateBalancePreview()}

async function renderHome(){setMenu('home');const rows=await fetchDashboardRows();const title=currentProfile.role==='admin'?'经营数据大屏｜全部订单':'我的业绩大屏';showContent(`<div class="screen"><div class="screen-title"><h2>${title}</h2><div class="time" id="dashTime"></div></div>${renderDashboard(rows)}</div>`);animateNums();setInterval(()=>{const t=$('dashTime');if(t)t.innerText=new Date().toLocaleString('zh-CN',{hour12:false})},1000)}
function renderDashboard(rows){const today=stats(rows,r=>isToday(r.created_at)),week=stats(rows,r=>isThisWeek(r.created_at)),month=stats(rows,r=>isThisMonth(r.created_at));const rank=groupRows(rows.filter(r=>isThisMonth(r.created_at)),r=>r.service_name||'未指定客服');const biz=groupRows(rows.filter(r=>isThisMonth(r.created_at)),r=>(r.business_category||'-')+' / '+(r.service_project||'-'));const recent=rows.slice(0,12);const overdue=rows.filter(r=>rowClass(r)==='overdue').length,dueSoon=rows.filter(r=>['due-soon','due-warning'].includes(rowClass(r))).length,unfinished=rows.filter(r=>!closedStatus.includes(r.order_status||'')).length;const ticker=(recent.length?recent:rows).concat(recent.length?recent:rows).map(r=>`<div class="ticker-item"><strong>${r.order_no}</strong>｜${esc(r.service_name||'')}｜${esc(r.service_project||'')}｜¥${money(r.total_amount)}｜${esc(mainTitle(r))}</div>`).join('');return`<div class="metric-mini">${bigMetric('今日订单',today.count)}${bigMetric('今日成交额','¥'+money(today.total))}${bigMetric('本周订单',week.count)}${bigMetric('本月成交额','¥'+money(month.total))}</div><div class="screen-grid"><div class="screen-card"><h3>本月客服排行榜</h3>${rank.slice(0,8).map((x,i)=>rankRow(i+1,x.name,x.count+'单 / ¥'+money(x.total))).join('')||'<div class="muted">暂无数据</div>'}</div><div class="screen-card"><h3>实时订单滚动</h3><div class="ticker"><div class="ticker-inner">${ticker||'<div class="ticker-item">暂无订单</div>'}</div></div></div><div class="screen-card"><h3>本月业务排行榜</h3>${biz.slice(0,8).map((x,i)=>rankRow(i+1,x.name,x.count+'单 / ¥'+money(x.total))).join('')||'<div class="muted">暂无数据</div>'}</div></div><div class="todo-grid"><div class="todo">快到期订单<br><span class="big-num" data-num="${dueSoon}">0</span></div><div class="todo">逾期未完成<br><span class="big-num" data-num="${overdue}">0</span></div><div class="todo">未完成订单<br><span class="big-num" data-num="${unfinished}">0</span></div></div>`}function bigMetric(label,val){return`<div class="metric-box"><div class="label">${label}</div><div class="num big-num" data-num="${String(val).replace(/[^\d.]/g,'')}" data-prefix="${String(val).startsWith('¥')?'¥':''}">0</div></div>`}function rankRow(i,n,v){return`<div class="rank-row"><b>${i}</b><span>${esc(n)}</span><b>${esc(v)}</b></div>`}function groupRows(rows,kf){const m={};rows.forEach(r=>{const k=kf(r);m[k]??={name:k,count:0,total:0};m[k].count++;m[k].total+=Number(r.total_amount||0)});return Object.values(m).sort((a,b)=>b.total-a.total)}function animateNums(){document.querySelectorAll('.big-num').forEach(el=>{const target=Number(el.dataset.num||0),prefix=el.dataset.prefix||'';let n=0,step=Math.max(target/30,1);const t=setInterval(()=>{n+=step;if(n>=target){n=target;clearInterval(t)}el.innerText=prefix+(prefix?money(n):Math.floor(n))},22)})}

async function loadBase(force=false){
  if(!force&&categories.length&&projects.length&&customerSources.length&&paymentMethods.length)return;
  const res=await Promise.all([
    client.from('business_categories').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
    client.from('service_projects').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
    client.from('customer_sources').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
    client.from('payment_methods').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
    client.from('profiles').select('id,email,phone,display_name,role,is_active,created_at').order('created_at',{ascending:false})
  ]);
  res.forEach(x=>{if(x.error)throw x.error});
  categories=res[0].data||[];projects=res[1].data||[];customerSources=res[2].data||[];paymentMethods=res[3].data||[];profiles=res[4].data||[];
  writingUsers=profiles.filter(p=>p.role==='writing'&&p.is_active);
  publishingUsers=profiles.filter(p=>p.role==='publishing'&&p.is_active);
}
async function getFields(pid){
  if(!pid)return[];
  if(fieldsCache[pid])return fieldsCache[pid];
  const {data,error}=await client.from('project_fields').select('*').eq('project_id',pid).eq('is_active',true).order('sort_order',{ascending:true});
  if(error)throw error;
  fieldsCache[pid]=data||[];
  (data||[]).forEach(f=>{projectFieldLabels[f.field_key]=f.field_label});
  return fieldsCache[pid];
}

  if(error)throw error;
  return data||[];
}

    openModal('<div class="order-form-shell"><div class="order-form-header"><h2>无权限</h2><button class="order-form-close" onclick="closeModal()">×</button></div><div class="order-form-body"><div class="error">当前账号没有录单权限。</div></div></div>');
    return;
  }
  await loadBase(true);
  let existing=null;
  if(orderId){
    // 修改订单时必须读取 orders 原表字段。
    // 之前读取的是展示视图，部分视图没有 category_id、project_id、payment_method_id 等 ID 字段，

      const view=currentProfile.role==='admin'?'v_admin_orders_full':'v_service_orders';
      r=await client.from(view).select('*').eq('id',orderId).single();
    }
    if(r.error){openModal(`<div class="order-form-shell"><div class="order-form-header"><h2>读取订单失败</h2><button class="order-form-close" onclick="closeModal()">×</button></div><div class="order-form-body"><div class="error">${esc(r.error.message)}</div></div></div>`);return}
    existing=r.data;
    try{
      const {data:pa}=await client.from('publishing_assignments').select('journal_id,publish_type').eq('order_id',orderId).maybeSingle();
      if(pa){existing.journal_id=pa.journal_id;existing.publish_type=pa.publish_type}
    }catch(e){}
  }
  const internal=currentProfile.role==='admin';
  journals=await loadJournals(internal);
  const catOps=categories.map(c=>`<option value="${c.id}" ${existing?.category_id===c.id?'selected':''}>${esc(c.name)}</option>`).join(''),

const ORDER_DRAFT_KEY='order_form_draft_v33';
let orderDraftMode=false,orderDraftDirty=false,orderDraftRestoring=false,orderDraftTimer=null;

function readOrderDraft(){
  try{return JSON.parse(localStorage.getItem(ORDER_DRAFT_KEY)||'null')}catch(e){return null}
}
function clearOrderDraft(){
  try{localStorage.removeItem(ORDER_DRAFT_KEY)}catch(e){}
  orderDraftDirty=false;
}
function setOrderField(id,val){
  const el=$(id);
  if(el)el.value=val??'';
}
function formatDraftTime(t){
  if(!t)return '';

}
function collectOrderFormDraft(){
  const dynamic_values={};
  document.querySelectorAll('[id^="dyn_"]').forEach(el=>{
    const k=el.id.replace(/^dyn_/,'');
    dynamic_values[k]=el.value;
  });
  const values={
    customer_source:$('customer_source')?.value||'',
    payment_method_id:$('payment_method_id')?.value||'',
    wechat_account:$('wechat_account')?.value||'',
    taobao_account:$('taobao_account')?.value||'',
    category_id:$('category_id')?.value||'',
    project_id:$('project_id')?.value||'',
    assigned_writing_user_id:$('assigned_writing_user_id')?.value||'',
    assigned_publishing_user_id:$('assigned_publishing_user_id')?.value||'',
    journal_id:$('journal_id')?.value||'',
    due_at:$('due_at')?.value||'',
    total_amount:$('total_amount')?.value||'',
    deposit_amount:$('deposit_amount')?.value||'',
    refund_amount:$('refund_amount')?.value||'',
    service_notes:$('service_notes')?.value||''
  };
  return {user_id:currentUser?.id||'',saved_at:new Date().toISOString(),values,dynamic_values};
}
function orderDraftHasContent(d){
  if(!d)return false;
  const v=d.values||{};
  const textKeys=['customer_source','payment_method_id','wechat_account','taobao_account','category_id','project_id','assigned_writing_user_id','assigned_publishing_user_id','journal_id','due_at','service_notes'];
  if(textKeys.some(k=>String(v[k]||'').trim()))return true;
  if(Number(v.total_amount||0)>0||Number(v.deposit_amount||0)>0||Number(v.refund_amount||0)>0)return true;
  return Object.values(d.dynamic_values||{}).some(x=>String(x||'').trim());
}
function autoSaveOrderDraft(){
  if(!orderDraftMode||orderDraftRestoring)return;
  const d=collectOrderFormDraft();
  if(orderDraftHasContent(d)){
    try{localStorage.setItem(ORDER_DRAFT_KEY,JSON.stringify(d));orderDraftDirty=true}catch(e){}
  }
}
function scheduleOrderDraftSave(){
  if(!orderDraftMode||orderDraftRestoring)return;
  clearTimeout(orderDraftTimer);
  orderDraftTimer=setTimeout(autoSaveOrderDraft,250);
}
function setupOrderDraftListeners(){
  const box=document.querySelector('.order-form-shell');
  if(!box||box.dataset.draftReady==='1')return;
  box.dataset.draftReady='1';
  box.addEventListener('input',scheduleOrderDraftSave,true);
  box.addEventListener('change',scheduleOrderDraftSave,true);
}
async function restoreOrderFormDraft(d){
  if(!d||!d.values)return;
  orderDraftRestoring=true;
  const v=d.values||{};
  setOrderField('customer_source',v.customer_source);
  setOrderField('payment_method_id',v.payment_method_id);
  setOrderField('wechat_account',v.wechat_account);
  setOrderField('taobao_account',v.taobao_account);
  setOrderField('category_id',v.category_id);
  if(v.category_id){await onCategoryChange(v.project_id||'')}
  setOrderField('project_id',v.project_id);
  if(v.project_id){await onProjectChange(v.project_id,d.dynamic_values||{},v.journal_id||'')}
  setOrderField('assigned_writing_user_id',v.assigned_writing_user_id);
  setOrderField('assigned_publishing_user_id',v.assigned_publishing_user_id);
  setOrderField('journal_id',v.journal_id);
  setOrderField('due_at',v.due_at);
  setOrderField('total_amount',v.total_amount);
  setOrderField('deposit_amount',v.deposit_amount);
  setOrderField('refund_amount',v.refund_amount);
  setOrderField('service_notes',v.service_notes);
  Object.entries(d.dynamic_values||{}).forEach(([k,val])=>setOrderField('dyn_'+k,val));
  updateBalancePreview();
  orderDraftRestoring=false;
  orderDraftDirty=true;
}
function manualSaveOrderDraft(){
  const d=collectOrderFormDraft();
  if(!orderDraftHasContent(d)){msg('orderFormMsg','<div class="warn">当前没有可保存的草稿内容。</div>');return}
  try{localStorage.setItem(ORDER_DRAFT_KEY,JSON.stringify(d));orderDraftDirty=true;msg('orderFormMsg','<div class="success">草稿已保存到本机，下次点击新增订单可继续填写。</div>')}
  catch(e){msg('orderFormMsg','<div class="error">草稿保存失败：'+esc(e?.message||e)+'</div>')}
}
function closeOrderFormModal(){
  if(orderDraftMode){
    autoSaveOrderDraft();
    const d=readOrderDraft();
    if(orderDraftHasContent(d)){
      const ok=confirm('当前订单还没有提交，内容已自动保存为本机草稿。确定关闭吗？');
      if(!ok)return;
    }
  }
  closeModal();
}
function initOrderDraftProtection(orderId){
  orderDraftMode=!orderId;
  orderDraftDirty=false;
  setupOrderDraftListeners();
  if(!orderDraftMode)return;
  const d=readOrderDraft();
  if(d&&d.user_id===currentUser?.id&&orderDraftHasContent(d)){
    setTimeout(async()=>{
      const ok=confirm('检测到一条未提交的订单草稿（保存于 '+formatDraftTime(d.saved_at)+'），是否继续填写？');
      if(ok){await restoreOrderFormDraft(d);msg('orderFormMsg','<div class="draft-notice">已恢复本机草稿。提交成功后草稿会自动清除。</div>')}
      else{clearOrderDraft();msg('orderFormMsg','<div class="warn">已放弃本机草稿。</div>')}
      setupOrderDraftListeners();
    },80);
  }
}

function updateBalancePreview(){const t=Number($('total_amount')?.value||0),r=Number($('deposit_amount')?.value||0);const bal=Math.max(t-r,0);if($('balance_preview'))$('balance_preview').value=bal.toFixed(2);if($('order_status_preview'))$('order_status_preview').value=computedAutoOrderStatus()}async function onCategoryChange(selected=''){const cid=$('category_id').value,list=projects.filter(p=>p.category_id===cid);$('project_id').innerHTML='<option value="">请选择</option>'+list.map(p=>`<option value="${p.id}" ${selected===p.id?'selected':''}>${esc(p.name)}</option>`).join('');$('dynamicFieldsBox').innerHTML='';$('publishExtraBox').innerHTML=''}async function onProjectChange(selected='',vals={},selectedJournal=''){const pid=selected||$('project_id').value,box=$('dynamicFieldsBox'),p=projects.find(x=>x.id===pid);if(!pid){box.innerHTML='';return}if(isPublishProject(p,$('category_id')?.value)){const ops=journals.map(j=>`<option value="${j.id}" ${selectedJournal===j.id?'selected':''}>${esc(j.journal_name)}｜${esc(j.journal_level||'')}｜客户价¥${money(j.customer_price)}</option>`).join('');$('publishExtraBox').innerHTML=`<div class="card" style="box-shadow:none;background:#f9fafb"><h3>发表信息</h3><label>选择期刊</label><select id="journal_id"><option value="">请选择期刊</option>${ops}</select><div class="muted">期刊来自“期刊管理”，客服可先在期刊管理里搜索。</div></div>`}else{$('publishExtraBox').innerHTML=''}const fields=await getFields(pid);box.innerHTML=fields.length?`<div class="card" style="box-shadow:none;background:#f9fafb"><h3>项目专属字段</h3><div class="form-grid">${fields.map(f=>dynField(f,vals[f.field_key])).join('')}</div></div>`:'<div class="warn">该项目暂无专属字段。</div>'}function dynField(f,val=''){const label=esc(f.field_label)+(f.is_required?' *':''),id='dyn_'+f.field_key;if(f.field_type==='textarea')return`<div class="full"><label>${label}</label><textarea id="${id}">${esc(val||'')}</textarea></div>`;if(f.field_type==='select'){const opts=Array.isArray(f.options)?f.options:[];return`<div><label>${label}</label><select id="${id}"><option value="">请选择</option>${opts.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`}const type=f.field_type==='number'?'number':f.field_type==='date'?'date':f.field_type==='datetime'?'datetime-local':'text';return`<div><label>${label}</label><input id="${id}" type="${type}" value="${esc(val||'')}" /></div>`}

async function saveOrder(orderId=null){
  if(orderSaving)return;
  msg('orderFormMsg','');
  setOrderSubmitState(true);
  try{
    const wechat=$('wechat_account').value.trim(),taobao=$('taobao_account').value.trim();
    if(!wechat&&!taobao){msg('orderFormMsg','<div class="error">微信号和淘宝账号至少填一个。</div>');return}
    const categoryId=$('category_id').value,projectId=$('project_id').value;

    const fields=await getFields(projectId),dv={};
    const dynLabels={};
    for(const f of fields){
      const el=$('dyn_'+f.field_key);if(!el)continue;
      let v=el.value;
      if(f.is_required&&!v){msg('orderFormMsg',`<div class="error">请填写：${esc(f.field_label)}</div>`);return}
      dv[f.field_key]=v;dynLabels[f.field_key]=f.field_label;
    }
    dv.__labels=dynLabels;
    const project=projects.find(p=>p.id===projectId);
    const title=pickDynByLabel(fields,dv,['题目','主题','名称','标题'])||dv.project_title||dv.micro_topic||dv.course_topic||dv.article_title||dv.project_name||'';
    const word=pickDynByLabel(fields,dv,['字数','页数'])||dv.word_count_req||dv.page_or_word_req||'';
    const total=Number($('total_amount').value||0),received=Number($('deposit_amount').value||0),refund=Number($('refund_amount').value||0);
    const payload={
      category_id:categoryId,project_id:projectId,
      assigned_writing_user_id:$('assigned_writing_user_id').value||null,
      assigned_publishing_user_id:$('assigned_publishing_user_id').value||null,
      payment_method_id:$('payment_method_id').value||null,
      wechat_account:wechat||null,taobao_account:taobao||null,customer_source:$('customer_source').value||null,contact_platform:'微信',
      title:title||null,word_count:word||null,customer_requirements:null,format_requirements:null,due_at:toISO($('due_at').value),dynamic_values:dv,
      order_status:computedAutoOrderStatus(),total_amount:total,deposit_amount:received,
      deposit_status:received>0?'已收':'未收',balance_status:(Math.max(total-received,0)<=0?'已收齐':'未收齐'),refund_amount:refund,
      service_notes:$('service_notes').value.trim()
    };
    let orderData,err;
    if(orderId){const r=await client.from('orders').update(payload).eq('id',orderId).select('id,order_no').single();orderData=r.data;err=r.error}
    else{payload.created_by=currentUser.id;const r=await client.from('orders').insert(payload).select('id,order_no').single();orderData=r.data;err=r.error}
    if(err){msg('orderFormMsg','<div class="error">'+esc(err.message)+'</div>');return}
    if(isPublishProject(project,categoryId)){
      const pa={order_id:orderData.id,publishing_user_id:$('assigned_publishing_user_id').value||null,journal_id:$('journal_id')?.value||null,publish_type:publishTypeByProject(project,categoryId),publish_status:'待审核'};
      const {error:paErr}=await client.from('publishing_assignments').upsert(pa,{onConflict:'order_id'});
      if(paErr){msg('orderFormMsg','<div class="error">订单已保存，但发表任务保存失败：'+esc(paErr.message)+'</div>');return}
    }
    if(!orderId)clearOrderDraft();
    msg('orderFormMsg',`<div class="success">保存成功，订单编号：${esc(orderData.order_no)}，正在刷新列表...</div>`);
    setTimeout(()=>{closeModal();refreshOrderListAfterSave()},650);
  }catch(e){
    msg('orderFormMsg','<div class="error">保存失败：'+esc(e?.message||e)+'</div>');
  }finally{
    setOrderSubmitState(false);
  }
}

async function openWritingEdit(orderId){await loadWriters();const {data}=await client.from('v_writing_orders').select('*').eq('order_id',orderId).single();const opts=writers.map(w=>`<option value="${w.id}" ${data?.writer_id===w.id?'selected':''}>${esc(w.writer_name)}（${esc(w.writer_code)}）</option>`).join('');openModal(`<h2>登记写作信息</h2><label>写手</label><select id="edit_writer_id"><option value="">请选择写手</option>${opts}</select><label>稿费</label><input id="edit_writer_fee" type="number" step="0.01" value="${data?.writer_fee??0}" /><label>写作状态</label><select id="edit_writing_status">${['待安排','写作中','初稿完成','修改中','已交稿','写作完成','终稿完成','已完成'].map(s=>`<option value="${s}" ${data?.writing_status===s?'selected':''}>${s}</option>`).join('')}</select><label>写作备注</label><textarea id="edit_writing_notes">${esc(data?.writing_notes||'')}</textarea><button onclick="saveWritingEdit('${orderId}')">保存</button><button class="ghost" onclick="closeModal()">取消</button><div id="modalMsg"></div>`)}async function saveWritingEdit(orderId){const writingStatus=$('edit_writing_status').value;const payload={order_id:orderId,writing_manager_id:currentUser.id,writer_id:$('edit_writer_id').value||null,writer_fee:Number($('edit_writer_fee').value||0),writing_status:writingStatus,writing_notes:$('edit_writing_notes').value.trim()};const {error}=await client.from('writing_assignments').upsert(payload,{onConflict:'order_id'});if(error){msg('modalMsg','<div class="error">'+error.message+'</div>');return}const {data:pa}=await client.from('publishing_assignments').select('publish_type').eq('order_id',orderId).maybeSingle();const done=['已交稿','写作完成','终稿完成','已完成'].includes(writingStatus);const isWritePublish=pa&&['写作+发表','写+发'].includes(pa.publish_type);const nextStatus=(isWritePublish&&done)?'待发表部安排':'写作中';await client.from('orders').update({order_status:nextStatus}).eq('id',orderId).neq('order_status','已收全款').neq('order_status','已退款').neq('order_status','部分退款').neq('order_status','已取消').neq('order_status','退款/异常');closeModal();renderWritingOrders()}
async function renderPublishingOrders(){setMenu('publishing');await loadAllFieldLabels();const kw=$('search_kw')?.value||'';const {data,error}=await client.from('v_publishing_orders').select('*').order('created_at',{ascending:false});if(error){showContent(`<div class="card"><div class="error">${error.message}</div></div>`);return}const rows=searchRows(data||[],kw,[r=>r.order_no,r=>r.service_name,r=>r.business_category,r=>r.service_project,r=>mainTitle(r),r=>r.journal_name,r=>r.publish_status]);showContent(`<div class="card"><h2>发表订单</h2><div class="info">代发/只发表订单会直接进入发表部；写+发订单需写作部标记“已交稿/写作完成”后进入发表部。</div>${searchBox('renderPublishingOrders','订单编号/客服/题目/期刊/状态')}<div class="muted">共 ${rows.length} 条</div>${publishingTable(rows)}</div>`);if(kw)$('search_kw').value=kw}function publishingTable(rows){if(!rows.length)return'<div class="warn">暂无发表订单。</div>';return`<div class="table-wrap"><table><thead><tr><th>编号</th><th>客服</th><th>类型</th><th>业务/项目</th><th>文章信息</th><th>期刊</th><th>客户价/版面费</th><th>编辑联系方式</th><th>发表状态</th><th>财务打款</th><th>操作</th></tr></thead><tbody>${rows.map(r=>`<tr class="${rowClass(r)}"><td><strong>${r.order_no}</strong></td><td>${r.service_name||'-'}</td><td>${r.publish_type}</td><td>${r.business_category}<br>${r.service_project}</td><td>${renderDynSummary(r)}</td><td>${r.journal_name||'-'}<br>${r.journal_level||''}<br>${r.publish_cycle||''}</td><td>客户价：${r.customer_price?money(r.customer_price):'-'}<br>版面费：${r.page_fee?money(r.page_fee):'-'}</td><td>${esc(r.editor_contact||'-')}</td><td>${r.publish_status}</td><td>${r.finance_payment_status}<br>${r.finance_payment_amount?money(r.finance_payment_amount):''}</td><td><button onclick="openPublishingEdit('${r.publishing_assignment_id}')">处理</button></td></tr>`).join('')}</tbody></table></div>`}async function openPublishingEdit(paId){const {data}=await client.from('v_publishing_orders').select('*').eq('publishing_assignment_id',paId).single();const js=await loadJournals(true);const ops=js.map(j=>`<option value=" async function renderPaymentConfirmation(){
  setMenu('payment_confirm');
  const kw=$('search_kw')?.value||'';
  const {data,error}=await client.from('v_payment_confirmation_orders').select('*').order('created_at',{ascending:false});
  if(error){showContent(`<div class="card"><div class="error">${error.message}</div></div>`);return}
  let rows=searchRows(data||[],kw,[r=>r.order_no,r=>r.service_name,r=>r.wechat_account,r=>r.taobao_account,r=>r.business_category,r=>r.service_project,r=>mainTitle(r),r=>r.full_paid_status]);
  window.__paymentConfirmRows=rows;
  showContent(`<div class="card"><h2>收款确认</h2><div class="info">客服工资只按“全款收齐时间”统计。去年接的单，只要本月收齐，就算本月业绩。</div>${searchBox('renderPaymentConfirmation','订单编号/客服/微信/淘宝/业务/题目/收齐状态')}<button class="ghost" onclick="exportPaymentConfirmRows()">导出当前结果</button><div class="muted">共 ${rows.length} 条</div>${paymentConfirmTable(rows)}</div>`);

function paymentConfirmTable(rows){
  if(!rows.length)return'<div class="warn">暂无订单。</div>';
  return `<div class="table-wrap"><table><thead><tr><th>订单编号</th><th>客服</th><th>业务/项目</th><th>客户账号</th><th>订单信息</th><th>金额</th><th>收齐状态</th><th>操作</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${r.order_no}</strong><br>${fmtDate(r.created_at)}</td><td>${r.service_name||'-'}</td><td>${r.business_category||'-'}<br>${r.service_project||'-'}</td><td>微信：${r.wechat_account||'-'}<br>淘宝：${r.taobao_account||'-'}</td><td>${renderDynSummary(r)}</td><td>总：${money(r.total_amount)}<br>实收：${money(r.deposit_amount)}<br>尾：${money(r.balance_amount)}<br>退：${money(r.refund_amount)}<br>业绩：${money(r.performance_amount||r.actual_income||0)}</td><td>${r.full_paid_at?'已收齐':'未收齐'}<br>${fmtDate(r.full_paid_at)}<br><span class="muted">${esc(r.full_paid_notes||'')}</span></td><td><button onclick="openFullPaidConfirm('${r.order_id}',${Number(r.performance_amount||r.actual_income||r.total_amount||0)})">确认/修改收齐</button>${r.full_paid_at?`<button class="ghost" onclick="clearFullPaid('${r.order_id}')">取消收齐</button>`:''}</td></tr>`).join('')}</tbody></table></div>`;
}
function openFullPaidConfirm(orderId,amount){
  const now=new Date().toISOString().slice(0,16);
  openModal(`<h2>确认全款收齐</h2><div class="info">客服业绩按这里填写的“全款收齐时间”归属月份统计。</div><label>全款收齐时间</label><input id="fp_at" type="datetime-local" value="${now}"><label>本单收齐业绩金额</label><input id="fp_amount" type="number" step="0.01" value="${money(amount)}"><label>收款备注</label><textarea id="fp_notes" placeholder="如：尾款已收齐、补尾款、特殊说明等"></textarea><button onclick="saveFullPaid('${orderId}')">保存确认</button><button class="ghost" onclick="closeModal()">取消</button><div id="modalMsg"></div>`);
}
async function saveFullPaid(orderId){
  const {error}=await client.rpc('confirm_order_full_paid',{p_order_id:orderId,p_full_paid_at:toISO($('fp_at').value),p_performance_amount:Number($('fp_amount').value||0),p_notes:$('fp_notes').value.trim()});
  if(error){msg('modalMsg','<div class="error">'+esc(error.message)+'</div>');return}
  closeModal();renderPaymentConfirmation();
}
async function clearFullPaid(orderId){
  if(!confirm('确定取消该订单的全款收齐记录吗？取消后不会计入客服业绩。'))return;
  const {error}=await client.rpc('clear_order_full_paid',{p_order_id:orderId});
  if(error){alert(error.message);return}
  renderPaymentConfirmation();
}

  return `<div class="form-grid">
    <div><label>期刊名称</label><input id="${prefix}name" value="${esc(j.journal_name||'')}"></div>
    <div><label>收录情况</label>
      <div style="padding:8px 0">
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" name="${prefix}included" value="知网" ${checked('知网')} style="width:auto"> 知网</label>
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" name="${prefix}included" value="维普" ${checked('维普')} style="width:auto"> 维普</label>
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" name="${prefix}included" value="万方" ${checked('万方')} style="width:auto"> 万方</label>
        <label style="display:inline-block;margin-right:14px"><input type="checkbox" name="${prefix}included" value="三网全上" ${checked('三网全上')} style="width:auto"> 三网全上</label>
      </div>
    </div>
    <div><label>收稿方向</label><input id="${prefix}dir" value="${esc(j.accepted_directions||'')}"></div>
    <div><label>主办单位</label><input id="${prefix}organizer" value="${esc(j.organizer||'')}"></div>
    <div><label>出版周期</label><select id="${prefix}cycle"><option value="">请选择</option>${cycleOps}</select></div>
    <div><label>ISSN号</label><input id="${prefix}issn" value="${esc(j.issn_no||'')}"></div>
    <div><label>CN号</label><input id="${prefix}cn" value="${esc(j.cn_no||'')}"></div>
    <div><label>字符</label><input id="${prefix}char" value="${esc(j.char_count||'')}"></div>
    <div><label>版面费</label><input id="${prefix}page_fee" type="number" step="0.01" value="${j.page_fee??0}"></div>
    <div><label>编辑费</label><input id="${prefix}editor_fee" type="number" step="0.01" value="${j.editor_fee??0}"></div>
    <div><label>编辑联系方式类型</label><select id="${prefix}contact_type" onchange="toggleJournalContactFields('${prefix}')">${contactOps}</select></div>
    <div id="${prefix}contact_box"><label id="${prefix}contact_label">微信</label><input id="${prefix}contact_value" value="${esc(j.editor_contact_value||'')}"></div>
    <div class="full"><label>备注</label><input id="${prefix}notes" value="${esc(j.internal_notes||'')}"></div>
  </div>`;
}

function getJournalFormPayload(prefix){
  const included=[...document.querySelectorAll(`input[name="${prefix}included"]:checked`)].map(x=>x.value);
  const contactType=$(prefix+'contact_type')?.value||'微信';
  const contactValue=$(prefix+'contact_value')?.value.trim()||'';
  return {
    journal_name:$(prefix+'name').value.trim(),
    journal_level:'',
    included_databases:included,
    accepted_directions:$(prefix+'dir').value.trim(),
    organizer:$(prefix+'organizer').value.trim(),
    publish_cycle:$(prefix+'cycle').value||null,
    issn_no:$(prefix+'issn').value.trim(),
    cn_no:$(prefix+'cn').value.trim(),
    char_count:$(prefix+'char').value.trim(),
    customer_price:0,
    page_fee:Number($(prefix+'page_fee').value||0),
    editor_fee:Number($(prefix+'editor_fee').value||0),
    editor_contact_type:contactType,
    editor_contact_value:contactValue,
    editor_contact:contactValue ? `${contactType}：${contactValue}` : '',
    internal_notes:$(prefix+'notes').value.trim()
  };
}

function toggleJournalContactFields(prefix){
  const type=$(prefix+'contact_type')?.value||'微信';
  const label=$(prefix+'contact_label');
  const input=$(prefix+'contact_value');
  if(label)label.innerText=type==='QQ'?'QQ号':type==='手机'?'手机号':'微信号';
  if(input)input.placeholder=type==='QQ'?'请输入QQ号':type==='手机'?'请输入手机号':'请输入微信号';
}

function formatIncludedDatabases(v){
  if(Array.isArray(v))return v.join('、');
  if(!v)return '';
  try{
    const parsed=JSON.parse(v);
    return Array.isArray(parsed)?parsed.join('、'):String(v);
  }catch(e){return String(v)}
}

function formatJournalContact(j){
  if(j.editor_contact_type&&j.editor_contact_value)return `${j.editor_contact_type}：${j.editor_contact_value}`;
  return j.editor_contact||'';
}

function journalServiceTable(rows){
  if(!rows.length)return'<div class="warn">暂无期刊。</div>';
  return`<div class="table-wrap"><table><thead><tr><th>期刊名称</th><th>收录情况</th><th>收稿方向</th><th>主办单位</th><th>出版周期</th><th>ISSN号</th><th>CN号</th><th>字符</th></tr></thead><tbody>${rows.map(j=>`<tr><td>${esc(j.journal_name)}</td><td>${esc(formatIncludedDatabases(j.included_databases))}</td><td>${esc(j.accepted_directions||'')}</td><td>${esc(j.organizer||'')}</td><td>${esc(j.publish_cycle||'')}</td><td>${esc(j.issn_no||'')}</td><td>${esc(j.cn_no||'')}</td><td>${esc(j.char_count||'')}</td></tr>`).join('')}</tbody></table></div>`;
}

function journalInternalTable(rows){
  if(!rows.length)return'<div class="warn">暂无期刊。</div>';
  return`<div class="table-wrap"><table><thead><tr><th>期刊名称</th><th>收录情况</th><th>收稿方向</th><th>主办单位</th><th>出版周期</th><th>ISSN号</th><th>CN号</th><th>字符</th><th>版面费</th><th>编辑费</th><th>编辑联系方式</th><th>备注</th><th>操作</th></tr></thead><tbody>${rows.map(j=>`<tr><td>${esc(j.journal_name)}</td><td>${esc(formatIncludedDatabases(j.included_databases))}</td><td>${esc(j.accepted_directions||'')}</td><td>${esc(j.organizer||'')}</td><td>${esc(j.publish_cycle||'')}</td><td>${esc(j.issn_no||'')}</td><td>${esc(j.cn_no||'')}</td><td>${esc(j.char_count||'')}</td><td>${money(j.page_fee)}</td><td>${money(j.editor_fee)}</td><td>${esc(formatJournalContact(j))}</td><td>${esc(j.internal_notes||'')}</td><td><button class="ghost" onclick="openJournalEdit('${j.id}')">修改</button><button class="danger" onclick="disableJournal('${j.id}')">删除</button></td></tr>`).join('')}</tbody></table></div>`;

async function addJournal(){
  const payload=getJournalFormPayload('j_');
  if(!payload.journal_name){msg('journalMsg','<div class="error">期刊名称必填。</div>');return}
  const {error}=await client.from('journals').insert(payload);
  if(error){msg('journalMsg','<div class="error">'+error.message+'</div>');return}
  renderJournalManage();
}

async function openJournalEdit(id){
  const rows=await loadJournals(true);
  const j=rows.find(x=>x.id===id);
  if(!j){alert('没有找到期刊');return}
  openModal(`<h2>修改期刊</h2>${journalFormHtml('edit_j_',j)}<button onclick="saveJournalEdit('${id}')">保存修改</button><button class="ghost" onclick="closeModal()">取消</button><div id="modalMsg"></div>`);
  toggleJournalContactFields('edit_j_');
}

async function saveJournalEdit(id){
  const payload=getJournalFormPayload('edit_j_');
  if(!payload.journal_name){msg('modalMsg','<div class="error">期刊名称必填。</div>');return}
  const {error}=await client.from('journals').update(payload).eq('id',id);
  if(error){msg('modalMsg','<div class="error">'+error.message+'</div>');return}
  closeModal();
  renderJournalManage();
}

async function disableJournal(id){
  if(!confirm('确认删除/停用这个期刊吗？'))return;
  await client.from('journals').update({is_active:false}).eq('id',id);
  renderJournalManage();
}

async function renderReportView(){
    setMenu('reports');
    const end=todayISO();
    const start=new Date(Date.now()-6*864e5).toISOString().slice(0,10);
    showContent(`<div class="card"><h2>统计报表</h2><div class="form-grid"><div><label>开始日期</label><input id="report_start" type="date" value="${start}"></div><div><label>结束日期</label><input id="report_end" type="date" value="${end}"></div></div><button onclick="setReportRange('today')">今天</button><button onclick="setReportRange('7days')">最近7天</button><button onclick="setReportRange('month')">本月</button><button onclick="setReportRange('lastmonth')">上个月</button><button onclick="setReportRange('year')">今年</button><button class="secondary" onclick="queryReport()">查询</button><div id="reportBox"></div></div>`);
    queryReport();
  }
  function setReportRange(t){
    const d=new Date();
    let s=new Date(),e=new Date();
    if(t==='today'){s=new Date();}
    if(t==='7days'){s=new Date(Date.now()-6*864e5);}
    if(t==='month'){s=new Date(d.getFullYear(),d.getMonth(),1);}
    if(t==='lastmonth'){s=new Date(d.getFullYear(),d.getMonth()-1,1);e=new Date(d.getFullYear(),d.getMonth(),0);}
    if(t==='year'){s=new Date(d.getFullYear(),0,1);}
    $('report_start').value=s.toISOString().slice(0,10);
    $('report_end').value=e.toISOString().slice(0,10);
    queryReport();
  }
  async function queryReport(){
    const s=$('report_start').value+'T00:00:00';
    const e=$('report_end').value+'T23:59:59';
    const {data,error}=await client.from('v_admin_orders_full').select('*').gte('created_at',s).lte('created_at',e);
    if(error){$('reportBox').innerHTML='<div class="error">'+error.message+'</div>';return;}
    const rows=data||[];
    const total=sum(rows,'total_amount'),dep=sum(rows,'deposit_amount'),bal=sum(rows,'balance_amount'),refund=sum(rows,'refund_amount'),income=sum(rows,'actual_income'),fee=sum(rows,'writer_fee'),page=sum(rows,'page_fee');
    $('reportBox').innerHTML=`<div class="card" style="box-shadow:none;background:#f9fafb"><h3>汇总</h3><div class="grid">${metric('订单数',rows.length)}${metric('成交金额',money(total))}${metric('实收金额',money(dep))}${metric('尾款',money(bal))}${metric('退款',money(refund))}${metric('实际收入',money(income))}${metric('稿费',money(fee))}${metric('版面费',money(page))}${metric('毛利润',money(income-fee-page))}</div></div>${groupTable('客服统计',group(rows,r=>r.service_name||'未指定'))}${groupTable('业务统计',group(rows,r=>(r.business_category||'-')+' / '+(r.service_project||'-')))}${groupTable('期刊统计',group(rows,r=>r.journal_name||'无期刊'))}`;
  }
  function sum(rows,k){return rows.reduce((a,r)=>a+Number(r[k]||0),0);}
  function metric(k,v){return `<div class="module"><h3>${v}</h3><div class="muted">${k}</div></div>`;}
  function group(rows,kf){
    const m={};
    rows.forEach(r=>{const k=kf(r);m[k]??={name:k,count:0,total:0,dep:0,fee:0,page:0};m[k].count++;m[k].total+=Number(r.total_amount||0);m[k].dep+=Number(r.deposit_amount||0);m[k].fee+=Number(r.writer_fee||0);m[k].page+=Number(r.page_fee||0);});
    return Object.values(m);
  }
  function groupTable(title,rows){
    return `<h3>${title}</h3><div class="table-wrap"><table><thead><tr><th>名称</th><th>订单数</th><th>成交金额</th><th>实收金额</th><th>稿费</th><th>版面费</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.name)}</td><td>${r.count}</td><td>${money(r.total)}</td><td>${money(r.dep)}</td><td>${money(r.fee)}</td><td>${money(r.page)}</td></tr>`).join('')}</tbody></table></div>`;
  }

  function groupLogsBySubmit(logs){
    const arr=[...(logs||[])].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const groups=[];
    arr.forEach(l=>{
      const t=new Date(l.created_at).getTime();
      const last=groups[groups.length-1];
      const userKey=(l.user_id||l.user_email||l.user_name||'system');
      if(last && last.userKey===userKey && Math.abs(t-last.lastTime)<=4000){
        last.logs.push(l);last.lastTime=t;last.created_at=l.created_at;
      }else{
        groups.push({userKey,created_at:l.created_at,lastTime:t,logs:[l]});
      }
    });
    return groups.reverse();
  }

  
function renderLogTimeline(logs){
    if(!logs.length)return '<div class="warn">暂无修改记录。</div>';
    const groups=groupLogsBySubmit(logs);

    function actionLabel(arr){
      const a=(arr||[]).map(x=>String(x||'').toUpperCase());
      if(a.includes('DELETE')) return '删除';
      if(a.includes('INSERT')) return '创建';
      return '修改';
    }

    function actionCountText(action,count){
      if(action==='创建') return '(当前数据)';
      return `有${count}处更改`;
    }

    function iconForChange(change){
      const k=String(change?.key||'');
      const l=String(change?.label||'');
      if(k.includes('date')||k.includes('due')||l.includes('时间')||l.includes('日期')) return '🗓️';
      if(k.includes('status')||l.includes('状态')) return '☑️';
      if(k.includes('fee')||k.includes('amount')||l.includes('金额')||l.includes('稿费')||l.includes('版面费')||l.includes('编辑费')) return '💴';
      if(k.includes('department')||l.includes('部')) return '🏷️';
      if(k.includes('writer')||l.includes('写手')||l.includes('作者')) return '📝';
      if(k.includes('journal')||l.includes('期刊')) return '📚';
      if(k.includes('contact')||l.includes('微信')||l.includes('QQ')||l.includes('手机')) return '📞';
      return '▣';
    }

    return `<div class="data-log-timeline">` + groups.map(g=>{
      const first=g.logs[0]||{};
      const user=(first.user_name||first.user_email||'系统');
      const avatar=(String(user).trim().charAt(0)||'系').toUpperCase();
      const actionsRaw=[...new Set(g.logs.map(l=>l.action).filter(Boolean))];
      const action=actionLabel(actionsRaw);
      const targets=[...new Set(g.logs.map(l=>targetTableLabel(l.target_table)).filter(Boolean))];

      let changes=[];
      g.logs.forEach(l=>{changes=changes.concat(summarizeLogChanges(l.detail));});
      const seen=new Set();
      changes=changes.filter(c=>{
        const key=[c.key,c.label,c.oldVal,c.newVal].join('|');
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      const shown=changes.slice(0,24);
      const targetHtml=targets.length?`<div class="data-log-tagrow">${targets.map(t=>`<span class="data-log-tag">${esc(t)}</span>`).join('')}</div>`:'';
      const changesHtml = shown.length ? shown.map(c=>{
        const oldHtml = (c.oldVal!==undefined && c.oldVal!==null && String(c.oldVal)!=='')
          ? `<span class="data-log-old">${esc(String(c.oldVal))}</span>` : '';
        const newHtml = (c.newVal!==undefined && c.newVal!==null && String(c.newVal)!=='')
          ? `<span class="data-log-new">${esc(String(c.newVal))}</span>` : '';
        return `<div class="data-log-line">
          <div class="data-log-icon">${iconForChange(c)}</div>
          <div class="data-log-body">
            <div class="data-log-label">${esc(cleanLogLabel(c.label,c.key))}：</div>
            <div class="data-log-values">${oldHtml}${newHtml||'<span class="data-log-empty">空</span>'}</div>
          </div>
        </div>`;
      }).join('') : `<div class="data-log-line"><div class="data-log-icon">ℹ️</div><div class="data-log-body"><div class="data-log-empty">(当前数据)</div></div></div>`;

      const more = changes.length>shown.length ? `<div class="muted" style="margin-top:8px">另有 ${changes.length-shown.length} 项变更未展开显示。</div>` : '';

      return `<div class="data-log-card">
        <div class="data-log-top">
          <div class="data-log-userbox">
            <div class="data-log-avatar">${esc(avatar)}</div>
            <div>
              <div class="data-log-username">${esc(user)}</div>
              <div class="data-log-count">${actionCountText(action, changes.length||g.logs.length)}</div>
            </div>
          </div>
          <div class="data-log-meta">
            <div class="data-log-time">${fmtDateTime(g.created_at)}</div>
            <div class="data-log-action">${action}</div>
          </div>
        </div>
        ${targetHtml}
        ${changesHtml}
        ${more}
      </div>`;
    }).join('') + `</div>`;
  }

function targetTableLabel(t){
    return ({orders:'订单信息',writing_assignments:'写作信息',publishing_assignments:'发表信息',settlement_batches:'结算批次',settlement_batch_items:'结算明细',journals:'期刊信息',writers:'写手信息'}[t]||t||'系统记录');
  }

  function summarizeLogChanges(detail){
    const oldObj=detail?.old||{};
    const newObj=detail?.new||{};
    const ignore=new Set(['id','created_at','updated_at','deleted_at','deleted_by']);
    const keys=[...new Set([...Object.keys(oldObj||{}),...Object.keys(newObj||{})])].filter(k=>!ignore.has(k));
    const out=[];
    keys.forEach(k=>{
      const ov=oldObj?oldObj[k]:undefined,nv=newObj?newObj[k]:undefined;
      if(k==='dynamic_values'){
        const ok=ov||{},nk=nv||{};
        const labels=Object.assign({},ok.__labels||{},nk.__labels||{});
        [...new Set([...Object.keys(ok),...Object.keys(nk)])].forEach(dk=>{
          if(dk==='__labels')return;
          if(JSON.stringify(ok[dk]??'')!==JSON.stringify(nk[dk]??''))out.push({label:cleanLogLabel(labels[dk]||projectFieldLabels[dk]||fieldLabel(dk),dk),oldVal:fmtLogVal(ok[dk]),newVal:fmtLogVal(nk[dk])});
        });
      }else if(JSON.stringify(ov??'')!==JSON.stringify(nv??'')){
        out.push({label:cleanLogLabel(projectFieldLabels[k]||fieldLabel(k),k),oldVal:fmtLogVal(ov),newVal:fmtLogVal(nv)});
      }
    });
    return out;
  }

  function cleanLogLabel(label,key){
    const x=String(label||'');
    if(x.startsWith('f_')||(x===String(key)&&(String(key).startsWith('f_')||String(key).includes('_')))) return '自定义字段';
    return x||'字段';
  }

  function fieldLabel(k){
    const map={order_status:'订单状态',due_at:'交稿时间',total_amount:'订单总金额',deposit_amount:'实收金额',balance_amount:'尾款金额',refund_amount:'退款金额',wechat_account:'微信号',taobao_account:'淘宝账号',customer_source:'客户来源',service_notes:'客服备注',payment_method_id:'付款方式',assigned_writing_user_id:'派给写作部',assigned_publishing_user_id:'派给发表部',writer_fee:'稿费',writing_status:'写作状态',writer_id:'写手',settlement_status:'结算状态',settled_amount:'已结算金额',publish_status:'发表状态',finance_payment_status:'财务打款状态',finance_payment_amount:'打款金额',journal_id:'期刊',publishing_notes:'发表备注',finance_notes:'财务备注',article_title:'文章题目',project_title:'课题题目',word_count_req:'字数要求',major_direction:'专业方向',publish_requirement:'发表要求',approval_status:'是否立项',project_level:'课题级别',subject_stage:'学段学科',course_topic:'微课主题',micro_topic:'微课主题',project_name:'项目名称',page_or_word_req:'页数/字数要求',format_requirement:'格式要求',customer_requirement:'客户要求'};
    return map[k]||k;
  }

  function fmtLogVal(v){
    if(v===null||v===undefined||v==='')return '空';
    if(typeof v==='object')return JSON.stringify(v);
    if(String(v).match(/^\d{4}-\d{2}-\d{2}T/))return fmtDate(v);
    return String(v);
  }

    await loadOrderLogsPanel(orderId);
  }
