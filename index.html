<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>客户录单系统</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fb;color:#1f2937}
    .page{max-width:1280px;margin:0 auto;padding:26px 14px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(15,23,42,.05);margin-bottom:16px}
    h1{margin:0 0 8px;font-size:28px} h2{margin:0 0 14px;font-size:21px} h3{margin:0 0 8px;font-size:17px}
    .muted{color:#6b7280;font-size:14px}.small{font-size:13px}.hidden{display:none!important}
    .topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 16px}.full{grid-column:1/-1}
    .module{border:1px solid #e5e7eb;border-radius:14px;background:#fff;padding:18px;cursor:pointer;transition:.15s}
    .module:hover{border-color:#2563eb;transform:translateY(-1px)}
    label{display:block;font-size:14px;margin:12px 0 6px;color:#374151}
    input,select,textarea{width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;outline:none;background:#fff}
    textarea{min-height:86px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    button{border:none;background:#2563eb;color:#fff;padding:10px 14px;border-radius:10px;font-size:15px;cursor:pointer;margin-top:10px}
    button.secondary{background:#111827}button.ghost{background:#eef2ff;color:#1f2937}button.danger{background:#dc2626}
    .tag{display:inline-block;padding:4px 9px;border-radius:999px;background:#ecfdf5;color:#047857;font-size:13px;margin-left:8px}
    .error{color:#b91c1c;margin-top:12px;font-size:14px}.success{color:#047857;margin-top:12px;font-size:14px}
    .warn{color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:14px;margin:10px 0}
    .info{color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px;font-size:14px;margin:10px 0}
    .table-wrap{overflow-x:auto;border:1px solid #e5e7eb;border-radius:14px}table{width:100%;border-collapse:collapse;font-size:14px;background:#fff}
    th,td{border-bottom:1px solid #e5e7eb;padding:10px 8px;text-align:left;vertical-align:top}th{background:#f9fafb;color:#374151;white-space:nowrap}
    tr.overdue td{background:#fee2e2!important}tr.due-soon td{background:#ffedd5!important}tr.due-warning td{background:#fef9c3!important}tr.closed td{background:#f3f4f6!important;color:#6b7280}
    .searchbar{display:grid;grid-template-columns:2fr 1fr auto auto;gap:10px;align-items:end;margin:12px 0}
    .pill{display:inline-block;background:#f3f4f6;border-radius:999px;padding:3px 8px;margin:2px;font-size:12px;color:#374151}
    @media(max-width:900px){.grid,.form-grid,.searchbar{grid-template-columns:1fr}.topbar{display:block}}
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <h1>客户录单系统</h1>
    <div class="muted">客服录单 / 写作派单 / 财务结算 / 管理员统计</div>
  </div>

  <div id="loginBox" class="card">
    <h2>登录系统</h2>
    <label>邮箱</label><input id="email" type="email" placeholder="请输入账号邮箱" />
    <label>密码</label><input id="password" type="password" placeholder="请输入密码" />
    <button onclick="login()">登录</button>
    <button class="ghost" onclick="renderRegister()">员工注册</button>
    <div id="loginMsg"></div>
  </div>

  <div id="registerBox" class="card hidden">
    <h2>员工注册</h2>
    <div class="info">注册后默认为“待审核”，需要管理员启用并分配部门后才能使用。</div>
    <label>姓名/内部称呼</label><input id="reg_name" placeholder="如：客服小王、写作部A" />
    <label>邮箱</label><input id="reg_email" type="email" placeholder="用于登录的邮箱" />
    <label>密码</label><input id="reg_password" type="password" placeholder="至少6位" />
    <button onclick="registerAccount()">提交注册</button>
    <button class="ghost" onclick="showLogin()">返回登录</button>
    <div id="registerMsg"></div>
  </div>

  <div id="appBox" class="hidden">
    <div class="card topbar">
      <div>
        <h2>系统首页 <span id="roleTag" class="tag"></span></h2>
        <div class="muted" id="userInfo"></div>
        <div id="navBox" class="nav"></div>
      </div>
      <button class="secondary" onclick="logout()">退出登录</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://kifnfihqavambwatclle.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_BZaNc-i9sRnvkwTVjOF_dw_jbUoMFYs';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser=null,currentProfile=null;
  let categories=[],projects=[],customerSources=[],writingUsers=[],profiles=[];
  let fieldsCache={};

  const roleMap={admin:'管理员',service:'客服部',writing:'写作部',finance:'财务部',pending:'待审核'};
  const closedStatus=['已完成','已取消','退款/异常','已交付'];

  function $(id){return document.getElementById(id)}
  function money(v){return Number(v||0).toFixed(2)}
  function fmtDate(v){if(!v)return '-';try{return new Date(v).toLocaleString('zh-CN',{hour12:false})}catch(e){return v}}
  function toISO(v){return v?new Date(v).toISOString():null}
  function todayISO(){return new Date().toISOString().slice(0,10)}
  function showContent(html){$('content').innerHTML=html}
  function showMsg(id,html){const el=$(id);if(el)el.innerHTML=html}
  function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
  function getDyn(r,key){return r?.dynamic_values?.[key] ?? ''}
  function mainTitle(r){
    return r.title || getDyn(r,'project_title') || getDyn(r,'micro_topic') || getDyn(r,'course_topic') || getDyn(r,'project_name') || '-';
  }
  function mainWord(r){
    return r.word_count || getDyn(r,'word_count_req') || getDyn(r,'page_or_word_req') || '';
  }
  function approvalText(r){return getDyn(r,'approval_status') || '-'}
  function rowClass(r){
    const status=r.order_status||'';
    if(closedStatus.includes(status)) return 'closed';
    const due=r.due_at?new Date(r.due_at).getTime():null;
    if(!due) return '';
    const diff=due-Date.now();
    const h=diff/36e5;
    if(h<0) return 'overdue';
    if(h<=24) return 'due-soon';
    if(h<=48) return 'due-warning';
    return '';
  }

  function renderRegister(){
    $('loginBox').classList.add('hidden');
    $('registerBox').classList.remove('hidden');
  }
  function showLogin(){
    $('registerBox').classList.add('hidden');
    $('loginBox').classList.remove('hidden');
  }
  async function registerAccount(){
    showMsg('registerMsg','');
    const name=$('reg_name').value.trim();
    const email=$('reg_email').value.trim();
    const password=$('reg_password').value;
    if(!name||!email||!password){showMsg('registerMsg','<div class="error">请填写姓名、邮箱和密码。</div>');return}
    const {error}=await client.auth.signUp({email,password,options:{data:{display_name:name}}});
    if(error){showMsg('registerMsg','<div class="error">注册失败：'+error.message+'</div>');return}
    showMsg('registerMsg','<div class="success">注册成功。请联系管理员在账号管理里启用并分配角色。</div>');
  }

  async function login(){
    showMsg('loginMsg','');
    const email=$('email').value.trim(),password=$('password').value;
    if(!email||!password){showMsg('loginMsg','<div class="error">请输入邮箱和密码。</div>');return}
    const {error}=await client.auth.signInWithPassword({email,password});
    if(error){showMsg('loginMsg','<div class="error">登录失败：'+error.message+'</div>');return}
    await loadApp();
  }
  async function logout(){
    await client.auth.signOut();
    currentUser=null;currentProfile=null;
    $('loginBox').classList.remove('hidden');$('registerBox').classList.add('hidden');$('appBox').classList.add('hidden');$('content').innerHTML='';
  }
  async function loadApp(){
    const {data:sessionData}=await client.auth.getSession();
    const session=sessionData.session;
    if(!session){$('loginBox').classList.remove('hidden');$('appBox').classList.add('hidden');return}
    currentUser=session.user;
    const {data:profile,error}=await client.from('profiles').select('display_name,role,is_active').eq('id',currentUser.id).single();
    if(error||!profile){$('loginBox').classList.remove('hidden');$('appBox').classList.add('hidden');showMsg('loginMsg','<div class="error">账号已登录，但没有找到角色信息。</div>');return}
    if(!profile.is_active){await client.auth.signOut();showMsg('loginMsg','<div class="error">该账号未启用或已停用，请联系管理员。</div>');return}
    currentProfile=profile;
    $('loginBox').classList.add('hidden');$('registerBox').classList.add('hidden');$('appBox').classList.remove('hidden');
    $('userInfo').innerText='当前账号：'+currentUser.email+'｜名称：'+profile.display_name;
    $('roleTag').innerText=roleMap[profile.role]||profile.role;
    renderNav();renderHome();
  }

  function renderNav(){
    const role=currentProfile.role,items=[];
    items.push(`<button class="ghost" onclick="renderHome()">首页</button>`);
    if(['admin','service'].includes(role)){items.push(`<button class="ghost" onclick="renderOrderForm()">客户录单</button>`);items.push(`<button class="ghost" onclick="renderOrderList()">订单查询</button>`)}
    if(['admin','writing'].includes(role))items.push(`<button class="ghost" onclick="renderWritingOrders()">写作订单查询</button>`);
    if(['admin','finance'].includes(role))items.push(`<button class="ghost" onclick="renderFinanceOrders()">财务订单查询</button>`);
    if(role==='admin'){items.push(`<button class="ghost" onclick="renderBusinessManage()">业务/字段管理</button>`);items.push(`<button class="ghost" onclick="renderSourceManage()">来源管理</button>`);items.push(`<button class="ghost" onclick="renderAccountManage()">账号管理</button>`);items.push(`<button class="ghost" onclick="renderReportView()">统计报表</button>`)}
    $('navBox').innerHTML=items.join('');
  }
  function renderHome(){
    const r=currentProfile.role;let cards='';
    if(r==='admin'){cards+=moduleCard('客户录单','录入订单，自动生成6位编号。','renderOrderForm()');cards+=moduleCard('订单查询','按编号、微信号、淘宝账号、要求等查询。','renderOrderList()');cards+=moduleCard('业务/字段管理','自定义业务大类、具体项目、项目字段。','renderBusinessManage()');cards+=moduleCard('统计报表','输入时间范围查询客服、业务、财务、写手统计。','renderReportView()')}
    if(r==='service'){cards+=moduleCard('客户录单','只填微信/淘宝账号、客户要求、金额、交稿时间。','renderOrderForm()');cards+=moduleCard('我的订单查询','按订单编号、微信号、淘宝账号查询自己的订单。','renderOrderList()')}
    if(r==='writing')cards+=moduleCard('写作订单查询','只看派给自己的订单，可安排写手和稿费。','renderWritingOrders()');
    if(r==='finance')cards+=moduleCard('财务订单查询','查询订单金额、尾款、稿费、结算、利润。','renderFinanceOrders()');
    showContent(`<div class="card"><h2>功能入口</h2><div class="grid">${cards}</div><div class="info">到期颜色：红色=已超期，橙色=24小时内，黄色=48小时内，灰色=已完成/取消。</div></div>`);
  }
  function moduleCard(t,d,a){return `<div class="module" onclick="${a}"><h3>${t}</h3><div class="muted">${d}</div></div>`}

  async function loadBaseData(force=false){
    if(!force&&categories.length&&projects.length&&customerSources.length)return;
    const [cat,pro,src,prof]=await Promise.all([
      client.from('business_categories').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
      client.from('service_projects').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
      client.from('customer_sources').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
      client.from('profiles').select('id,display_name,role,is_active').in('role',['writing','service','finance','admin','pending']).order('created_at',{ascending:false})
    ]);
    if(cat.error)throw cat.error;if(pro.error)throw pro.error;if(src.error)throw src.error;
    categories=cat.data||[];projects=pro.data||[];customerSources=src.data||[];
    profiles=prof.data||[];writingUsers=profiles.filter(p=>p.role==='writing'&&p.is_active);
  }
  async function getProjectFields(projectId){
    if(!projectId)return[]; if(fieldsCache[projectId])return fieldsCache[projectId];
    const {data,error}=await client.from('project_fields').select('*').eq('project_id',projectId).eq('is_active',true).order('sort_order',{ascending:true});
    if(error)throw error; fieldsCache[projectId]=data||[];return fieldsCache[projectId];
  }

  async function renderOrderForm(orderId=null){
    if(!['admin','service'].includes(currentProfile.role)){showContent('<div class="card"><div class="error">你没有录单权限。</div></div>');return}
    await loadBaseData(true);
    let existing=null,fields=[];
    if(orderId){
      const view=currentProfile.role==='admin'?'v_admin_orders_full':'v_service_orders';
      const {data,error}=await client.from(view).select('*').eq(currentProfile.role==='admin'?'id':'id',orderId).single();
      if(error){showContent(`<div class="card"><div class="error">加载订单失败：${error.message}</div></div>`);return}
      existing=data;
    }
    const catOptions=categories.map(c=>`<option value="${c.id}" ${existing?.category_id===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
    const sourceOptions=customerSources.map(s=>`<option value="${escapeHtml(s.name)}" ${existing?.customer_source===s.name?'selected':''}>${escapeHtml(s.name)}</option>`).join('');
    const writingOptions=writingUsers.map(u=>`<option value="${u.id}" ${existing?.assigned_writing_user_id===u.id?'selected':''}>${escapeHtml(u.display_name)}</option>`).join('');
    showContent(`
      <div class="card">
        <h2>${orderId?'修改订单':'客户录单'}</h2>
        <div class="warn">不记录客户姓名；微信号和淘宝账号至少填写一个。订单编号由系统自动生成，从140000开始。</div>
        <div class="form-grid">
          <div><label>客户来源</label><select id="customer_source"><option value="">请选择来源</option>${sourceOptions}</select></div>
          <div><label>派给写作部</label><select id="assigned_writing_user_id"><option value="">暂不指定</option>${writingOptions}</select></div>
          <div><label>微信号</label><input id="wechat_account" value="${escapeHtml(existing?.wechat_account||'')}" placeholder="客户微信号" /></div>
          <div><label>淘宝账号</label><input id="taobao_account" value="${escapeHtml(existing?.taobao_account||'')}" placeholder="淘宝昵称/账号" /></div>
          <div><label>业务大类</label><select id="category_id" onchange="onCategoryChange()"><option value="">请选择业务大类</option>${catOptions}</select></div>
          <div><label>具体项目</label><select id="project_id" onchange="onProjectChange()"><option value="">请选择具体项目</option></select></div>
          <div class="full" id="dynamicFieldsBox"></div>
          <div class="full"><label>客户具体要求</label><textarea id="customer_requirements" placeholder="把格式要求、客户原始要求、注意事项都写这里">${escapeHtml(existing?.customer_requirements||'')}</textarea></div>
          <div><label>交稿时间</label><input id="due_at" type="datetime-local" value="${existing?.due_at?new Date(existing.due_at).toISOString().slice(0,16):''}" /></div>
          <div><label>订单状态</label><select id="order_status">${['待跟进','已报价','待付定金','已付定金','进行中','待收尾款','已收全款','已交付','修改中','已完成','已取消','退款/异常'].map(s=>`<option value="${s}" ${existing?.order_status===s?'selected':''}>${s}</option>`).join('')}</select></div>
          <div><label>订单总金额</label><input id="total_amount" type="number" step="0.01" value="${existing?.total_amount??0}" oninput="updateBalancePreview()" /></div>
          <div><label>定金金额</label><input id="deposit_amount" type="number" step="0.01" value="${existing?.deposit_amount??0}" oninput="updateBalancePreview()" /></div>
          <div><label>尾款金额</label><input id="balance_preview" readonly /></div>
          <div><label>尾款状态</label><select id="balance_status"><option value="未付" ${existing?.balance_status!=='已付'?'selected':''}>未付</option><option value="已付" ${existing?.balance_status==='已付'?'selected':''}>已付</option></select></div>
          <div><label>退款金额</label><input id="refund_amount" type="number" step="0.01" value="${existing?.refund_amount??0}" /></div>
          <div class="full"><label>客服备注</label><textarea id="service_notes">${escapeHtml(existing?.service_notes||'')}</textarea></div>
        </div>
        <button onclick="${orderId?`saveOrder('${orderId}')`:'saveOrder()'}">${orderId?'保存修改':'保存订单'}</button>
        <button class="ghost" onclick="renderOrderList()">返回查询</button>
        <div id="orderFormMsg"></div>
      </div>
    `);
    if(existing?.category_id){await onCategoryChange(existing.project_id);await onProjectChange(existing.project_id,existing.dynamic_values||{})}
    updateBalancePreview();
  }
  function updateBalancePreview(){
    const total=Number($('total_amount')?.value||0),deposit=Number($('deposit_amount')?.value||0);
    if($('balance_preview'))$('balance_preview').value=(total-deposit).toFixed(2);
  }
  async function onCategoryChange(selectedProjectId=''){
    const cid=$('category_id').value,list=projects.filter(p=>p.category_id===cid);
    $('project_id').innerHTML='<option value="">请选择具体项目</option>'+list.map(p=>`<option value="${p.id}" ${selectedProjectId===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('');
    $('dynamicFieldsBox').innerHTML='';
  }
  async function onProjectChange(selectedProjectId='',values={}){
    const pid=selectedProjectId||$('project_id').value,box=$('dynamicFieldsBox');
    if(!pid){box.innerHTML='';return}
    const fields=await getProjectFields(pid);
    box.innerHTML= fields.length ? `
      <div class="card" style="box-shadow:none;background:#f9fafb">
        <h3>项目专属字段</h3>
        <div class="form-grid">${fields.map(f=>renderDynamicField(f,values[f.field_key])).join('')}</div>
      </div>` : '<div class="warn">该项目暂未配置专属字段。</div>';
  }
  function renderDynamicField(f,val=''){
    const label=escapeHtml(f.field_label)+(f.is_required?' *':''),id='dyn_'+f.field_key;
    if(f.field_type==='textarea')return `<div class="full"><label>${label}</label><textarea id="${id}" placeholder="${escapeHtml(f.placeholder||'')}">${escapeHtml(val||'')}</textarea></div>`;
    if(f.field_type==='select'){const opts=Array.isArray(f.options)?f.options:[];return `<div><label>${label}</label><select id="${id}"><option value="">请选择</option>${opts.map(o=>`<option value="${escapeHtml(o)}" ${val===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}</select></div>`}
    if(f.field_type==='multi_select'){const vals=Array.isArray(val)?val:[];const opts=Array.isArray(f.options)?f.options:[];return `<div><label>${label}</label><select id="${id}" multiple>${opts.map(o=>`<option value="${escapeHtml(o)}" ${vals.includes(o)?'selected':''}>${escapeHtml(o)}</option>`).join('')}</select><div class="muted small">按住 Command 可多选</div></div>`}
    const type=f.field_type==='number'?'number':f.field_type==='date'?'date':f.field_type==='datetime'?'datetime-local':'text';
    return `<div><label>${label}</label><input id="${id}" type="${type}" value="${escapeHtml(val||'')}" placeholder="${escapeHtml(f.placeholder||'')}" /></div>`;
  }
  async function saveOrder(orderId=null){
    showMsg('orderFormMsg','');
    const wechat=$('wechat_account').value.trim(),taobao=$('taobao_account').value.trim();
    if(!wechat&&!taobao){showMsg('orderFormMsg','<div class="error">微信号和淘宝账号至少填写一个。</div>');return}
    const categoryId=$('category_id').value,projectId=$('project_id').value;
    if(!categoryId||!projectId){showMsg('orderFormMsg','<div class="error">请选择业务大类和具体项目。</div>');return}
    const fields=await getProjectFields(projectId),dynamicValues={};
    for(const f of fields){
      const el=$('dyn_'+f.field_key); if(!el)continue;
      let v=f.field_type==='multi_select'?Array.from(el.selectedOptions).map(o=>o.value):el.value;
      if(f.is_required&&(Array.isArray(v)?!v.length:!v)){showMsg('orderFormMsg',`<div class="error">请填写必填字段：${escapeHtml(f.field_label)}</div>`);return}
      dynamicValues[f.field_key]=v;
    }
    const title=dynamicValues.project_title||dynamicValues.micro_topic||dynamicValues.course_topic||dynamicValues.project_name||'';
    const word=dynamicValues.word_count_req||dynamicValues.page_or_word_req||'';
    const payload={
      created_by:currentUser.id,category_id:categoryId,project_id:projectId,assigned_writing_user_id:$('assigned_writing_user_id').value||null,
      wechat_account:wechat||null,taobao_account:taobao||null,customer_source:$('customer_source').value||null,contact_platform:'微信',
      title:title||null,word_count:word||null,customer_requirements:$('customer_requirements').value.trim(),format_requirements:null,
      due_at:toISO($('due_at').value),dynamic_values:dynamicValues,order_status:$('order_status').value,

  function setReportRange(type){
    const d=new Date();let s,e=new Date();
    if(type==='today'){s=new Date();e=new Date()}
    if(type==='yesterday'){s=new Date(Date.now()-864e5);e=new Date(Date.now()-864e5)}
    if(type==='7days'){s=new Date(Date.now()-6*864e5);e=new Date()}
    if(type==='month'){s=new Date(d.getFullYear(),d.getMonth(),1);e=new Date()}
    if(type==='lastmonth'){s=new Date(d.getFullYear(),d.getMonth()-1,1);e=new Date(d.getFullYear(),d.getMonth(),0)}
    if(type==='year'){s=new Date(d.getFullYear(),0,1);e=new Date()}
    $('report_start').value=s.toISOString().slice(0,10);$('report_end').value=e.toISOString().slice(0,10);queryReport();
  }
  async function queryReport(){
    const s=$('report_start').value,e=$('report_end').value;
    const start=s+'T00:00:00',end=e+'T23:59:59';
    const {data,error}=await client.from('v_admin_orders_full').select('*').gte('created_at',start).lte('created_at',end);
    if(error){$('reportBox').innerHTML='<div class="error">'+error.message+'</div>';return}
    const rows=data||[];
    const total=rows.reduce((a,r)=>a+Number(r.total_amount||0),0),deposit=rows.reduce((a,r)=>a+Number(r.deposit_amount||0),0),balance=rows.reduce((a,r)=>a+Number(r.balance_amount||0),0),receivedBalance=rows.filter(r=>r.balance_status==='已付').reduce((a,r)=>a+Number(r.balance_amount||0),0),refund=rows.reduce((a,r)=>a+Number(r.refund_amount||0),0),income=rows.reduce((a,r)=>a+Number(r.actual_income||0),0),fee=rows.reduce((a,r)=>a+Number(r.writer_fee||0),0);
    const service=groupReport(rows,r=>r.service_name||'未指定客服');
    const project=groupReport(rows,r=>(r.business_category||'-')+' / '+(r.service_project||'-'));
    const writer=groupWriter(rows);
    $('reportBox').innerHTML=`
      <div class="card" style="box-shadow:none;background:#f9fafb"><h3>财务汇总</h3><div class="grid">${metric('订单数',rows.length)}${metric('成交金额',money(total))}${metric('定金合计',money(deposit))}${metric('尾款合计',money(balance))}${metric('已收尾款',money(receivedBalance))}${metric('未收尾款',money(balance-receivedBalance))}${metric('退款金额',money(refund))}${metric('实际收入',money(income))}${metric('写手稿费',money(fee))}${metric('毛利润',money(income-fee))}</div></div>
      ${renderSimpleReport('客服接单统计',service)}
      ${renderSimpleReport('业务项目统计',project)}
      ${renderWriterReport(writer)}
    `;
  }
  function metric(k,v){return `<div class="module"><h3>${v}</h3><div class="muted">${k}</div></div>`}
  function groupReport(rows,keyFn){
    const m={};rows.forEach(r=>{const k=keyFn(r);m[k]??={name:k,count:0,total:0,deposit:0,balance:0,receivedBalance:0,unpaidBalance:0,refund:0};m[k].count++;m[k].total+=Number(r.total_amount||0);m[k].deposit+=Number(r.deposit_amount||0);m[k].balance+=Number(r.balance_amount||0);if(r.balance_status==='已付')m[k].receivedBalance+=Number(r.balance_amount||0);else m[k].unpaidBalance+=Number(r.balance_amount||0);m[k].refund+=Number(r.refund_amount||0)});return Object.values(m)}
  function renderSimpleReport(title,rows){return `<h3>${title}</h3><div class="table-wrap"><table><thead><tr><th>名称</th><th>订单数</th><th>成交金额</th><th>定金</th><th>尾款</th><th>已收尾款</th><th>未收尾款</th><th>退款</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${escapeHtml(r.name)}</td><td>${r.count}</td><td>${money(r.total)}</td><td>${money(r.deposit)}</td><td>${money(r.balance)}</td><td>${money(r.receivedBalance)}</td><td>${money(r.unpaidBalance)}</td><td>${money(r.refund)}</td></tr>`).join('')}</tbody></table></div>`}
  function groupWriter(rows){const m={};rows.forEach(r=>{const k=r.writer_name||'未安排写手';m[k]??={name:k,count:0,fee:0,settled:0,unsettled:0};if(r.writer_name||r.writer_fee){m[k].count++;m[k].fee+=Number(r.writer_fee||0);m[k].settled+=Number(r.settled_amount||0);m[k].unsettled+=Number(r.writer_fee||0)-Number(r.settled_amount||0)}});return Object.values(m)}
  function renderWriterReport(rows){return `<h3>写手结算统计</h3><div class="table-wrap"><table><thead><tr><th>写手</th><th>单数</th><th>稿费合计</th><th>已结算</th><th>未结算</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${escapeHtml(r.name)}</td><td>${r.count}</td><td>${money(r.fee)}</td><td>${money(r.settled)}</td><td>${money(r.unsettled)}</td></tr>`).join('')}</tbody></table></div>`}

  window.addEventListener('load',loadApp);
</script>
