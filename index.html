<html lang="zh-CN">
<head>

<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#1f2937;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 8px 24px rgba(15,23,42,.05)}
.login{max-width:520px;margin:40px auto;padding:0 16px}.layout{display:flex;min-height:100vh}.side{width:235px;position:fixed;left:0;top:0;bottom:0;background:#111827;color:#fff;padding:18px 14px;overflow:auto}.main{margin-left:235px;flex:1;padding:24px}
.brand{font-size:20px;font-weight:700;margin:0 8px 16px}.uinfo{font-size:12px;line-height:1.7;color:#cbd5e1;background:#1f2937;padding:10px;border-radius:12px;margin-bottom:12px}
.menu button{display:block;width:100%;text-align:left;background:transparent;color:#e5e7eb;border:0;padding:11px 12px;border-radius:10px;margin:3px 0;cursor:pointer}.menu button:hover,.menu button.on{background:#2563eb;color:#fff}
h1{margin:0 0 8px;font-size:28px}h2{margin:0 0 14px;font-size:21px}h3{margin:14px 0 8px}.muted{color:#6b7280;font-size:14px}.hidden{display:none!important}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.fg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px 16px}.full{grid-column:1/-1}
.mod{border:1px solid #e5e7eb;border-radius:14px;padding:18px;cursor:pointer}.mod:hover{border-color:#2563eb}
label{display:block;font-size:14px;margin:12px 0 6px}input,select,textarea{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;background:#fff}textarea{min-height:84px}
button{border:0;background:#2563eb;color:#fff;padding:9px 13px;border-radius:10px;margin:6px 4px 6px 0;cursor:pointer}.ghost{background:#eef2ff;color:#1f2937}.black{background:#111827}.red{background:#dc2626}.green{background:#059669}
.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:10px;border-radius:10px;margin:10px 0}.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:10px;border-radius:10px;margin:10px 0}.err{color:#b91c1c}.ok{color:#047857}.tag{display:inline-block;background:#ecfdf5;color:#047857;border-radius:999px;padding:3px 8px;margin-top:4px}

.overdue td{background:#fee2e2!important}.soon td{background:#ffedd5!important}.warnrow td{background:#fef9c3!important}.closed td{background:#f3f4f6!important;color:#6b7280}
.search{display:grid;grid-template-columns:2fr 1fr auto auto;gap:10px;align-items:end}.modalBg{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:99;display:flex;align-items:center;justify-content:center;padding:18px}.modal{background:#fff;border-radius:16px;max-width:920px;width:100%;max-height:88vh;overflow:auto;padding:20px}.drag{cursor:grab}
@media(max-width:900px){.layout{display:block}.side{position:relative;width:100%}.main{margin-left:0;padding:14px}.grid,.fg,.search{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loginArea" class="login">
 <div class="card"><h1>客户录单系统</h1><div class="muted">V4：发表部 / 期刊管理 / 付款方式 / 操作记录</div></div>
 <div id="loginBox" class="card">
  <h2>登录</h2><label>邮箱</label><input id="email"><label>密码</label><input id="password" type="password">

 </div>
 <div id="regBox" class="card hidden"><h2>员工注册</h2><div class="info">注册后默认为待审核，管理员启用后才能登录。</div><label>姓名/称呼</label><input id="regName"><label>邮箱</label><input id="regEmail"><label>密码</label><input id="regPass" type="password"><button onclick="reg()">提交注册</button><button class="ghost" onclick="showLogin()">返回</button><div id="regMsg"></div></div>
 <div id="forgotBox" class="card hidden"><h2>忘记密码</h2><label>邮箱</label><input id="forgotEmail"><button onclick="forgot()">发送重置邮件</button><button class="ghost" onclick="showLogin()">返回</button><div id="forgotMsg"></div></div>
</div>

<script>
const SUPABASE_URL='https://kifnfihqavambwatclle.supabase.co';
const SUPABASE_KEY='sb_publishable_BZaNc-i9sRnvkwTVjOF_dw_jbUoMFYs';
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let user=null,me=null,cats=[],projects=[],sources=[],pays=[],profiles=[],writers=[],fieldsCache={};
const roleName={admin:'管理员',service:'客服部',writing:'写作部',publishing:'发表部',finance:'财务部',pending:'待审核'};
const closed=['已完成','已取消','退款/异常','已交付'], writeDone=['写作完成','终稿完成','已完成'];
function $(id){return document.getElementById(id)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function money(v){return Number(v||0).toFixed(2)}function iso(v){return v?new Date(v).toISOString():null}function fd(v){if(!v)return'-';try{return new Date(v).toLocaleString('zh-CN',{hour12:false})}catch(e){return v}}function msg(id,h){$(id).innerHTML=h}function content(h){$('content').innerHTML=h;closeM()}function dyn(r,k){return r?.dynamic_values?.[k]||''}function title(r){return r.title||dyn(r,'project_title')||dyn(r,'article_title')||dyn(r,'micro_topic')||dyn(r,'course_topic')||'-'}function word(r){return r.word_count||dyn(r,'word_count_req')||dyn(r,'page_or_word_req')||''}
function rcls(r){if(closed.includes(r.order_status||''))return'closed';if(!r.due_at)return'';let h=(new Date(r.due_at).getTime()-Date.now())/36e5;if(h<0)return'overdue';if(h<=24)return'soon';if(h<=48)return'warnrow';return''}
function showReg(){$('loginBox').classList.add('hidden');$('forgotBox').classList.add('hidden');$('regBox').classList.remove('hidden')}function showForgot(){$('loginBox').classList.add('hidden');$('regBox').classList.add('hidden');$('forgotBox').classList.remove('hidden')}function showLogin(){$('regBox').classList.add('hidden');$('forgotBox').classList.add('hidden');$('loginBox').classList.remove('hidden')}
async function reg(){let name=$('regName').value.trim(),email=$('regEmail').value.trim(),password=$('regPass').value;if(!name||!email||!password)return msg('regMsg','<p class="err">请填写完整。</p>');let {error}=await client.auth.signUp({email,password,options:{data:{display_name:name}}});msg('regMsg',error?'<p class="err">'+error.message+'</p>':'<p class="ok">注册成功，请联系管理员启用。</p>')}
async function forgot(){let email=$('forgotEmail').value.trim();if(!email)return msg('forgotMsg','<p class="err">请输入邮箱。</p>');let {error}=await client.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});msg('forgotMsg',error?'<p class="err">'+error.message+'</p>':'<p class="ok">重置邮件已发送。</p>')}
async function login(){let email=$('email').value.trim(),password=$('password').value;if(!email||!password)return msg('loginMsg','<p class="err">请输入邮箱和密码。</p>');let {error}=await client.auth.signInWithPassword({email,password});if(error)return msg('loginMsg','<p class="err">'+error.message+'</p>');loadApp()}
async function logout(){await client.auth.signOut();$('app').classList.add('hidden');$('loginArea').classList.remove('hidden');showLogin()}
async function loadApp(){let {data:s}=await client.auth.getSession();if(!s.session)return;user=s.session.user;let {data:p,error}=await client.from('profiles').select('id,email,display_name,role,is_active').eq('id',user.id).single();if(error||!p)return msg('loginMsg','<p class="err">没有账号角色信息。</p>');if(!p.is_active){await client.auth.signOut();return msg('loginMsg','<p class="err">账号未启用。</p>')}me=p;$('loginArea').classList.add('hidden');$('app').classList.remove('hidden');$('sideUser').innerHTML=`<b>${esc(p.display_name)}</b><br>${esc(p.email||user.email)}<br><span class="tag">${roleName[p.role]}</span>`;menu();home()}
function mb(k,t,fn){return`<button id="m_${k}" onclick="act('${k}');${fn}">${t}</button>`}function act(k){document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('on'));let e=$('m_'+k);if(e)e.classList.add('on')}
function menu(){let r=me.role,h=mb('home','首页','home()');if(r==='admin')h+=mb('all','全部订单查询','allOrders()')+mb('journals','期刊管理','journalManage()')+mb('jsearch','期刊查询','journalSearch()')+mb('src','来源管理','sourceManage()')+mb('pay','付款方式管理','payManage()')+mb('biz','业务/字段管理','bizManage()')+mb('acc','账号管理','accountManage()')+mb('rep','统计报表','reports()')+mb('logs','操作记录','logs()');if(r==='service')h+=mb('form','客户录单','orderForm()')+mb('mine','我的订单查询','myOrders()')+mb('jsearch','期刊查询','journalSearch()');if(r==='writing')h+=mb('writing','写作订单','writingOrders()')+mb('writers','写手管理','writerManage()');if(r==='publishing')h+=mb('publishing','发表订单','publishingOrders()')+mb('journals','期刊管理','journalManage()');if(r==='finance')h+=mb('finance','财务订单','financeOrders()');$('menu').innerHTML=h}
function home(){act('home');let r=me.role,h='';if(r==='admin')h+=card('全部订单查询','一个入口查所有订单。','allOrders()')+card('期刊管理','管理客户价、版面费、编辑联系方式。','journalManage()')+card('账号管理','查看注册邮箱，启用/停用账号。','accountManage()')+card('操作记录','查看谁更新了什么。','logs()');if(r==='service')h+=card('客户录单','提交写作、发表、写作+发表订单。','orderForm()')+card('期刊查询','只看客户价，不看版面费和编辑联系方式。','journalSearch()');if(r==='writing')h+=card('写作订单','登记写手和稿费。','writingOrders()');if(r==='publishing')h+=card('发表订单','处理只发表和写作完成后的写发订单。','publishingOrders()');if(r==='finance')h+=card('财务订单','处理稿费结算和发表打款。','financeOrders()');content(`<div class="card"><h2>功能入口</h2><div class="grid">${h}</div><div class="info">红色=超期，橙色=24小时内，黄色=48小时内，灰色=已完成/取消。</div></div>`)}
function card(t,d,fn){return`<div class="mod" onclick="${fn}"><h3>${t}</h3><div class="muted">${d}</div></div>`}
async function base(force=false){if(!force&&cats.length&&projects.length&&sources.length&&pays.length)return;let res=await Promise.all([client.from('business_categories').select('*').eq('is_active',true).order('sort_order'),client.from('service_projects').select('*').eq('is_active',true).order('sort_order'),client.from('customer_sources').select('*').eq('is_active',true).order('sort_order'),client.from('payment_methods').select('*').eq('is_active',true).order('sort_order'),client.from('profiles').select('id,email,display_name,role,is_active,created_at').order('created_at',{ascending:false})]);res.forEach(x=>{if(x.error)throw x.error});cats=res[0].data||[];projects=res[1].data||[];sources=res[2].data||[];pays=res[3].data||[];profiles=res[4].data||[]}
async function flds(pid){if(!pid)return[];if(fieldsCache[pid])return fieldsCache[pid];let {data,error}=await client.from('project_fields').select('*').eq('project_id',pid).eq('is_active',true).order('sort_order');if(error)throw error;return fieldsCache[pid]=data||[]}
function isPub(p){return p?.code?.startsWith('FB')||p?.name?.includes('发表')}function pubType(p){return p?.name?.includes('写作')?'写作+发表':'只发表'}
async function orderForm(id=null){act(me.role==='admin'?'all':'form');await base(true);let ex=null;if(id){let view=me.role==='admin'?'v_admin_orders_full':'v_service_orders';let r=await client.from(view).select('*').eq('id',id).single();if(r.error)return content('<div class="card err">'+r.error.message+'</div>');ex=r.data}let wUsers=profiles.filter(p=>p.role==='writing'&&p.is_active),pUsers=profiles.filter(p=>p.role==='publishing'&&p.is_active);
content(`<div class="card"><h2>${id?'修改订单':'客户录单'}</h2><div class="warn">写作+发表：先写作部，写作完成后进入发表部；只发表：直接发表部。</div><div class="fg">
<div><label>客户来源</label><select id="customer_source"><option value="">请选择</option>${sources.map(s=>`<option ${ex?.customer_source===s.name?'selected':''}>${esc(s.name)}</option>`).join('')}</select></div>
<div><label>付款方式</label><select id="payment_method_id"><option value="">请选择</option>${pays.map(p=>`<option value="${p.id}" ${ex?.payment_method_id===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
<div><label>微信号</label><input id="wechat_account" value="${esc(ex?.wechat_account||'')}"></div><div><label>淘宝账号</label><input id="taobao_account" value="${esc(ex?.taobao_account||'')}"></div>
<div><label>业务大类</label><select id="category_id" onchange="catChange()"><option value="">请选择</option>${cats.map(c=>`<option value="${c.id}" ${ex?.category_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
<div><label>具体项目</label><select id="project_id" onchange="projChange()"><option value="">请选择</option></select></div>
<div><label>派给写作部</label><select id="assigned_writing_user_id"><option value="">不需要/暂不指定</option>${wUsers.map(u=>`<option value="${u.id}" ${ex?.assigned_writing_user_id===u.id?'selected':''}>${esc(u.display_name)}</option>`).join('')}</select></div>
<div><label>派给发表部</label><select id="assigned_publishing_user_id"><option value="">不需要/暂不指定</option>${pUsers.map(u=>`<option value="${u.id}" ${ex?.assigned_publishing_user_id===u.id?'selected':''}>${esc(u.display_name)}</option>`).join('')}</select></div>
<div id="dynBox" class="full"></div>
<div class="full"><label>客户具体要求</label><textarea id="customer_requirements">${esc(ex?.customer_requirements||'')}</textarea></div>
<div><label>交稿时间</label><input id="due_at" type="datetime-local" value="${ex?.due_at?new Date(ex.due_at).toISOString().slice(0,16):''}"></div>
<div><label>订单状态</label><select id="order_status">${['待跟进','已报价','待付定金','已付定金','进行中','待收尾款','已收全款','已交付','修改中','已完成','已取消','退款/异常'].map(s=>`<option ${ex?.order_status===s?'selected':''}>${s}</option>`).join('')}</select></div>
<div><label>订单总金额</label><input id="total_amount" type="number" step="0.01" value="${ex?.total_amount??0}" oninput="bal()"></div><div><label>定金金额</label><input id="deposit_amount" type="number" step="0.01" value="${ex?.deposit_amount??0}" oninput="bal()"></div>
<div><label>尾款金额</label><input id="balance_preview" readonly></div><div><label>退款金额</label><input id="refund_amount" type="number" step="0.01" value="${ex?.refund_amount??0}"></div>
<div class="full"><label>客服备注</label><textarea id="service_notes">${esc(ex?.service_notes||'')}</textarea></div></div>
<button onclick="${id?`saveOrder('${id}')`:'saveOrder()'}">保存</button><button class="ghost" onclick="${me.role==='admin'?'allOrders()':'myOrders()'}">返回查询</button><div id="orderMsg"></div></div>`);
if(ex?.category_id){await catChange(ex.project_id);await projChange(ex.project_id,ex.dynamic_values||{})}bal()}
function bal(){let t=Number($('total_amount')?.value||0),d=Number($('deposit_amount')?.value||0);if($('balance_preview'))$('balance_preview').value=money(t-d)}
async function catChange(sel=''){let cid=$('category_id').value,list=projects.filter(p=>p.category_id===cid);$('project_id').innerHTML='<option value="">请选择</option>'+list.map(p=>`<option value="${p.id}" ${sel===p.id?'selected':''}>${esc(p.name)}</option>`).join('');$('dynBox').innerHTML=''}
async function projChange(sel='',vals={}){let pid=sel||$('project_id').value;if(!pid){$('dynBox').innerHTML='';return}let fs=await flds(pid);$('dynBox').innerHTML=fs.length?`<div class="card" style="box-shadow:none;background:#f9fafb"><h3>项目专属字段</h3><div class="fg">${fs.map(f=>field(f,vals[f.field_key])).join('')}</div></div>`:'<div class="warn">该项目暂无专属字段。</div>'}
function field(f,v=''){let id='dyn_'+f.field_key,l=esc(f.field_label)+(f.is_required?' *':'');if(f.field_type==='textarea')return`<div class="full"><label>${l}</label><textarea id="${id}">${esc(v||'')}</textarea></div>`;if(f.field_type==='select'){let ops=Array.isArray(f.options)?f.options:[];return`<div><label>${l}</label><select id="${id}"><option value="">请选择</option>${ops.map(o=>`<option ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`}let type=f.field_type==='number'?'number':f.field_type==='date'?'date':f.field_type==='datetime'?'datetime-local':'text';return`<div><label>${l}</label><input id="${id}" type="${type}" value="${esc(v||'')}"></div>`}
async function saveOrder(id=null){let wx=$('wechat_account').value.trim(),tb=$('taobao_account').value.trim();if(!wx&&!tb)return msg('orderMsg','<p class="err">微信号和淘宝账号至少填一个。</p>');let pid=$('project_id').value,cid=$('category_id').value;if(!pid||!cid)return msg('orderMsg','<p class="err">请选择业务和项目。</p>');let fs=await flds(pid),dv={};for(let f of fs){let el=$('dyn_'+f.field_key),v=el?el.value:'';if(f.is_required&&!v)return msg('orderMsg','<p class="err">请填写：'+esc(f.field_label)+'</p>');dv[f.field_key]=v}let p=projects.find(x=>x.id===pid),ttl=dv.project_title||dv.article_title||dv.micro_topic||dv.course_topic||'',wd=dv.word_count_req||dv.page_or_word_req||'';let pay={created_by:user.id,category_id:cid,project_id:pid,assigned_writing_user_id:$('assigned_writing_user_id').value||null,assigned_publishing_user_id:$('assigned_publishing_user_id').value||null,payment_method_id:$('payment_method_id').value||null,wechat_account:wx||null,taobao_account:tb||null,customer_source:$('customer_source').value||null,contact_platform:'微信',title:ttl||null,word_count:wd||null,customer_requirements:$('customer_requirements').value.trim(),format_requirements:null,due_at:iso($('due_at').value),dynamic_values:dv,order_status:$('order_status').value,total_amount:Number($('total_amount').value||0),deposit_amount:Number($('deposit_amount').value||0),deposit_status:Number($('deposit_amount').value||0)>0?'已付':'未付',balance_status:'',refund_amount:Number($('refund_amount').value||0),service_notes:$('service_notes').value.trim()};let r=id?await client.from('orders').update(pay).eq('id',id).select('id,order_no').single():await client.from('orders').insert(pay).select('id,order_no').single();if(r.error)return msg('orderMsg','<p class="err">'+r.error.message+'</p>');if(isPub(p))await client.from('publishing_assignments').upsert({order_id:r.data.id,publishing_user_id:$('assigned_publishing_user_id').value||null,publish_type:pubType(p),publish_status:'待审核'},{onConflict:'order_id'});msg('orderMsg','<p class="ok">保存成功，订单编号：'+r.data.order_no+'</p>')}
function qfilter(rows,kw,fs){kw=(kw||'').trim().toLowerCase();if(!kw)return rows;return rows.filter(r=>fs.some(f=>String(f(r)??'').toLowerCase().includes(kw)))}function qbox(fn,ph){return`<div class="search"><div><label>查询关键词</label><input id="kw" placeholder="${ph}"></div><div></div><button onclick="${fn}()">查询</button><button class="ghost" onclick="$('kw').value='';${fn}()">清空</button></div>`}
async function allOrders(){act('all');let kw=$('kw')?.value||'',r=await client.from('v_admin_orders_full').select('*').order('created_at',{ascending:false});if(r.error)return content('<div class="card err">'+r.error.message+'</div>');let rows=qfilter(r.data||[],kw,[x=>x.order_no,x=>x.wechat_account,x=>x.taobao_account,x=>title(x),x=>x.customer_requirements,x=>x.service_name,x=>x.assigned_writing_name,x=>x.assigned_publishing_name,x=>x.journal_name]);content(`<div class="card"><h2>全部订单查询</h2>${qbox('allOrders','订单编号/微信/淘宝/题目/客服/部门/期刊')}<button onclick="orderForm()">新增订单</button><div class="muted">共 ${rows.length} 条</div>${orderTable(rows,true)}</div>`);if(kw)$('kw').value=kw}

function mkcode(p){return p+'-'+Date.now().toString(36)+'-'+Math.floor(Math.random()*9999)}async function addCat(){await client.from('business_categories').insert({name:$('catname').value.trim(),code:mkcode('CAT'),sort_order:999});cats=[];bizManage()}async function addProj(){await client.from('service_projects').insert({name:$('pname').value.trim(),category_id:$('pcat').value,code:mkcode('PRJ'),sort_order:999});projects=[];bizManage()}async function addField(){let opts=$('fopts').value.trim()?$('fopts').value.split(',').map(x=>x.trim()).filter(Boolean):[];await client.from('project_fields').insert({project_id:$('fproj').value,field_key:'f_'+Date.now().toString(36),field_label:$('flabel').value.trim(),field_type:$('ftype').value,is_required:$('freq').value==='true',options:opts,sort_order:999,is_active:true});fieldsCache={};fieldList()}
async function fieldList(){let pid=$('fproj')?.value;if(!pid)return;let fs=await flds(pid);$('fieldBox').innerHTML=`<div class="tw"><table><tbody id="fieldBody">${fs.map(f=>`<tr class="drag" draggable="true" data-id="${f.id}"><td>${esc(f.field_label)}</td><td>${esc(f.field_type)}</td><td>拖动排序</td><td><button class="red" onclick="disableField('${f.id}')">删除</button></td></tr>`).join('')}</tbody></table></div><button class="ghost" onclick="saveSort('field')">保存字段顺序</button>`;drag('fieldBody')}async function disableField(id){await client.from('project_fields').update({is_active:false}).eq('id',id);fieldsCache={};fieldList()}
function drag(id){setTimeout(()=>{let tb=$(id);if(!tb)return;let cur=null;tb.querySelectorAll('tr').forEach(row=>{row.ondragstart=()=>{cur=row};row.ondragover=e=>{e.preventDefault();let after=[...tb.querySelectorAll('tr')].find(r=>r!==cur&&e.clientY<r.getBoundingClientRect().top+r.offsetHeight/2);after?tb.insertBefore(cur,after):tb.appendChild(cur)}})},50)}
async function saveSort(type){let map={src:['srcBody','customer_sources'],pay:['payBody','payment_methods'],field:['fieldBody','project_fields']},[body,table]=map[type],ids=[...$(body).querySelectorAll('tr')].map(r=>r.dataset.id);for(let i=0;i<ids.length;i++)await client.from(table).update({sort_order:i+1}).eq('id',ids[i]);fieldsCache={};alert('顺序已保存')}
async function accountManage(){act('acc');await base(true);content(`<div class="card"><h2>账号管理</h2><div class="info">可查看注册邮箱，分配客服部/写作部/发表部/财务部。</div><div class="tw"><table><tr><th>邮箱</th><th>名称</th><th>角色</th><th>状态</th><th>修改角色</th><th>操作</th></tr>${profiles.map(p=>`<tr><td>${esc(p.email||'')}</td><td>${esc(p.display_name)}</td><td>${roleName[p.role]||p.role}</td><td>${p.is_active?'启用':'停用/待审核'}</td><td><select id="role_${p.id}">${['pending','service','writing','publishing','finance','admin'].map(r=>`<option value="${r}" ${p.role===r?'selected':''}>${roleName[r]}</option>`).join('')}</select></td><td><button onclick="updAcc('${p.id}',true)">保存并启用</button><button class="red" onclick="updAcc('${p.id}',false)">停用</button></td></tr>`).join('')}</table></div></div>`)}
async function updAcc(id,on){await client.from('profiles').update({role:$('role_'+id).value,is_active:on}).eq('id',id);profiles=[];accountManage()}
async function reports(){act('rep');let end=new Date().toISOString().slice(0,10),start=new Date(Date.now()-6*864e5).toISOString().slice(0,10);content(`<div class="card"><h2>统计报表</h2><div class="fg"><div><label>开始日期</label><input id="rs" type="date" value="${start}"></div><div><label>结束日期</label><input id="re" type="date" value="${end}"></div></div><button onclick="range('today')">今天</button><button onclick="range('7')">最近7天</button><button onclick="range('month')">本月</button><button onclick="range('last')">上个月</button><button onclick="range('year')">今年</button><button class="black" onclick="doReport()">查询</button><div id="reportBox"></div></div>`);doReport()}
function range(t){let d=new Date(),s=new Date(),e=new Date();if(t==='7')s=new Date(Date.now()-6*864e5);if(t==='month')s=new Date(d.getFullYear(),d.getMonth(),1);if(t==='last'){s=new Date(d.getFullYear(),d.getMonth()-1,1);e=new Date(d.getFullYear(),d.getMonth(),0)}if(t==='year')s=new Date(d.getFullYear(),0,1);$('rs').value=s.toISOString().slice(0,10);$('re').value=e.toISOString().slice(0,10);doReport()}
async function doReport(){let r=await client.from('v_admin_orders_full').select('*').gte('created_at',$('rs').value+'T00:00:00').lte('created_at',$('re').value+'T23:59:59');if(r.error)return $('reportBox').innerHTML='<p class="err">'+r.error.message+'</p>';let rows=r.data||[],total=sum(rows,'total_amount'),dep=sum(rows,'deposit_amount'),fee=sum(rows,'writer_fee'),page=sum(rows,'page_fee'),income=sum(rows,'actual_income');$('reportBox').innerHTML=`<div class="grid">${metric('订单数',rows.length)}${metric('成交金额',money(total))}${metric('定金',money(dep))}${metric('稿费',money(fee))}${metric('版面费',money(page))}${metric('利润',money(income-fee-page))}</div>${gTable('客服统计',grp(rows,x=>x.service_name||'未指定'))}${gTable('业务统计',grp(rows,x=>(x.business_category||'-')+' / '+(x.service_project||'-')))}${gTable('期刊统计',grp(rows,x=>x.journal_name||'无期刊'))}`}
function sum(rows,k){return rows.reduce((a,x)=>a+Number(x[k]||0),0)}function metric(k,v){return`<div class="mod"><h3>${v}</h3><div class="muted">${k}</div></div>`}function grp(rows,kf){let m={};rows.forEach(x=>{let k=kf(x);m[k]??={name:k,n:0,total:0,fee:0,page:0};m[k].n++;m[k].total+=Number(x.total_amount||0);m[k].fee+=Number(x.writer_fee||0);m[k].page+=Number(x.page_fee||0)});return Object.values(m)}function gTable(t,rows){return`<h3>${t}</h3><div class="tw"><table><tr><th>名称</th><th>订单数</th><th>成交金额</th><th>稿费</th><th>版面费</th></tr>${rows.map(x=>`<tr><td>${esc(x.name)}</td><td>${x.n}</td><td>${money(x.total)}</td><td>${money(x.fee)}</td><td>${money(x.page)}</td></tr>`).join('')}</table></div>`}}
async function logs(){act('logs');let r=await client.from('v_operation_logs_admin').select('*').limit(200);if(r.error)return content('<div class="card err">'+r.error.message+'</div>');content(`<div class="card"><h2>操作记录</h2><div class="tw"><table><tr><th>时间</th><th>操作人</th><th>动作</th><th>表</th><th>ID</th><th>详情</th></tr>${(r.data||[]).map(l=>`<tr><td>${fd(l.created_at)}</td><td>${esc(l.display_name||'')}<br>${esc(l.email||'')}</td><td>${l.action}</td><td>${l.target_table}</td><td>${l.target_id||''}</td><td><button class="ghost" onclick='logDetail(${JSON.stringify(JSON.stringify(l.detail)).replace(/'/g,"&#39;")})'>查看</button></td></tr>`).join('')}</table></div></div>`)}
function logDetail(j){modal(`<h2>操作详情</h2><pre style="white-space:pre-wrap;background:#f3f4f6;padding:12px;border-radius:12px;max-height:60vh;overflow:auto">${esc(JSON.stringify(JSON.parse(j),null,2))}</pre><button onclick="closeM()">关闭</button>`)}
function modal(h){$('modal').innerHTML=`<div class="modalBg"><div class="modal">${h}</div></div>`}function closeM(){$('modal').innerHTML=''}
window.addEventListener('load',loadApp)
</script></body></html>
