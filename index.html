<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>客户录单系统</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 21px;
    }
    h3 {
      margin: 0 0 8px;
      font-size: 17px;
    }
    .muted {
      color: #6b7280;
      font-size: 14px;
    }
    .hidden {
      display: none !important;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .module {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #ffffff;
      padding: 18px;
      cursor: pointer;
      transition: all .15s ease;
    }
    .module:hover {
      border-color: #2563eb;
      transform: translateY(-1px);
    }
    label {
      display: block;
      font-size: 14px;
      margin: 12px 0 6px;
      color: #374151;
    }
    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    button {
      border: none;
      background: #2563eb;
      color: #fff;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }
    button.secondary {
      background: #111827;
    }
    button.ghost {
      background: #eef2ff;
      color: #1f2937;
    }
    button.danger {
      background: #dc2626;
    }
    .tag {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      background: #ecfdf5;
      color: #047857;
      font-size: 13px;
      margin-left: 8px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }
    .full {
      grid-column: 1 / -1;
    }
    .error {
      color: #b91c1c;
      margin-top: 12px;
      font-size: 14px;
    }
    .success {
      color: #047857;
      margin-top: 12px;
      font-size: 14px;
    }
    .warn {
      color: #92400e;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      margin: 10px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f9fafb;
      color: #374151;
      white-space: nowrap;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
    }
    .small {
      font-size: 13px;
    }
    @media (max-width: 900px) {
      .grid, .form-grid {
        grid-template-columns: 1fr;
      }
      .topbar {
        display: block;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <h1>客户录单系统</h1>
      <div class="muted">客服录单 / 写作分配 / 财务结算 / 管理员报表</div>
    </div>

    <div id="loginBox" class="card">
      <h2>登录系统</h2>
      <label>邮箱</label>
      <input id="email" type="email" placeholder="请输入账号邮箱" />

      <label>密码</label>
      <input id="password" type="password" placeholder="请输入密码" />

      <button onclick="login()">登录</button>
      <div id="loginMsg"></div>
    </div>

    <div id="appBox" class="hidden">
      <div class="card topbar">
        <div>
          <h2>系统首页 <span id="roleTag" class="tag"></span></h2>
          <div class="muted" id="userInfo"></div>
          <div id="navBox" class="nav"></div>
        </div>
        <button class="secondary" onclick="logout()">退出登录</button>
      </div>

      <div id="content"></div>
    </div>
  </div>

<script>
  const SUPABASE_URL = 'https://kifnfihqavambwatclle.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_BZaNc-i9sRnvkwTVjOF_dw_jbUoMFYs';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let currentProfile = null;
  let categories = [];
  let projects = [];
  let fieldsCache = {};

  const roleMap = {
    admin: '管理员',
    service: '客服部',
    writing: '写作部',
    finance: '财务部'
  };

  function $(id) {
    return document.getElementById(id);
  }

  function money(v) {
    const n = Number(v || 0);
    return n.toFixed(2);
  }

  function fmtDate(v) {
    if (!v) return '-';
    try {
      return new Date(v).toLocaleString('zh-CN', { hour12: false });
    } catch(e) {
      return v;
    }
  }

  function toISO(v) {
    if (!v) return null;
    return new Date(v).toISOString();
  }

  function showContent(html) {
    $('content').innerHTML = html;
  }

  function showMsg(id, html) {
    const el = $(id);
    if (el) el.innerHTML = html;
  }

  async function login() {
    const msg = $('loginMsg');
    msg.innerHTML = '';

    const email = $('email').value.trim();
    const password = $('password').value;

    if (!email || !password) {
      msg.innerHTML = '<div class="error">请输入邮箱和密码。</div>';
      return;
    }

    const { error } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      msg.innerHTML = '<div class="error">登录失败：' + error.message + '</div>';
      return;
    }

    msg.innerHTML = '<div class="success">登录成功，正在进入系统...</div>';
    await loadApp();
  }

  async function logout() {
    await client.auth.signOut();
    currentUser = null;
    currentProfile = null;
    $('loginBox').classList.remove('hidden');
    $('appBox').classList.add('hidden');
    $('content').innerHTML = '';
  }

  async function loadApp() {
    const { data: sessionData } = await client.auth.getSession();
    const session = sessionData.session;

    if (!session) {
      $('loginBox').classList.remove('hidden');
      $('appBox').classList.add('hidden');
      return;
    }

    currentUser = session.user;

    const { data: profile, error } = await client
      .from('profiles')
      .select('display_name, role, is_active')
      .eq('id', currentUser.id)
      .single();

    if (error || !profile) {
      $('loginBox').classList.remove('hidden');
      $('appBox').classList.add('hidden');
      $('loginMsg').innerHTML =
        '<div class="error">账号已登录，但没有找到角色信息。请检查 profiles 表。</div>';
      return;
    }

    if (!profile.is_active) {
      await client.auth.signOut();
      $('loginMsg').innerHTML = '<div class="error">该账号已被停用。</div>';
      return;
    }

    currentProfile = profile;

    $('loginBox').classList.add('hidden');
    $('appBox').classList.remove('hidden');

    $('userInfo').innerText =
      '当前账号：' + currentUser.email + '｜名称：' + profile.display_name;

    $('roleTag').innerText = roleMap[profile.role] || profile.role;

    renderNav();
    renderHome();
  }

  function renderNav() {
    const role = currentProfile.role;
    const items = [];

    items.push(`<button class="ghost" onclick="renderHome()">首页</button>`);

    if (role === 'admin' || role === 'service') {
      items.push(`<button class="ghost" onclick="renderOrderForm()">客户录单</button>`);
      items.push(`<button class="ghost" onclick="renderOrderList()">订单列表</button>`);
    }

    if (role === 'admin' || role === 'writing') {
      items.push(`<button class="ghost" onclick="renderWritingOrders()">写作订单</button>`);
    }

    if (role === 'admin' || role === 'finance') {
      items.push(`<button class="ghost" onclick="renderFinanceOrders()">财务订单</button>`);
    }

    if (role === 'admin') {
      items.push(`<button class="ghost" onclick="renderBusinessView()">业务项目</button>`);
      items.push(`<button class="ghost" onclick="renderReportView()">报表统计</button>`);
    }

    $('navBox').innerHTML = items.join('');
  }

  function renderHome() {
    const role = currentProfile.role;
    let cards = '';

    if (role === 'admin') {
      cards += moduleCard('客户录单', '录入客户微信/淘宝账号、题目、字数、要求、定金尾款。', 'renderOrderForm()');
      cards += moduleCard('全部订单', '管理员查看全部订单数据。', 'renderOrderList()');
      cards += moduleCard('写作订单', '查看写作部可见内容。', 'renderWritingOrders()');
      cards += moduleCard('财务订单', '查看收款、尾款、稿费、结算和利润。', 'renderFinanceOrders()');
      cards += moduleCard('业务项目', '查看业务大类、具体项目、项目字段。', 'renderBusinessView()');
      cards += moduleCard('报表统计', '查看客服日报、月报、年报。', 'renderReportView()');
    }

    if (role === 'service') {
      cards += moduleCard('客户录单', '填写客户账号、业务项目、客户要求、订单金额和定金尾款。', 'renderOrderForm()');
      cards += moduleCard('我的订单', '只能查看自己录入的订单，看不到写手和稿费。', 'renderOrderList()');
    }

    if (role === 'writing') {
      cards += moduleCard('写作订单', '查看题目、字数、要求、截止时间，不显示订单价格。', 'renderWritingOrders()');
    }

    if (role === 'finance') {
      cards += moduleCard('财务订单', '查看定金、尾款、稿费、结算和利润。', 'renderFinanceOrders()');
    }

    showContent(`
      <div class="card">
        <h2>功能入口</h2>
        <div class="grid">${cards}</div>
      </div>
    `);
  }

  function moduleCard(title, desc, action) {
    return `
      <div class="module" onclick="${action}">
        <h3>${title}</h3>
        <div class="muted">${desc}</div>
      </div>
    `;
  }

  async function loadBaseData() {
    if (categories.length && projects.length) return;

    const { data: cats, error: catErr } = await client
      .from('business_categories')
      .select('*')
      .eq('is_active', true)
      .order('sort_order', { ascending: true });

    if (catErr) throw catErr;

    const { data: pros, error: proErr } = await client
      .from('service_projects')
      .select('*')
      .eq('is_active', true)
      .order('sort_order', { ascending: true });

    if (proErr) throw proErr;

    categories = cats || [];
    projects = pros || [];
  }

  async function getProjectFields(projectId) {
    if (!projectId) return [];
    if (fieldsCache[projectId]) return fieldsCache[projectId];

    const { data, error } = await client
      .from('project_fields')
      .select('*')
      .eq('project_id', projectId)
      .eq('is_active', true)
      .order('sort_order', { ascending: true });

    if (error) throw error;

    fieldsCache[projectId] = data || [];
    return fieldsCache[projectId];
  }

  async function renderOrderForm() {
    if (!['admin', 'service'].includes(currentProfile.role)) {
      showContent('<div class="card"><div class="error">你没有录单权限。</div></div>');
      return;
    }

    try {
      await loadBaseData();
    } catch (e) {
      showContent(`<div class="card"><div class="error">加载业务项目失败：${e.message}</div></div>`);
      return;
    }

    const catOptions = categories.map(c =>
      `<option value="${c.id}">${c.name}</option>`
    ).join('');

    showContent(`
      <div class="card">
        <h2>客户录单</h2>
        <div class="warn">系统不记录客户姓名，只记录微信号或淘宝账号。微信号和淘宝账号至少填写一个。</div>

        <div class="form-grid">
          <div>
            <label>业务大类</label>
            <select id="category_id" onchange="onCategoryChange()">
              <option value="">请选择业务大类</option>
              ${catOptions}
            </select>
          </div>

          <div>
            <label>具体项目</label>
            <select id="project_id" onchange="onProjectChange()">
              <option value="">请先选择业务大类</option>
            </select>
          </div>

          <div>
            <label>微信号</label>
            <input id="wechat_account" placeholder="客户微信号，可空" />
          </div>

          <div>
            <label>淘宝账号</label>
            <input id="taobao_account" placeholder="淘宝昵称/淘宝账号，可空" />
          </div>

          <div>
            <label>客户来源</label>
            <select id="customer_source">
              <option value="淘宝">淘宝</option>
              <option value="微信">微信</option>
              <option value="小红书">小红书</option>
              <option value="老客户介绍">老客户介绍</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <div>
            <label>联系平台</label>
            <select id="contact_platform">
              <option value="微信">微信</option>
              <option value="淘宝">淘宝</option>
              <option value="小红书">小红书</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <div>
            <label>题目/主题</label>
            <input id="title" placeholder="课题题目、微课主题等" />
          </div>

          <div>
            <label>字数要求</label>
            <input id="word_count" placeholder="如3000字、按模板、不限字数" />
          </div>

          <div class="full" id="dynamicFieldsBox"></div>

          <div class="full">
            <label>客户具体要求</label>
            <textarea id="customer_requirements" placeholder="记录客户原始要求、重点要求、注意事项"></textarea>
          </div>

          <div class="full">
            <label>格式要求</label>
            <textarea id="format_requirements" placeholder="是否有模板、是否按通知要求、是否查重、是否降AI痕迹等"></textarea>
          </div>

          <div>
            <label>截止时间</label>
            <input id="due_at" type="datetime-local" />
          </div>

          <div>
            <label>订单状态</label>
            <select id="order_status">
              <option value="待跟进">待跟进</option>
              <option value="已报价">已报价</option>
              <option value="待付定金">待付定金</option>
              <option value="已付定金">已付定金</option>
              <option value="进行中">进行中</option>
              <option value="待收尾款">待收尾款</option>
              <option value="已收全款">已收全款</option>
              <option value="已交付">已交付</option>
              <option value="修改中">修改中</option>
              <option value="已完成">已完成</option>
              <option value="已取消">已取消</option>
              <option value="退款/异常">退款/异常</option>
            </select>
          </div>

          <div>
            <label>订单总金额</label>
            <input id="total_amount" type="number" step="0.01" placeholder="如1500" oninput="updateBalancePreview()" />
          </div>

          <div>
            <label>定金金额</label>
            <input id="deposit_amount" type="number" step="0.01" placeholder="如500" oninput="updateBalancePreview()" />
          </div>

          <div>
            <label>尾款金额</label>
            <input id="balance_preview" readonly placeholder="系统自动计算" />
          </div>

          <div>
            <label>定金状态</label>
            <select id="deposit_status">
              <option value="未付">未付</option>
              <option value="已付">已付</option>
            </select>
          </div>

          <div>
            <label>定金收款时间</label>
            <input id="deposit_paid_at" type="datetime-local" />
          </div>

          <div>
            <label>尾款状态</label>
            <select id="balance_status">
              <option value="未付">未付</option>
              <option value="已付">已付</option>
            </select>
          </div>

          <div>
            <label>尾款收款时间</label>
            <input id="balance_paid_at" type="datetime-local" />
          </div>

          <div>
            <label>退款金额</label>
            <input id="refund_amount" type="number" step="0.01" value="0" />
          </div>

          <div class="full">
            <label>客服备注</label>
            <textarea id="service_notes" placeholder="客户沟通情况、特殊说明、催稿情况等"></textarea>
          </div>
        </div>

        <button onclick="saveOrder()">保存订单</button>
        <button class="ghost" onclick="renderOrderList()">查看订单列表</button>
        <div id="orderFormMsg"></div>
      </div>
    `);
  }

  function updateBalancePreview() {
    const total = Number($('total_amount')?.value || 0);
    const deposit = Number($('deposit_amount')?.value || 0);
    const balance = total - deposit;
    if ($('balance_preview')) $('balance_preview').value = balance.toFixed(2);
  }

  async function onCategoryChange() {
    const categoryId = $('category_id').value;
    const list = projects.filter(p => p.category_id === categoryId);

    $('project_id').innerHTML =
      '<option value="">请选择具体项目</option>' +
      list.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

    $('dynamicFieldsBox').innerHTML = '';
  }

  async function onProjectChange() {
    const projectId = $('project_id').value;
    const box = $('dynamicFieldsBox');

    if (!projectId) {
      box.innerHTML = '';
      return;
    }

    try {
      const fields = await getProjectFields(projectId);
      if (!fields.length) {
        box.innerHTML = '<div class="warn">该项目暂未配置专属字段，只填写通用字段即可。</div>';
        return;
      }

      box.innerHTML = `
        <div class="card" style="box-shadow:none;background:#f9fafb;">
          <h3>项目专属字段</h3>
          <div class="form-grid">
            ${fields.map(renderDynamicField).join('')}
          </div>
        </div>
      `;
    } catch (e) {
      box.innerHTML = `<div class="error">加载项目字段失败：${e.message}</div>`;
    }
  }

  function renderDynamicField(f) {
    const req = f.is_required ? ' required ' : '';
    const label = `${f.field_label}${f.is_required ? ' *' : ''}`;
    const id = 'dyn_' + f.field_key;

    if (f.field_type === 'textarea') {
      return `
        <div class="full">
          <label>${label}</label>
          <textarea id="${id}" ${req} placeholder="${f.placeholder || ''}"></textarea>
        </div>
      `;
    }

    if (f.field_type === 'select') {
      const opts = Array.isArray(f.options) ? f.options : [];
      return `
        <div>
          <label>${label}</label>
          <select id="${id}" ${req}>
            <option value="">请选择</option>
            ${opts.map(o => `<option value="${o}">${o}</option>`).join('')}
          </select>
        </div>
      `;
    }

    if (f.field_type === 'multi_select') {
      const opts = Array.isArray(f.options) ? f.options : [];
      return `
        <div>
          <label>${label}</label>
          <select id="${id}" ${req} multiple>
            ${opts.map(o => `<option value="${o}">${o}</option>`).join('')}
          </select>
          <div class="muted small">按住 Command 可多选</div>
        </div>
      `;
    }

    if (f.field_type === 'boolean') {
      return `
        <div>
          <label>${label}</label>
          <select id="${id}">
            <option value="">请选择</option>
            <option value="是">是</option>
            <option value="否">否</option>
          </select>
        </div>
      `;
    }

    const inputType = f.field_type === 'number' ? 'number' :
                      f.field_type === 'date' ? 'date' :
                      f.field_type === 'datetime' ? 'datetime-local' : 'text';

    return `
      <div>
        <label>${label}</label>
        <input id="${id}" type="${inputType}" ${req} placeholder="${f.placeholder || ''}" />
      </div>
    `;
  }

  async function saveOrder() {
    showMsg('orderFormMsg', '');

    const wechat = $('wechat_account').value.trim();
    const taobao = $('taobao_account').value.trim();

    if (!wechat && !taobao) {
      showMsg('orderFormMsg', '<div class="error">微信号和淘宝账号至少填写一个。</div>');
      return;
    }

    const categoryId = $('category_id').value;
    const projectId = $('project_id').value;

    if (!categoryId || !projectId) {
      showMsg('orderFormMsg', '<div class="error">请选择业务大类和具体项目。</div>');
      return;
    }

    const fields = await getProjectFields(projectId);
    const dynamicValues = {};

    for (const f of fields) {
      const el = $('dyn_' + f.field_key);
      if (!el) continue;

      let value = '';

      if (f.field_type === 'multi_select') {
        value = Array.from(el.selectedOptions).map(o => o.value);
      } else {
        value = el.value;
      }

      if (f.is_required) {
        const empty = Array.isArray(value) ? value.length === 0 : !value;
        if (empty) {
          showMsg('orderFormMsg', `<div class="error">请填写必填字段：${f.field_label}</div>`);
          return;
        }
      }

      dynamicValues[f.field_key] = value;
    }

    const project = projects.find(p => p.id === projectId);
    const orderNo = generateOrderNo(project ? project.code : 'ORDER');

    const payload = {
      order_no: orderNo,
      created_by: currentUser.id,
      category_id: categoryId,
      project_id: projectId,

      wechat_account: wechat || null,
      taobao_account: taobao || null,
      customer_source: $('customer_source').value,
      contact_platform: $('contact_platform').value,

      title: $('title').value.trim(),
      word_count: $('word_count').value.trim(),
      customer_requirements: $('customer_requirements').value.trim(),
      format_requirements: $('format_requirements').value.trim(),
      due_at: toISO($('due_at').value),
      dynamic_values: dynamicValues,

      order_status: $('order_status').value,

      total_amount: Number($('total_amount').value || 0),
      deposit_amount: Number($('deposit_amount').value || 0),
      deposit_status: $('deposit_status').value,
      deposit_paid_at: toISO($('deposit_paid_at').value),
      balance_status: $('balance_status').value,
      balance_paid_at: toISO($('balance_paid_at').value),
      refund_amount: Number($('refund_amount').value || 0),

      service_notes: $('service_notes').value.trim()
    };

    const { error } = await client
      .from('orders')
      .insert(payload);

    if (error) {
      showMsg('orderFormMsg', `<div class="error">保存失败：${error.message}</div>`);
      return;
    }

    showMsg('orderFormMsg', `<div class="success">订单保存成功，订单编号：${orderNo}</div>`);
  }

  function generateOrderNo(code) {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const r = Math.floor(Math.random() * 9000 + 1000);
    return `${code}-${y}${m}${day}-${r}`;
  }

  async function renderBusinessView() {
    if (currentProfile.role !== 'admin') {
      showContent('<div class="card"><div class="error">只有管理员可以查看业务项目。</div></div>');
      return;
    }

    try {
      await loadBaseData();

      const { data: fields, error } = await client
        .from('project_fields')
        .select('*')
        .order('sort_order', { ascending: true });

      if (error) throw error;

      const html = projects.map(p => {
        const cat = categories.find(c => c.id === p.category_id);
        const fs = (fields || []).filter(f => f.project_id === p.id);

        return `
          <tr>
            <td>${cat ? cat.name : '-'}</td>
            <td>${p.name}</td>
            <td>${p.code}</td>
            <td>${p.is_active ? '启用' : '停用'}</td>
            <td>${fs.map(f => f.field_label).join('、') || '-'}</td>
          </tr>
        `;
      }).join('');

      showContent(`
        <div class="card">
          <h2>业务项目</h2>
          <div class="warn">这一版先做查看。下一版再加“管理员新增/删除业务项目、配置字段”的按钮。</div>

      `);
    } catch (e) {

    }
  }
